<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Falar Inglês — Video-Book com Professor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  :root{
    --paper:#F6F1E7;--paper2:#EFE7D7;--ink:#211C16;--muted:#6A5F50;
    --coral:#D9533B;--coral-d:#B8402C;--teal:#15665A;--gold:#E0A12E;
    --line:#DBCFB8;--good:#1F8A55;--bad:#C5452F;
    --stage:#1C1712;--stage2:#2A211A;
  }
  html,body{background:var(--paper)}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .disp{font-family:'Fraunces',serif}
  h1,h2,h3{line-height:1.05}
  ol,ul{padding-left:18px}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,83,59,.5)}50%{box-shadow:0 0 0 14px rgba(217,83,59,0)}}
  @keyframes wig{0%{transform:scaleY(.35)}50%{transform:scaleY(1)}100%{transform:scaleY(.35)}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(224,161,46,.0)}50%{box-shadow:0 0 22px 2px rgba(224,161,46,.55)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes talkdot{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
  @keyframes drift{from{transform:translateX(-12px)}to{transform:translateX(14px)}}
  @keyframes driftL{from{transform:translateX(0)}to{transform:translateX(-220px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
  @keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.15)}}
  @keyframes walk{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  @keyframes dashmove{to{stroke-dashoffset:-40}}
  @keyframes growbar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:0}10%{opacity:1}100%{transform:translateY(220px) rotate(540deg);opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
  .rise{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  .pop{animation:pop .4s cubic-bezier(.2,.7,.3,1) both}
  .btn{font-family:'Hanken Grotesk';cursor:pointer;border:none;transition:transform .12s,filter .15s;font-weight:700}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn:hover{filter:brightness(1.05)}
  .lift{transition:transform .18s,box-shadow .18s}
  .lift:hover{transform:translateY(-3px)}
  .recdot{width:9px;height:9px;border-radius:50%;background:#fff;display:inline-block}
  .eqbar{width:4px;background:#fff;border-radius:3px;animation:wig .8s ease-in-out infinite}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px}
  button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  #app{min-height:100vh}
  .glowbtn{animation:glow 1.6s ease-in-out infinite}
  .screen{position:relative;border-radius:16px;overflow:hidden;border:1px solid rgba(224,161,46,.35);background:#120E0A;box-shadow:inset 0 0 60px rgba(0,0,0,.5)}
  .screen svg{display:block;width:100%;height:auto}
  .vidbox{position:relative;width:100%;padding-top:56.25%;border-radius:16px;overflow:hidden;border:1px solid rgba(224,161,46,.35);background:#000}
  .vidbox iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===========================================================
   FALAR INGLÊS — VIDEO-BOOK  (HTML autônomo)
   Professor animado narra em PT, demonstra em EN e faz praticar.
   =========================================================== */

/* ---------------- VOZ / ÁUDIO ---------------- */
var _voices=[];
function refreshVoices(){ if(window.speechSynthesis) _voices=speechSynthesis.getVoices(); }
if(window.speechSynthesis){ refreshVoices(); speechSynthesis.onvoiceschanged=refreshVoices; }

/* configurações de voz (persistentes) */
var VKEY="english_vb_voice_v1";
var Voice=loadVoiceSettings();
function loadVoiceSettings(){
  var d={engine:"browser",ptURI:"",enURI:"",rate:0.95,pitch:0.92,
    prov:"elevenlabs",key:"",elVoice:"pNInz6obpgDQGcFmaJgB",oaiVoice:"ballad"};
  try{ var r=sGet(VKEY); return r?Object.assign(d,JSON.parse(r)):d; }catch(e){ return d; }
}
function saveVoiceSettings(){ try{ sSet(VKEY,JSON.stringify(Voice)); }catch(e){} }

/* pontua a "naturalidade" provável de cada voz para priorizar as neurais */
function scoreVoice(v,lang){
  var s=0, n=((v.name||"")+" "+(v.voiceURI||""));
  if(/natural|neural|online|premium|enhanced|siri/i.test(n)) s+=6;
  if(v.localService===false) s+=3;
  if(/microsoft/i.test(n)) s+=2;
  if(/google/i.test(n)) s-=2;
  if(lang==="pt"){
    if(/pt-BR/i.test(v.lang)) s+=3; else if(/pt/i.test(v.lang)) s+=1;
    if(/francisca|ant[oôó]nio|brenda|thalita|let[ií]cia|giovanna|luciana|julia|donato|humberto|fabio/i.test(n)) s+=2;
  } else {
    if(v.lang==="en-US") s+=3; else if(/^en/i.test(v.lang)) s+=1;
    if(/aria|jenny|guy|michelle|samantha|emma|ava|andrew/i.test(n)) s+=2;
  }
  return s;
}
function voicesFor(lang){
  if(!_voices.length) refreshVoices();
  var arr=_voices.filter(function(v){ return lang==="pt"?/pt/i.test(v.lang):/^en/i.test(v.lang); });
  if(!arr.length) arr=_voices.slice();
  return arr.slice().sort(function(a,b){ return scoreVoice(b,lang)-scoreVoice(a,lang); });
}
function bestVoice(lang){ var a=voicesFor(lang); return a[0]||null; }
function chosenVoice(lang){
  var uri=lang==="pt"?Voice.ptURI:Voice.enURI;
  if(uri){ var f=_voices.find(function(v){return v.voiceURI===uri;}); if(f) return f; }
  return bestVoice(lang);
}

/* animação de boca + piscar */
var mouthTimer=null, keepTimer=null, curAudio=null;
function startMouth(){ stopMouthTimer(); mouthTimer=setInterval(function(){ var m=document.getElementById("mouth"); if(m) m.setAttribute("ry",(2+Math.random()*6.5).toFixed(1)); },110); setTalking(true); }
function stopMouthTimer(){ if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; } }
function stopMouth(){ stopMouthTimer(); var m=document.getElementById("mouth"); if(m) m.setAttribute("ry","1.6"); setTalking(false); }
function setTalking(on){ var t=document.getElementById("talkind"); if(t) t.style.opacity=on?"1":"0"; }
function keepAlive(){ clearKeep(); keepTimer=setInterval(function(){ try{ if(speechSynthesis.speaking) speechSynthesis.resume(); }catch(e){} },5000); }
function clearKeep(){ if(keepTimer){ clearInterval(keepTimer); keepTimer=null; } }
function stopAll(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  if(curAudio){ try{ curAudio.pause(); }catch(e){} curAudio=null; }
  stopMouth(); clearKeep();
}

/* roteador: voz do navegador OU voz neural via API */
function playSpeech(text,lang,onend){
  stopAll();
  if(Voice.engine==="neural" && Voice.key){ neuralSpeak(text,lang,onend); }
  else { browserSpeak(text,lang,onend); }
}
function browserSpeak(text,lang,onend){
  if(!window.speechSynthesis){ onend&&onend(); return; }
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="pt"?"pt-BR":"en-US";
  u.rate=lang==="pt"?(Voice.rate||0.95):0.9;
  u.pitch=lang==="pt"?(Voice.pitch||0.92):1.0;
  var v=chosenVoice(lang); if(v) u.voice=v;
  u.onstart=function(){ startMouth(); keepAlive(); };
  u.onend=function(){ stopMouth(); clearKeep(); onend&&onend(); };
  u.onerror=function(){ stopMouth(); clearKeep(); onend&&onend(); };
  speechSynthesis.speak(u);
}
var audioCache={};
function neuralSpeak(text,lang,onend){
  var ck=Voice.prov+"|"+(Voice.prov==="openai"?Voice.oaiVoice:Voice.elVoice)+"|"+text;
  function playUrl(url){
    var a=new Audio(url); curAudio=a;
    a.onplaying=function(){ startMouth(); };
    a.onended=function(){ stopMouth(); onend&&onend(); };
    a.onerror=function(){ stopMouth(); onend&&onend(); };
    a.play().catch(function(){ stopMouth(); onend&&onend(); });
  }
  if(audioCache[ck]){ playUrl(audioCache[ck]); return; }
  fetchNeural(text).then(function(blob){
    var url=URL.createObjectURL(blob); audioCache[ck]=url; playUrl(url);
  }).catch(function(err){
    flashVoiceErr(err); browserSpeak(text,lang,onend);
  });
}
function fetchNeural(text){
  if(Voice.prov==="openai"){
    return fetch("https://api.openai.com/v1/audio/speech",{method:"POST",
      headers:{"Authorization":"Bearer "+Voice.key,"Content-Type":"application/json"},
      body:JSON.stringify({model:"gpt-4o-mini-tts",voice:Voice.oaiVoice||"ballad",input:text})
    }).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.blob(); });
  }
  return fetch("https://api.elevenlabs.io/v1/text-to-speech/"+(Voice.elVoice||"pNInz6obpgDQGcFmaJgB"),{method:"POST",
    headers:{"xi-api-key":Voice.key,"Content-Type":"application/json"},
    body:JSON.stringify({text:text,model_id:"eleven_multilingual_v2",voice_settings:{stability:0.45,similarity_boost:0.8,style:0.25}})
  }).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.blob(); });
}
function flashVoiceErr(err){
  var b=document.getElementById("voiceErr"); if(!b) return;
  b.textContent="⚠ Voz neural falhou ("+((err&&err.message)||"erro")+"). Usando a voz do navegador. Confira a chave em ⚙ Voz.";
  b.style.display="block"; clearTimeout(b._t); b._t=setTimeout(function(){ b.style.display="none"; },6000);
}

function narrate(text,onend){ playSpeech(text,"pt",onend); }
function speakEN(text,cb){ playSpeech(text,"en",cb); return true; }

/* ---- UI de configuração de voz ---- */
function ensureChrome(){
  if(!document.getElementById("gearBtn")){
    var g=el("button",{id:"gearBtn",class:"btn",style:"position:fixed;top:10px;right:12px;z-index:40;background:rgba(28,23,18,.9);color:var(--gold);border:1px solid rgba(224,161,46,.5);border-radius:99px;padding:8px 13px;font-size:13px;backdrop-filter:blur(4px)"},["⚙ Voz"]);
    g.addEventListener("click",openSettings); document.body.appendChild(g);
  }
  if(!document.getElementById("voiceErr")){
    var b=el("div",{id:"voiceErr",style:"display:none;position:fixed;bottom:90px;left:12px;right:12px;z-index:45;max-width:560px;margin:0 auto;background:#FBEDE9;border:1px solid #E7C3B8;color:#7A3322;border-radius:12px;padding:11px 14px;font-size:13px"});
    document.body.appendChild(b);
  }
}
function mkSelect(options,value,onChange){
  var sel=el("select",{style:"width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:14px;font-family:inherit;color:var(--ink)"});
  options.forEach(function(o){ var op=el("option",{value:o.v},[o.l]); if(o.v===value) op.selected=true; sel.appendChild(op); });
  sel.addEventListener("change",function(){ onChange(sel.value); });
  return sel;
}
function mkSlider(min,max,step,value,fmt,onChange){
  var wrap=el("div",{style:"display:flex;align-items:center;gap:10px"});
  var inp=el("input",{type:"range",min:min,max:max,step:step,value:value,style:"flex:1;accent-color:var(--coral)"});
  var lab=el("span",{style:"font-size:13px;color:var(--muted);min-width:46px;text-align:right"},[fmt(value)]);
  inp.addEventListener("input",function(){ lab.textContent=fmt(inp.value); onChange(parseFloat(inp.value)); });
  wrap.appendChild(inp); wrap.appendChild(lab); return wrap;
}
function lbl(t){ return el("div",{style:"font-size:13px;font-weight:700;color:var(--ink);margin:14px 0 6px"},[t]); }

function openSettings(){
  stopAll();
  var ov=el("div",{style:"position:fixed;inset:0;z-index:60;background:rgba(20,15,10,.6);display:flex;align-items:flex-end;justify-content:center"});
  var card=el("div",{class:"rise",style:"background:var(--paper);width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92vh;overflow:auto;padding:20px 18px 28px"});
  function close(){ if(ov.parentNode) document.body.removeChild(ov); }
  ov.addEventListener("click",function(e){ if(e.target===ov) close(); });

  var head=el("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"},[
    el("h3",{class:"disp",style:"font-size:22px;font-weight:800"},["Voz do professor"]),
    (function(){ var x=el("button",{class:"btn",style:"background:none;color:var(--muted);font-size:22px;padding:2px 8px"},["✕"]); x.addEventListener("click",close); return x; })()
  ]);

  /* abas engine */
  function tab(label,val){
    var on=Voice.engine===val;
    var b=el("button",{class:"btn",style:"flex:1;padding:10px;border-radius:11px;font-size:13.5px;border:2px solid "+(on?"var(--coral)":"var(--line)")+";background:"+(on?"var(--coral)":"#fff")+";color:"+(on?"#fff":"var(--ink)")},[label]);
    b.addEventListener("click",function(){ Voice.engine=val; saveVoiceSettings(); render(); });
    return b;
  }
  var tabs=el("div",{style:"display:flex;gap:8px;margin:8px 0 4px"},[ tab("Voz do navegador (grátis)","browser"), tab("Voz neural (chave de API)","neural") ]);

  var body=el("div",{});
  var sample="Olá! Eu sou o professor Theo. Vamos aprender inglês juntos, com calma e profundidade.";
  function testBtn(){
    var b=el("button",{class:"btn",style:"margin-top:16px;background:var(--ink);color:#fff;border-radius:12px;padding:12px 18px;font-size:14px"},["▶ Testar voz"]);
    b.addEventListener("click",function(){ narrate(sample); });
    return b;
  }

  function render(){
    clear(body);
    if(Voice.engine==="browser"){
      var pts=voicesFor("pt").map(function(v){ return {v:v.voiceURI,l:v.name+(scoreVoice(v,"pt")>=6?"  ★ premium":"")}; });
      pts.unshift({v:"",l:"Automática (melhor voz disponível)"});
      body.appendChild(lbl("Voz em português ("+(voicesFor("pt").length)+" disponíveis no aparelho)"));
      body.appendChild(mkSelect(pts,Voice.ptURI,function(val){ Voice.ptURI=val; saveVoiceSettings(); }));
      body.appendChild(lbl("Velocidade"));
      body.appendChild(mkSlider(0.7,1.15,0.05,Voice.rate,function(x){return Number(x).toFixed(2)+"x";},function(x){ Voice.rate=x; saveVoiceSettings(); }));
      body.appendChild(lbl("Tom (mais grave soa menos robótico)"));
      body.appendChild(mkSlider(0.7,1.2,0.05,Voice.pitch,function(x){return Number(x).toFixed(2);},function(x){ Voice.pitch=x; saveVoiceSettings(); }));
      body.appendChild(testBtn());
      body.appendChild(el("div",{style:"margin-top:18px;background:#FFF6E2;border:1px solid var(--gold);border-radius:14px;padding:14px;font-size:13px;line-height:1.55;color:#5b4a25"},[
        el("b",{},["Quer uma voz bem menos robótica, de graça?"]),
        el("div",{style:"margin-top:6px"},["• No PC, abra este arquivo no Microsoft Edge: ele traz vozes neurais 'Francisca' e 'Antônio' (pt-BR), muito mais naturais."]),
        el("div",{style:"margin-top:4px"},["• No iPhone/Mac: Ajustes › Acessibilidade › Conteúdo Falado › Vozes › Português, e baixe uma voz 'Aprimorada/Premium'."]),
        el("div",{style:"margin-top:4px"},["• No Android: instale 'Speech Services by Google' e baixe a voz pt-BR de alta qualidade nas configurações de Texto para Fala."])
      ]));
    } else {
      body.appendChild(lbl("Provedor de voz neural"));
      body.appendChild(mkSelect([{v:"elevenlabs",l:"ElevenLabs (mais natural, funciona no navegador)"},{v:"openai",l:"OpenAI (pode exigir suporte a CORS)"}],Voice.prov,function(val){ Voice.prov=val; saveVoiceSettings(); render(); }));
      body.appendChild(lbl("Sua chave de API"));
      var key=el("input",{type:"password",value:Voice.key,placeholder:"cole sua chave aqui",style:"width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);font-size:14px;font-family:inherit"});
      key.addEventListener("input",function(){ Voice.key=key.value.trim(); saveVoiceSettings(); });
      body.appendChild(key);
      if(Voice.prov==="elevenlabs"){
        body.appendChild(lbl("Voice ID (do painel da ElevenLabs)"));
        var vid=el("input",{type:"text",value:Voice.elVoice,placeholder:"ex.: pNInz6obpgDQGcFmaJgB (Adam)",style:"width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);font-size:14px;font-family:inherit"});
        vid.addEventListener("input",function(){ Voice.elVoice=vid.value.trim(); saveVoiceSettings(); });
        body.appendChild(vid);
        body.appendChild(el("div",{style:"font-size:12px;color:var(--muted);margin-top:6px"},["Vozes prontas (masc.): Adam pNInz6obpgDQGcFmaJgB · Antoni ErXwobaYiN019PkySvjV. Usa o modelo multilíngue, então fala português e inglês."]));
      } else {
        body.appendChild(lbl("Voz"));
        body.appendChild(mkSelect(["alloy","ash","ballad","coral","echo","fable","onyx","nova","sage","shimmer","verse"].map(function(x){return {v:x,l:x};}),Voice.oaiVoice,function(val){ Voice.oaiVoice=val; saveVoiceSettings(); }));
      }
      body.appendChild(testBtn());
      body.appendChild(el("div",{style:"margin-top:16px;background:#EAF4F0;border:1px solid #BcdfD6;border-radius:14px;padding:13px;font-size:12.5px;line-height:1.55;color:#234"},[
        el("b",{},["🔒 Privacidade:"])," sua chave fica salva só neste navegador (localStorage) e é enviada apenas ao provedor que você escolheu, direto do seu aparelho. Custos de uso da API são por conta do provedor."
      ]));
    }
  }
  render();
  card.appendChild(head); card.appendChild(tabs); card.appendChild(body);
  ov.appendChild(card); document.body.appendChild(ov);
}

/* ---------------- RECONHECIMENTO ---------------- */
function getSR(){ return window.SpeechRecognition||window.webkitSpeechRecognition||null; }
function listenOnce(){
  return new Promise(function(resolve,reject){
    var SR=getSR(); if(!SR){ reject(new Error("unsupported")); return; }
    var r=new SR(); r.lang="en-US"; r.interimResults=false; r.maxAlternatives=1; var done=false;
    r.onresult=function(e){ done=true; resolve(e.results[0][0].transcript); };
    r.onerror=function(e){ if(!done) reject(new Error(e.error||"error")); };
    r.onend=function(){ if(!done) reject(new Error("no-speech")); };
    try{ r.start(); }catch(e){ reject(new Error("start-failed")); }
    setTimeout(function(){ try{ r.stop(); }catch(e){} },8000);
  });
}
function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9\s']/g,"").replace(/\s+/g," ").trim(); }
function lev(a,b){ var m=a.length,n=b.length,i,j,dp=[]; for(i=0;i<=m;i++){dp[i]=[i];for(j=1;j<=n;j++)dp[i][j]=0;} for(j=0;j<=n;j++)dp[0][j]=j; for(i=1;i<=m;i++)for(j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]); return dp[m][n]; }
function scorePron(t,s){ t=norm(t);s=norm(s); if(!s)return 0; return Math.max(0,Math.min(100,Math.round((1-lev(t,s)/Math.max(t.length,1))*100))); }

/* ---------------- PROGRESSO ---------------- */
var PKEY="english_videobook_v1", mem={};
function sGet(k){ try{return localStorage.getItem(k);}catch(e){return mem[k]||null;} }
function sSet(k,v){ try{localStorage.setItem(k,v);}catch(e){mem[k]=v;} }
function loadProg(){ var d={done:{},xp:0}; try{var r=sGet(PKEY); return r?Object.assign(d,JSON.parse(r)):d;}catch(e){return d;} }
function saveProg(p){ sSet(PKEY,JSON.stringify(p)); }

/* ===========================================================
   CURRÍCULO COMPLETO  (A1 → C1, ~14 meses)
   =========================================================== */
var LEVELS=[
  {code:"A1",name:"Iniciante",months:"Meses 1–2",color:"var(--teal)",modules:[
    "Sons e fonética do inglês (IPA na prática, TH, vogais)","Verbo to be, pronomes, artigos a/an/the",
    "Presente simples, rotina e advérbios de frequência","Substantivos, plurais e there is / there are",
    "Números, horas, datas, preços e direções","Vocabulário-base: família, casa, comida, corpo"]},
  {code:"A2",name:"Básico",months:"Meses 3–4",color:"var(--gold)",modules:[
    "Presente contínuo e verbos de estado (stative)","Passado simples: regulares e irregulares",
    "Futuro: will, going to e arranjos com -ing","Comparativos e superlativos",
    "Preposições de tempo e lugar (at/in/on)","Quantificadores: some/any/much/many/a few"]},
  {code:"B1",name:"Intermediário",months:"Meses 5–7",color:"var(--coral)",modules:[
    "Present perfect e past perfect (o terror dos brasileiros)","1º e 2º condicionais",
    "Modais: habilidade, conselho, obrigação, dedução","Voz passiva (present/past)",
    "Reported speech — introdução","Phrasal verbs essenciais do dia a dia"]},
  {code:"B2",name:"Intermediário superior",months:"Meses 8–10",color:"var(--teal)",modules:[
    "Todos os perfeitos e contínuos integrados","3º condicional e mixed conditionals",
    "Reported speech completo","Relative clauses (defining e non-defining)",
    "Gerúndio x infinitivo (regras e nuance)","Collocations e linking words para fluência"]},

function el(tag,attrs,children){
  var e=document.createElement(tag); attrs=attrs||{};
  for(var k in attrs){
    if(k==="class") e.className=attrs[k];
    else if(k==="style") e.style.cssText=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.indexOf("on")===0) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  (children||[]).forEach(function(c){ if(c==null)return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

/* YouTube link → ID */
function parseYT(u){
  if(!u) return ""; u=u.trim();
  var m=u.match(/(?:youtu\.be\/|[?&]v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);
  if(m) return m[1];
  if(/^[A-Za-z0-9_-]{11}$/.test(u)) return u;
  return "";
}

/* mic test (English) */
function micTest(target,onScore){
  var supported=!!getSR();
  var box=el("div",{}), result=el("div",{});
  var btn=el("button",{class:"btn",style:"display:inline-flex;align-items:center;gap:9px;background:var(--coral);color:#fff;border-radius:14px;padding:12px 20px;font-size:15px"},[el("span",{class:"recdot"}),"🎤 Falar e ser avaliado"]);
  function setListening(on){
    clear(btn);
    if(on){ btn.style.background="var(--coral-d)"; btn.style.animation="pulse 1.2s infinite"; btn.disabled=true;
      var eq=el("span",{style:"display:inline-flex;gap:3px;align-items:flex-end;height:16px"});
      [0,1,2,3].forEach(function(i){eq.appendChild(el("span",{class:"eqbar",style:"height:16px;animation-delay:"+(i*0.12)+"s"}));});
      btn.appendChild(eq); btn.appendChild(document.createTextNode("Ouvindo… fale agora"));
    }else{ btn.style.background="var(--coral)"; btn.style.animation="none"; btn.disabled=false;
      btn.appendChild(el("span",{class:"recdot"})); btn.appendChild(document.createTextNode("🎤 Falar e ser avaliado")); }
  }
  function run(){
    clear(result); setListening(true);
    listenOnce().then(function(txt){
      setListening(false);
      var sc=scorePron(target,txt), col=sc>=80?"var(--good)":sc>=55?"var(--gold)":"var(--bad)";
      var msg=sc>=80?"Excelente! 🎯":sc>=55?"Quase lá! 👍":"Continue treinando 💪";
      clear(result);
      result.appendChild(el("div",{class:"pop",style:"margin-top:14px;padding:14px;background:#fff;border-radius:14px;border:2px solid "+col},[
        el("div",{style:"display:flex;align-items:center;gap:14px"},[
          el("div",{class:"disp",style:"font-size:34px;font-weight:700;line-height:1;color:"+col},[sc+"%"]),
          el("div",{style:"font-size:14px"},[el("strong",{},[msg]),el("div",{style:"color:var(--muted);margin-top:2px"},["Eu ouvi: “"+(txt||"—")+"”"])])
        ]),
        el("button",{class:"btn",onclick:run,style:"margin-top:10px;background:transparent;color:var(--coral);border:2px solid var(--coral);border-radius:10px;padding:6px 14px;font-size:13px"},["↺ Tentar de novo"])
      ]));
      if(onScore) onScore(sc);
    }).catch(function(e){
      setListening(false);
      var m=e.message;
      var ua=navigator.userAgent;
      var isFile=(location.protocol==="file:");
      var isFF=/firefox/i.test(ua);
      var isOpera=/OPR\//i.test(ua)||/Opera/i.test(ua)||!!window.opr;
      var isBrave=!!(navigator.brave&&navigator.brave.isBrave);
      var txt;
      if(m==="unsupported"||isFF)
        txt="Seu navegador não tem reconhecimento de voz. Use o Google Chrome ou o Microsoft Edge (o Firefox não suporta). Por ora, toque em Ouvir e repita em voz alta.";
      else if(isOpera||isBrave)
        txt="O reconhecimento de voz não funciona no "+(isBrave?"Brave":"Opera")+" — esse recurso só vem habilitado no Chrome, no Edge e no Safari. Abra o curso em um desses navegadores para usar o microfone. O resto do curso (áudio, leitura, testes) funciona normalmente aqui.";
      else if(isFile)
        txt="O microfone está bloqueado porque o arquivo foi aberto direto do disco (file://). O navegador só libera o microfone via http://localhost ou um site https. Veja como resolver na conversa. Por ora, use o botão Ouvir e repita em voz alta.";
      else if(m==="not-allowed"||m==="service-not-allowed")
        txt="Permissão de microfone negada. Toque no ícone de cadeado/câmera na barra de endereço, permita o microfone para este site e recarregue a página.";
      else if(m==="no-speech")
        txt="Não ouvi nada. Fale mais perto do microfone e tente de novo.";
      else if(m==="network")
        txt="O reconhecimento de voz não respondeu. Isso costuma acontecer em navegadores sem o serviço de fala (Opera, Brave). Tente no Chrome ou no Edge, com internet ativa.";
      else
        txt="Não consegui acessar o microfone. Verifique se outro app não está usando o microfone e tente de novo — ou pratique com o botão Ouvir.";
      clear(result);
      var d=el("div",{style:"margin-top:12px;padding:12px;background:#FBEDE9;border-radius:12px;border:1px solid #E7C3B8;font-size:13.5px;color:#7A3322;line-height:1.5"},[txt+" "]);
      d.appendChild(el("button",{class:"btn",onclick:run,style:"background:transparent;color:var(--coral);border:none;text-decoration:underline;font-size:13px"},["tentar de novo"]));
      result.appendChild(d);
      if(onScore) onScore(0); /* libera avanço mesmo sem mic */
    });
  }
  btn.addEventListener("click",run);
  var row=el("div",{style:"display:flex;gap:10px;flex-wrap:wrap;align-items:center"},[btn,enChip(target)]);
  box.appendChild(row); box.appendChild(result);
  if(!supported) box.appendChild(el("p",{style:"font-size:12.5px;color:var(--muted);margin-top:8px"},["ⓘ Sem microfone? Toque em Ouvir e repita em voz alta — funciona muito bem."]));
  return box;
}
