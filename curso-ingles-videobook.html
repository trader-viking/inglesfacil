<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Mission App — Professor Alex Edition</title>
<style>
:root {
  --bg:#f3f6fb; --card:#ffffff; --text:#172033; --muted:#67728a; --line:#dde4f0;
  --primary:#1a237e; --primary2:#3949ab; --accent:#00c853; --warn:#ff9800; --danger:#e53935;
  --radius:16px; --shadow:0 12px 36px rgba(18, 25, 43, .08);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); }
button, select, textarea, input { font:inherit; }
button { cursor:pointer; }
.layout { display:flex; min-height:100vh; }
.sidebar { width:280px; background:linear-gradient(180deg,#101848 0%, #1a237e 50%, #283593 100%); color:#fff; padding:18px 16px; position:fixed; inset:0 auto 0 0; overflow-y:auto; z-index:10; }
.brand { display:flex; gap:14px; align-items:center; padding:8px 8px 18px 8px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:14px; }
.brand-badge { width:58px; height:58px; border-radius:18px; display:grid; place-items:center; background:rgba(255,255,255,.1); }
.brand-badge svg { width:42px; height:42px; }
.brand h1 { font-size:1.07rem; line-height:1.15; }
.brand small { color:rgba(255,255,255,.75); display:block; margin-top:4px; }
.teacher-mini { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:14px; margin-bottom:14px; }
.teacher-mini .avatar { width:100%; aspect-ratio:1.4/1; border-radius:14px; background:linear-gradient(135deg,#25339e,#4357cc); display:grid; place-items:center; margin-bottom:10px; overflow:hidden; }
.teacher-mini .avatar svg { width:120px; height:90px; }
.teacher-mini h3 { font-size:1rem; margin-bottom:4px; }
.teacher-mini p { font-size:.83rem; line-height:1.45; color:rgba(255,255,255,.82); }
.teacher-mini .voice-note { margin-top:10px; font-size:.76rem; color:#d5ddff; background:rgba(0,0,0,.15); padding:8px 10px; border-radius:12px; }
.nav { display:grid; gap:8px; }
.nav button { color:#fff; background:transparent; border:none; display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:12px; text-align:left; transition:.2s; }
.nav button:hover, .nav button.active { background:rgba(255,255,255,.12); }
.nav .emoji { width:24px; text-align:center; font-size:1.05rem; }
.mobile-toggle { display:none; position:fixed; top:14px; left:14px; width:44px; height:44px; border:none; border-radius:14px; background:var(--primary); color:#fff; z-index:20; box-shadow:var(--shadow); }
.main { flex:1; margin-left:280px; padding:26px 28px 52px; min-width:0; }
.page { display:none; }
.page.active { display:block; animation:fadeIn .25s ease; }
.header { margin-bottom:20px; display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap; }
.header h2 { font-size:1.72rem; color:var(--primary); margin-bottom:5px; }
.header p { color:var(--muted); max-width:780px; line-height:1.55; }
.grid { display:grid; gap:18px; }
.g2 { grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); }
.g3 { grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); }
.g4 { grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); }
.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; border:1px solid var(--line); }
.card h3 { color:var(--primary); margin-bottom:10px; }
.card p { color:var(--muted); line-height:1.6; }
.stat { border-top:4px solid var(--primary2); text-align:center; }
.stat .value { font-size:2rem; font-weight:800; color:var(--primary); margin-top:6px; }
.stat .label { color:var(--muted); font-size:.86rem; }
.stat.green { border-top-color:var(--accent); }
.stat.orange { border-top-color:var(--warn); }
.stat.red { border-top-color:var(--danger); }
.hero { background:linear-gradient(135deg,#ffffff,#eef2ff); overflow:hidden; position:relative; }
.hero::after { content:''; position:absolute; width:180px; height:180px; right:-50px; top:-50px; background:radial-gradient(circle, rgba(57,73,171,.14), transparent 70%); }
.hero-wrap { display:grid; grid-template-columns:1.25fr .85fr; gap:16px; align-items:center; }
.hero .teacher-big { display:flex; gap:16px; align-items:center; }
.hero .avatar-big { width:100px; height:100px; border-radius:24px; background:linear-gradient(135deg,#2a38a1,#4e62d7); display:grid; place-items:center; flex:0 0 auto; box-shadow:var(--shadow); }
.hero .avatar-big svg { width:86px; height:86px; }
.hero-tip { font-size:.86rem; color:#44516e; background:#fff; border:1px solid var(--line); padding:10px 12px; border-radius:14px; margin-top:12px; display:flex; gap:8px; align-items:flex-start; }
.hero-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
.btn { border:none; border-radius:12px; padding:11px 16px; font-weight:700; transition:.2s ease; }
.btn.primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; }
.btn.green { background:linear-gradient(135deg,#00a941,#34d46d); color:#fff; }
.btn.outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
.btn.danger { background:linear-gradient(135deg,#d32f2f,#f0625d); color:#fff; }
.btn.small { padding:7px 11px; font-size:.81rem; border-radius:10px; font-weight:700; }
.btn.ghost { background:#eef2ff; color:var(--primary); }
.progress-block { margin-top:6px; }
.progress-row { display:flex; justify-content:space-between; margin-bottom:6px; font-size:.84rem; color:var(--muted); }
.progress { height:12px; border-radius:999px; background:#e8edf7; overflow:hidden; }
.progress > span { display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#00c853,#69f0ae); position:relative; }
.progress > span::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent); animation:shine 2s infinite; }
.tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.tab { background:#fff; border:2px solid var(--line); border-radius:999px; padding:9px 15px; font-weight:700; color:#46516d; }
.tab.active { border-color:var(--primary); color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); }
.lesson-card { position:relative; overflow:hidden; cursor:pointer; transition:.2s; }
.lesson-card:hover { transform:translateY(-3px); }
.lesson-card.done { border-color:#ccf1d7; box-shadow:0 10px 30px rgba(0,200,83,.08); }
.lesson-card .top { display:flex; justify-content:space-between; gap:10px; margin-bottom:10px; }
.lesson-card .icon { font-size:2rem; opacity:.85; }
.lesson-card .badge { font-size:.73rem; font-weight:800; color:#1967d2; background:#eaf1ff; padding:5px 9px; border-radius:999px; }
.lesson-card.done .badge { color:#056d2a; background:#e6f8ed; }
.lesson-card h4 { color:var(--primary); margin-bottom:6px; }
.lesson-card p { color:var(--muted); font-size:.88rem; min-height:56px; }
.lesson-card .lesson-meta { display:flex; justify-content:space-between; margin-top:14px; color:var(--muted); font-size:.8rem; }
.teacher-panel { display:grid; grid-template-columns:300px 1fr; gap:18px; align-items:stretch; }
.teacher-card { background:linear-gradient(135deg,var(--primary),#4357cc); color:#fff; border-radius:22px; padding:18px; min-height:100%; position:relative; overflow:hidden; }
.teacher-card::after { content:''; position:absolute; right:-30px; bottom:-30px; width:160px; height:160px; background:radial-gradient(circle, rgba(255,255,255,.12), transparent 70%); }
.teacher-top { display:flex; gap:14px; align-items:center; margin-bottom:14px; }
.teacher-avatar { width:82px; height:82px; border-radius:22px; background:rgba(255,255,255,.12); display:grid; place-items:center; border:1px solid rgba(255,255,255,.1); }
.teacher-avatar svg { width:70px; height:70px; }
.teacher-card h3 { color:#fff; margin-bottom:4px; }
.teacher-card p { color:#eff2ff; font-size:.9rem; line-height:1.55; }
.teacher-actions { display:grid; gap:8px; margin-top:16px; position:relative; z-index:1; }
.teacher-actions .btn { width:100%; justify-content:center; }
.teacher-voice-chip { display:inline-flex; align-items:center; gap:8px; margin-top:12px; background:rgba(255,255,255,.12); border-radius:999px; padding:7px 12px; font-size:.78rem; }
.lesson-flow { display:grid; gap:16px; }
.segment { background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px; }
.segment h4 { color:var(--primary); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.segment p { color:var(--muted); }
.vocab-list, .dialog-list { display:grid; gap:10px; }
.vocab-item, .dialog-item, .phrase-item { display:flex; gap:12px; padding:12px 13px; border:1px solid var(--line); border-radius:14px; align-items:flex-start; background:#fafcff; }
.vocab-item:hover, .dialog-item:hover, .phrase-item:hover { border-color:#cad7ef; background:#f5f8ff; }
.vocab-item .term { min-width:130px; font-weight:800; color:var(--primary); }
.vocab-item .translation, .dialog-item .translation { color:var(--muted); flex:1; }
.dialog-item strong { color:var(--text); display:block; margin-bottom:4px; }
.reading-box { padding:14px 16px; border-radius:16px; background:#f8fbff; border:1px solid var(--line); line-height:1.75; }
.quiz-item { border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; background:#fff; }
.quiz-item h5 { margin-bottom:10px; color:var(--text); font-size:1rem; }
.option { padding:10px 12px; border:2px solid var(--line); border-radius:12px; margin-top:8px; font-size:.9rem; transition:.15s; }
.option:hover { border-color:#b8c8ea; background:#f7faff; }
.option.correct { border-color:#9fe1b9; background:#ecfff2; }
.option.wrong { border-color:#f3a6a6; background:#fff0f0; }
textarea.input { width:100%; min-height:110px; border:2px solid var(--line); border-radius:16px; padding:14px; resize:vertical; margin-top:10px; }
.teacher-note { margin-top:12px; background:#fff7e8; color:#7a5a00; border:1px solid #ffe1ab; padding:11px 12px; border-radius:14px; font-size:.88rem; }
.voice-grid { display:grid; grid-template-columns:1.2fr .8fr; gap:18px; }
.voice-select { width:100%; border:2px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
.voice-sample { margin-top:14px; display:grid; gap:12px; }
.voice-pill-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.voice-pill { padding:6px 10px; border-radius:999px; background:#eef2ff; color:var(--primary); font-size:.78rem; font-weight:700; }
.inline-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
.notice { display:flex; gap:10px; align-items:flex-start; padding:14px 16px; background:#fffef6; border:1px solid #f2e4a8; border-radius:16px; font-size:.9rem; color:#675515; }
.mission-list { display:grid; gap:10px; }
.mission-item { display:flex; align-items:center; gap:12px; background:#fafcff; border:1px solid var(--line); border-radius:14px; padding:13px; }
.mission-item.done { background:#f0fff5; border-color:#c7eeda; }
.mission-item input { width:20px; height:20px; accent-color:var(--accent); }
.mission-text { flex:1; color:var(--text); }
.mission-points { font-size:.78rem; font-weight:800; color:#0a7a30; background:#e6faef; padding:4px 9px; border-radius:999px; }
.settings-grid { display:grid; gap:16px; }
.setting-row { display:flex; justify-content:space-between; align-items:center; gap:16px; border-bottom:1px solid var(--line); padding:14px 0; }
.setting-row:last-child { border-bottom:none; }
.pill { display:inline-flex; align-items:center; gap:8px; background:#eef2ff; color:var(--primary); padding:8px 12px; border-radius:999px; font-weight:700; font-size:.82rem; }
.toast { position:fixed; top:18px; right:18px; padding:14px 18px; border-radius:14px; color:#fff; font-weight:700; box-shadow:var(--shadow); transform:translateX(120%); transition:.25s; z-index:30; }
.toast.show { transform:translateX(0); }
.toast.success { background:linear-gradient(135deg,#00a941,#26ca61); }
.toast.info { background:linear-gradient(135deg,#1a237e,#4357cc); }
.confetti { position:fixed; top:-12px; width:10px; height:10px; z-index:40; animation:confetti 3.2s linear forwards; }
.hidden { display:none !important; }
@keyframes shine { 0%{ transform:translateX(-100%); } 100%{ transform:translateX(100%); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes bob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
@keyframes confetti { from { transform:translateY(-10px) rotate(0deg); opacity:1; } to { transform:translateY(110vh) rotate(760deg); opacity:0; } }
.bob { animation:bob 2.8s ease-in-out infinite; }
@media (max-width: 1080px) { .teacher-panel, .voice-grid, .hero-wrap { grid-template-columns:1fr; } }
@media (max-width: 860px) {
  .mobile-toggle { display:grid; place-items:center; }
  .sidebar { transform:translateX(-100%); transition:.25s; }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; padding:72px 16px 40px; }
}
</style>
</head>

<button class="mobile-toggle" id="mobileBtn">☰</button>
<div class="toast info" id="toast"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">

      </div>
      <div>

        <small>Professor Alex Edition</small>

      <button data-page="voice"><span class="emoji">🎙️</span><span>Vozes Reais</span></button>
      <button data-page="it"><span class="emoji">💻</span><span>English for IT</span></button>
      <button data-page="missions"><span class="emoji">🎯</span><span>Missões Diárias</span></button>
      <button data-page="settings"><span class="emoji">⚙️</span><span>Configurações</span></button>
    </nav>
  </aside>
  <main class="main">
    <section class="page active" id="page-dashboard"></section>
    <section class="page" id="page-lessons"></section>
    <section class="page" id="page-voice"></section>
    <section class="page" id="page-it"></section>
    <section class="page" id="page-missions"></section>
    <section class="page" id="page-settings"></section>
  </main>
</div>

const state = { currentPage:'dashboard', currentLevel:'basic', selectedLessonId:null, selectedVoiceURI:'', voices:[], autoTeacher:true, speechRate:0.96, speechPitch:1, completedLessons:[], score:0, missionCount:0, missionTasks:{}, teacherPlayedLessons:[] };

function byId(id){ return document.getElementById(id); }
function escapeHtml(str){ return String(str).replace(/[&<>\"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function loadState(){ try{ const saved = JSON.parse(localStorage.getItem('english_professor_state') || '{}'); Object.assign(state, saved);}catch(e){ console.warn(e);} }
function saveState(){ localStorage.setItem('english_professor_state', JSON.stringify({ currentPage:state.currentPage, currentLevel:state.currentLevel, selectedLessonId:state.selectedLessonId, selectedVoiceURI:state.selectedVoiceURI, autoTeacher:state.autoTeacher, speechRate:state.speechRate, speechPitch:state.speechPitch, completedLessons:state.completedLessons, score:state.score, missionCount:state.missionCount, missionTasks:state.missionTasks, teacherPlayedLessons:state.teacherPlayedLessons })); }
function toast(msg, type='info'){ const el=byId('toast'); el.textContent=msg; el.className='toast '+type+' show'; setTimeout(()=>el.classList.remove('show'),2800); }
function addConfetti(){ const colors=['#00c853','#1a237e','#ff9800','#e53935','#8e24aa']; for(let i=0;i<24;i++){ const d=document.createElement('div'); d.className='confetti'; d.style.left=(Math.random()*100)+'vw'; d.style.background=colors[Math.floor(Math.random()*colors.length)]; d.style.animationDelay=(Math.random()*0.2)+'s'; d.style.animationDuration=(2.4+Math.random()*1.4)+'s'; if(Math.random()>0.5) d.style.borderRadius='50%'; document.body.appendChild(d); setTimeout(()=>d.remove(),4300);} }
function incrementScore(points){ state.score += points; saveState(); }
function isLessonDone(id){ return state.completedLessons.includes(id); }
function markLessonDone(id){ if(!isLessonDone(id)){ state.completedLessons.push(id); incrementScore(50); state.missionCount += 1; addConfetti(); toast('Aula concluída! +50 pontos','success'); saveState(); } }
function getPreferredVoice(){ if(!state.voices.length) return null; let voice = state.voices.find(v=>v.voiceURI===state.selectedVoiceURI); if(voice) return voice; const preferred = state.voices.find(v=>/Microsoft|Google|Natural|Neural/i.test(v.name) && /^en/i.test(v.lang)); if(preferred) return preferred; voice = state.voices.find(v=>/^en/i.test(v.lang)); return voice || state.voices[0] || null; }
function loadVoices(){ const list = window.speechSynthesis ? speechSynthesis.getVoices() : []; state.voices = list || []; if(!state.selectedVoiceURI && state.voices.length){ const first = getPreferredVoice(); state.selectedVoiceURI = first ? first.voiceURI : state.voices[0].voiceURI; } saveState(); renderVoicePage(); }
function stopSpeech(){ try{ speechSynthesis.cancel(); }catch(e){} }
function speakText(text, options={}){ if(!('speechSynthesis' in window)){ toast('Este navegador não suporta SpeechSynthesis.', 'info'); return; } stopSpeech(); const utter = new SpeechSynthesisUtterance(text); const voice = getPreferredVoice(); if(voice) utter.voice = voice; utter.lang = options.lang || (voice ? voice.lang : 'en-US'); utter.rate = options.rate || state.speechRate || 1; utter.pitch = options.pitch || state.speechPitch || 1; utter.volume = 1; if(typeof options.onend==='function') utter.onend = options.onend; speechSynthesis.speak(utter); }
function speakSequence(parts){ if(!parts || !parts.length) return; let idx=0; const playNext=()=>{ if(idx>=parts.length) return; const text=parts[idx++]; speakText(text,{onend:playNext}); }; playNext(); }
function playTeacherIntro(lesson){ const script=[lesson.teacherScript.intro, lesson.teacherScript.explain, lesson.teacherScript.practice]; speakSequence(script); if(!state.teacherPlayedLessons.includes(lesson.id)) state.teacherPlayedLessons.push(lesson.id); incrementScore(10); saveState(); toast('Professor Alex iniciou a explicação.', 'info'); }
function playTeacherFullLesson(lesson){ const vocabLine='Vocabulário principal: '+lesson.vocab.map(v=>`${v.en} significa ${v.pt}`).join('. ')+'.'; const dialogLine='Agora o diálogo guiado: '+lesson.dialogs.map(d=>d.en).join(' '); speakSequence([lesson.teacherScript.intro, lesson.teacherScript.explain, vocabLine, dialogLine, lesson.teacherScript.practice, lesson.teacherScript.wrap]); if(!state.teacherPlayedLessons.includes(lesson.id)) state.teacherPlayedLessons.push(lesson.id); incrementScore(15); saveState(); toast('Professor Alex está conduzindo a aula completa.','info'); }
function setPage(page){ state.currentPage=page; document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); const current=byId('page-'+page); if(current) current.classList.add('active'); document.querySelectorAll('.nav button').forEach(btn=>btn.classList.toggle('active', btn.dataset.page===page)); render(); saveState(); byId('sidebar').classList.remove('open'); }
function summaryByLevel(level){ const list=lessons.filter(l=>l.level===level); const done=list.filter(l=>state.completedLessons.includes(l.id)).length; return {done, total:list.length, pct:Math.round((done/list.length)*100)}; }
function nextLesson(){ return lessons.find(l=>!state.completedLessons.includes(l.id)) || lessons[0]; }

'<div class="grid g4" style="margin-top:18px;"><div class="card stat green"><div>📚</div><div class="value">'+state.completedLessons.length+'</div><div class="label">Aulas concluídas</div></div><div class="card stat"><div>🎯</div><div class="value">'+state.missionCount+'</div><div class="label">Missões completas</div></div><div class="card stat orange"><div>⭐</div><div class="value">'+state.score+'</div><div class="label">Pontuação total</div></div><div class="card stat red"><div>🎙️</div><div class="value">'+state.teacherPlayedLessons.length+'</div><div class="label">Aulas conduzidas pelo professor</div></div></div>'+

function renderLessonList(){ const page=byId('page-lessons'); const levelButtons=[{key:'basic',label:'📘 Básico'},{key:'intermediate',label:'📙 Intermediário'},{key:'advanced',label:'📕 Avançado'}].map(item=>'<button class="tab '+(state.currentLevel===item.key?'active':'')+'" onclick="changeLevel(\''+item.key+'\')">'+item.label+'</button>').join(''); const list=lessons.filter(l=>l.level===state.currentLevel); const cards=list.map(l=>{ const done=isLessonDone(l.id); const teacherDone=state.teacherPlayedLessons.includes(l.id); return '<article class="card lesson-card '+(done?'done':'')+'" onclick="openLesson(\''+l.id+'\')"><div class="top"><div class="badge">'+l.levelLabel+'</div><div class="icon">'+l.icon+'</div></div><h4>'+l.title+'</h4><p>'+l.desc+'</p><div class="lesson-meta"><span>'+(teacherDone?'🎙️ Professor passou por aqui':'👨‍🏫 Aula guiada disponível')+'</span><span>'+(done?'✅ Concluída':'▶️ Abrir')+'</span></div></article>'; }).join(''); page.innerHTML='<div class="header"><div><h2>Aulas com Professor</h2><p>Cada aula tem roteiro completo do Professor Alex: abertura, explicação conceitual, vocabulário guiado, prática e fechamento com revisão. Você pode abrir qualquer aula e deixar o professor conduzir tudo em voz alta.</p></div><span class="pill">'+lessons.length+' aulas disponíveis</span></div><div class="tabs">'+levelButtons+'</div><div class="grid g3">'+cards+'</div>'; }
function changeLevel(level){ state.currentLevel=level; state.selectedLessonId=null; saveState(); renderLessonList(); }
function openLesson(id){ state.selectedLessonId=id; saveState(); const lesson=lessons.find(l=>l.id===id); if(!lesson) return; setPage('lessons'); renderLessonDetail(lesson); if(state.autoTeacher) setTimeout(()=>playTeacherIntro(lesson),220); }
function renderLessonDetail(lesson){ const page=byId('page-lessons'); const teacherVoice=getPreferredVoice(); const vocabHtml=lesson.vocab.map(v=>'<div class="vocab-item"><div class="term">'+v.en+'</div><div class="translation">'+v.pt+'</div><button class="btn small outline" onclick="speakText(\''+v.en.replace(/'/g,"\\'")+'\')">🔊</button></div>').join(''); const dialogHtml=lesson.dialogs.map(d=>'<div class="dialog-item"><div style="font-size:1.15rem;">💬</div><div style="flex:1;"><strong>'+d.en+'</strong><div class="translation">'+d.pt+'</div></div><button class="btn small outline" onclick="speakText(\''+d.en.replace(/'/g,"\\'")+'\')">🔊</button></div>').join(''); const quizHtml=lesson.quiz.map((q,qi)=>'<div class="quiz-item" data-qindex="'+qi+'"><h5>'+(qi+1)+'. '+q.question+'</h5>'+q.options.map((opt,oi)=>'<div class="option" onclick="checkOption(this,'+qi+','+oi+',\''+lesson.id+'\')">'+opt+'</div>').join('')+'</div>').join(''); page.innerHTML='<div class="header"><div><h2>'+lesson.icon+' '+lesson.title+'</h2><p>'+lesson.desc+' — Nesta aula, o Professor Alex explica o tema, conduz a repetição, narra o diálogo e fecha com revisão guiada.</p></div><div class="inline-actions"><button class="btn outline" onclick="state.selectedLessonId=null; renderLessonList();">← Voltar à trilha</button><button class="btn green" onclick="completeLesson(\''+lesson.id+'\')">✅ Marcar como concluída</button></div></div>'+
'<div class="teacher-panel"><aside class="teacher-card"><div class="teacher-top"><div class="teacher-avatar"><svg viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="30" r="16" fill="#ffd8bc"></circle><path d="M34 29 q16 -18 32 0 v-8 q-16 -12 -32 0z" fill="#eef2ff"></path><circle cx="44" cy="30" r="2.3" fill="#1b2436"></circle><circle cx="56" cy="30" r="2.3" fill="#1b2436"></circle><path d="M44 39 q6 4 12 0" fill="none" stroke="#1b2436" stroke-width="2"></path><rect x="41" y="46" width="18" height="27" rx="8" fill="#fff"></rect><rect x="44" y="48" width="12" height="25" rx="6" fill="#67f0a6"></rect><path d="M27 84 q10 -16 23 -16 q13 0 23 16" fill="#eef3ff"></path></svg></div><div><h3>'+teacher.name+'</h3><p>'+lesson.teacherScript.intro+'</p></div></div><p>Eu vou conduzir esta aula com uma sequência didática clara. Você pode me ouvir explicando somente a teoria ou deixar que eu conduza tudo.</p><div class="teacher-voice-chip">🎙️ Voz atual: '+(teacherVoice?teacherVoice.name:'Padrão do navegador')+'</div><div class="teacher-actions"><button class="btn green" onclick="playTeacherIntro(lessons.find(l=>l.id===\''+lesson.id+'\'))">🎤 Professor explicar</button><button class="btn primary" onclick="playTeacherFullLesson(lessons.find(l=>l.id===\''+lesson.id+'\'))">▶️ Conduzir aula completa</button><button class="btn outline" onclick="stopSpeech()">⏹️ Parar áudio</button><button class="btn outline" onclick="setPage(\'voice\')">🗣️ Trocar voz</button></div></aside><div class="lesson-flow">'+
'<div class="segment"><h4>🎯 Objetivo da aula</h4><p>'+lesson.objective+'</p><div class="teacher-note">💬 Dica do professor: primeiro escute, depois repita. Sua prioridade aqui é falar com clareza, não velocidade.</div></div>'+
'<div class="segment"><h4>🧠 Explicação do professor</h4><p>'+lesson.teacherScript.explain+'</p><div class="inline-actions"><button class="btn primary small" onclick="speakText(lessons.find(l=>l.id===\''+lesson.id+'\').teacherScript.explain)">🔊 Ouvir explicação</button><button class="btn ghost small" onclick="speakText(lessons.find(l=>l.id===\''+lesson.id+'\').teacherScript.practice)">🔄 Ouvir instrução de prática</button></div></div>'+
'<div class="segment"><h4>📝 Vocabulário guiado</h4><div class="vocab-list">'+vocabHtml+'</div><div class="inline-actions"><button class="btn ghost small" onclick="speakText(\'Vocabulary practice. \'+ lessons.find(l=>l.id===\''+lesson.id+'\').vocab.map(v=>v.en).join(\'. \'))">📚 Ler vocabulário</button></div></div>'+
'<div class="segment"><h4>🗣️ Diálogo conduzido</h4><div class="dialog-list">'+dialogHtml+'</div><div class="teacher-note">🎯 Professor Alex: repita cada frase em voz alta pelo menos 2 vezes antes de seguir.</div></div>'+
'<div class="segment"><h4>📖 Leitura com professor</h4><div class="reading-box">'+lesson.reading.en+'</div><div class="reading-box" style="margin-top:10px;background:#fffaf0;">'+lesson.reading.pt+'</div><div class="inline-actions"><button class="btn primary small" onclick="speakText(lessons.find(l=>l.id===\''+lesson.id+'\').reading.en)">🔊 Ler texto</button></div></div>'+
'<div class="segment"><h4>📋 Mini teste</h4>'+quizHtml+'</div>'+
'<div class="segment"><h4>✍️ Produção escrita guiada</h4><p>'+lesson.writing.prompt+'</p><textarea class="input" id="write-'+lesson.id+'" placeholder="Escreva aqui sua resposta em inglês..."></textarea><div class="inline-actions"><button class="btn primary small" onclick="reviewWriting(\''+lesson.id+'\')">✅ Professor revisar</button><button class="btn ghost small" onclick="speakText(lessons.find(l=>l.id===\''+lesson.id+'\').writing.sample)">🎧 Ouvir resposta modelo</button></div><div id="write-feedback-'+lesson.id+'"></div></div>'+
'<div class="segment"><h4>🏁 Fechamento do professor</h4><p>'+lesson.teacherScript.wrap+'</p><div class="inline-actions"><button class="btn green" onclick="completeLesson(\''+lesson.id+'\')">✅ Concluir aula</button><button class="btn outline" onclick="speakText(lessons.find(l=>l.id===\''+lesson.id+'\').teacherScript.wrap)">🔊 Ouvir fechamento</button></div></div>'+
'</div></div>'; }
function checkOption(el,qIndex,optionIndex,lessonId){ const lesson=lessons.find(l=>l.id===lessonId); const q=lesson.quiz[qIndex]; const parent=el.parentElement; [...parent.querySelectorAll('.option')].forEach((opt,idx)=>{ opt.classList.remove('correct','wrong'); if(idx===q.answer) opt.classList.add('correct'); if(idx===optionIndex && idx!==q.answer) opt.classList.add('wrong'); opt.style.pointerEvents='none'; }); if(optionIndex===q.answer){ incrementScore(10); toast('Resposta correta! +10 pontos','success'); } else { toast('Quase! A correta foi destacada.','info'); } saveState(); }
function reviewWriting(lessonId){ const lesson=lessons.find(l=>l.id===lessonId); const input=byId('write-'+lessonId); const target=byId('write-feedback-'+lessonId); const value=(input.value||'').toLowerCase(); const found=lesson.writing.keywords.filter(k=>value.includes(k.toLowerCase())); const missing=lesson.writing.keywords.filter(k=>!value.includes(k.toLowerCase())); const score=Math.round((found.length/Math.max(1,lesson.writing.keywords.length))*100); target.innerHTML='<div class="teacher-note" style="margin-top:12px; border-radius:16px; background:#f8fbff; border:1px solid var(--line); color:var(--text);"><strong>Professor Alex avaliou:</strong><br>Nota estimada: <strong>'+score+' / 100</strong><br>'+(found.length?'✅ Palavras identificadas: '+found.join(', ')+'<br>':'')+(missing.length?'🟡 Ainda falta usar: '+missing.join(', ')+'<br>':'')+'<br><strong>Resposta modelo:</strong> '+lesson.writing.sample+'</div>'; incrementScore(10); saveState(); }
function completeLesson(id){ markLessonDone(id); render(); }
function renderVoicePage(){ const voices=state.voices||[]; const selected=getPreferredVoice(); byId('page-voice').innerHTML='<div class="header"><div><h2>Vozes Reais do Professor</h2><p>Este app usa as vozes reais que o navegador e o sistema operacional disponibilizam. Se seu Edge/Chrome expõe vozes mais naturais (como vozes Microsoft/Google em inglês), você pode selecioná-las abaixo para o Professor Alex conduzir as aulas com uma voz mais humana.</p></div><span class="pill">'+voices.length+' vozes detectadas</span></div><div class="voice-grid"><div class="card"><h3>Selecionar voz do professor</h3><p>Escolha uma voz em inglês da lista. Se houver vozes “Microsoft”, “Google”, “Neural” ou “Natural”, normalmente elas soam mais realistas.</p><select class="voice-select" id="voiceSelect"></select><div class="voice-sample"><label><strong>Texto de teste</strong></label><textarea class="input" id="voiceSample" placeholder="Digite um texto de teste em inglês...">Hello! I am Professor Alex. Today I will explain your lesson and guide your speaking practice step by step.</textarea><div class="inline-actions"><button class="btn primary" onclick="testVoice()">🔊 Testar voz</button><button class="btn outline" onclick="stopSpeech()">⏹️ Parar</button><button class="btn ghost" onclick="suggestBestVoice()">✨ Sugerir a melhor voz</button></div></div><div class="notice" style="margin-top:16px;"><div>💡</div><div><strong>Importante:</strong> dentro de um HTML puro eu não consigo baixar vozes externas automaticamente. Então a forma mais segura e profissional de usar “vozes reais” é aproveitar as vozes do próprio navegador/sistema. Quanto melhor a voz instalada, melhor ficará o professor.</div></div></div><div class="card"><h3>Diagnóstico de voz</h3><div class="phrase-item"><div>🎧</div><div><strong>Voz ativa</strong><br><span class="translation">'+(selected ? (selected.name+' — '+selected.lang) : 'Padrão do navegador')+'</span></div></div><div class="phrase-item"><div>⚙️</div><div><strong>Velocidade</strong><br><span class="translation">'+state.speechRate.toFixed(2)+'x</span></div></div><div class="phrase-item"><div>🎚️</div><div><strong>Tom</strong><br><span class="translation">'+state.speechPitch.toFixed(2)+'</span></div></div><div class="phrase-item"><div>📣</div><div><strong>Autoexplicação</strong><br><span class="translation">'+(state.autoTeacher?'Ativada':'Desativada')+'</span></div></div><h3 style="margin-top:16px;">Vozes em inglês detectadas</h3><div class="voice-pill-list">'+((voices.filter(v=>/^en/i.test(v.lang)).slice(0,16).map(v=>'<span class="voice-pill">'+v.name+'</span>').join('')) || '<span class="voice-pill">Nenhuma voz em inglês detectada ainda</span>')+'</div></div></div>'; const select=byId('voiceSelect'); if(!select) return; select.innerHTML = (voices.length ? voices : [{name:'Padrão do navegador', voiceURI:''}]).map(v=>'<option value="'+(v.voiceURI||'')+'">'+escapeHtml(v.name||'Padrão')+(v.lang ? ' — '+v.lang : '')+'</option>').join(''); select.value = state.selectedVoiceURI || ''; select.onchange=()=>{ state.selectedVoiceURI=select.value; saveState(); toast('Voz atualizada para o professor.','success'); renderVoicePage(); }; }
function testVoice(){ const input=byId('voiceSample'); speakText(input ? input.value : 'Hello! I am Professor Alex.'); }
function suggestBestVoice(){ const preferred=getPreferredVoice(); if(preferred){ state.selectedVoiceURI=preferred.voiceURI; saveState(); renderVoicePage(); toast('Voz sugerida: '+preferred.name,'success'); } else { toast('Nenhuma voz detectada ainda. Tente recarregar a página.','info'); } }
function playWelcome(){ speakText(teacher.welcome+' '+teacher.tip); }
function renderITPage(){ byId('page-it').innerHTML='<div class="header"><div><h2>English for IT Support</h2><p>O Professor Alex também guia módulos específicos para suporte de TI, com frases prontas para atendimento, troubleshooting, atualização de casos e comunicação profissional com usuários.</p></div><span class="pill">'+itModules.length+' módulos focados em TI</span></div><div class="grid g2">'+itModules.map((m,idx)=>'<div class="card"><h3>'+m.icon+' '+m.title+'</h3><div class="vocab-list">'+m.lines.map(line=>'<div class="phrase-item"><div style="font-size:1rem;">💬</div><div style="flex:1;"><strong>'+line+'</strong></div><button class="btn small outline" onclick="speakText(\''+line.replace(/'/g,"\\'")+'\')">🔊</button></div>').join('')+'</div><div class="inline-actions"><button class="btn primary small" onclick="speakSequence(itModules['+idx+'].lines)">🎙️ Professor ler módulo</button></div></div>').join('')+'</div>'; }
function missionTemplate(){ const next=nextLesson(); return [{id:'m1', text:'Ouvir a explicação do professor em uma aula', points:10},{id:'m2', text:'Concluir a aula recomendada: '+next.title, points:20},{id:'m3', text:'Praticar o diálogo lendo em voz alta', points:10},{id:'m4', text:'Usar a aba “Vozes Reais” e testar uma voz', points:10}]; }
function toggleMission(id,points){ state.missionTasks[id]=!state.missionTasks[id]; if(state.missionTasks[id]) incrementScore(points); saveState(); renderMissionPage(); }
function finishMission(){ state.missionCount += 1; incrementScore(50); addConfetti(); saveState(); toast('Missão diária concluída! +50 pontos','success'); renderMissionPage(); }
function renderMissionPage(){ const tasks=missionTemplate(); const allDone=tasks.every(t=>state.missionTasks[t.id]); byId('page-missions').innerHTML='<div class="header"><div><h2>Missões Diárias</h2><p>Combine professor + voz + prática. Essas missões ajudam você a realmente usar o formato novo das aulas com professor conduzindo tudo.</p></div><span class="pill">'+state.missionCount+' missões concluídas</span></div><div class="card"><h3>Missão do dia</h3><div class="mission-list">'+tasks.map(task=>'<label class="mission-item '+(state.missionTasks[task.id]?'done':'')+'"><input type="checkbox" '+(state.missionTasks[task.id]?'checked':'')+' onchange="toggleMission(\''+task.id+'\','+task.points+')"><span class="mission-text">'+task.text+'</span><span class="mission-points">+'+task.points+'</span></label>').join('')+'</div><div class="inline-actions" style="margin-top:16px;"><button class="btn green '+(allDone?'':'hidden')+'" onclick="finishMission()">✅ Finalizar missão</button><button class="btn outline" onclick="setPage(\'lessons\')">📚 Ir para aulas</button><button class="btn outline" onclick="setPage(\'voice\')">🎙️ Ir para vozes</button></div></div>'; }
function renderSettingsPage(){ byId('page-settings').innerHTML='<div class="header"><div><h2>Configurações do Professor</h2><p>Defina como o Professor Alex deve agir ao abrir uma aula e ajuste a naturalidade da fala conforme sua preferência.</p></div></div><div class="card settings-grid"><div class="setting-row"><div><strong>Autoexplicação ao abrir aula</strong><p>Quando ativado, o Professor Alex começa a explicar a aula sozinho assim que você abre.</p></div><label class="pill"><input type="checkbox" id="autoTeacherChk" '+(state.autoTeacher?'checked':'')+'> Auto</label></div><div class="setting-row"><div><strong>Velocidade da fala</strong><p>Ideal para deixar o professor mais pausado ou mais dinâmico.</p></div><div style="display:flex;align-items:center;gap:10px;min-width:220px;"><input type="range" id="rateRange" min="0.7" max="1.2" step="0.02" value="'+state.speechRate+'" style="width:160px;"><strong id="rateValue">'+state.speechRate.toFixed(2)+'x</strong></div></div><div class="setting-row"><div><strong>Tom da voz</strong><p>Ajuste fino para tornar a voz ligeiramente mais grave ou aguda.</p></div><div style="display:flex;align-items:center;gap:10px;min-width:220px;"><input type="range" id="pitchRange" min="0.8" max="1.3" step="0.02" value="'+state.speechPitch+'" style="width:160px;"><strong id="pitchValue">'+state.speechPitch.toFixed(2)+'</strong></div></div><div class="setting-row"><div><strong>Zerar progresso</strong><p>Apaga as aulas concluídas, pontos, missão e preferências do professor.</p></div><button class="btn danger" onclick="resetProgress()">🗑️ Resetar</button></div></div>'; const auto=byId('autoTeacherChk'); if(auto) auto.onchange=()=>{ state.autoTeacher=auto.checked; saveState(); toast('Configuração do professor atualizada.','success'); }; const rate=byId('rateRange'); const rateValue=byId('rateValue'); if(rate) rate.oninput=()=>{ state.speechRate=parseFloat(rate.value); rateValue.textContent=state.speechRate.toFixed(2)+'x'; saveState(); }; const pitch=byId('pitchRange'); const pitchValue=byId('pitchValue'); if(pitch) pitch.oninput=()=>{ state.speechPitch=parseFloat(pitch.value); pitchValue.textContent=state.speechPitch.toFixed(2); saveState(); }; }
function resetProgress(){ if(!confirm('Tem certeza? Isso apagará o progresso e as preferências do professor.')) return; localStorage.removeItem('english_professor_state'); location.reload(); }
function render(){ renderDashboard(); if(state.selectedLessonId){ const lesson=lessons.find(l=>l.id===state.selectedLessonId); if(lesson) renderLessonDetail(lesson); else renderLessonList(); } else { renderLessonList(); } renderVoicePage(); renderITPage(); renderMissionPage(); renderSettingsPage(); }
