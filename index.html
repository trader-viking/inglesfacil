ge that premise. From my own experience in IT, I've seen brilliant self-taught professionals outperform graduates. The crux of the matter is lifelong learning, not a single degree.", "ph": "/aɪd ˈtʃælɪndʒ ðæt ˈpremɪs/", "pt": "Questiono essa premissa. Na minha experiência em TI, vi autodidatas superarem graduados."}, {"speaker": "B", "name": "Debater2", "en": "That's a compelling point. Perhaps the answer is a hybrid model — combining formal education with practical experience and continuous upskilling. In light of the changing job market, we need to rethink education entirely.", "ph": "/ðæts ə kəmˈpelɪŋ pɔɪnt/", "pt": "Ponto convincente. Talvez a resposta seja um modelo híbrido."}], "reading": {"title": "📖 The Future of Education and Work", "text": "The traditional path of school → university → career is being fundamentally disrupted. With the rise of online learning platforms, coding bootcamps, and professional certifications, many are questioning whether a four-year degree is still the best investment. Proponents of traditional education argue that universities provide critical thinking skills, networking opportunities, and a well-rounded education that goes beyond job training. Critics counter that the cost of higher education has skyrocketed while the job market increasingly values practical skills and experience over credentials. The four-day work week is another hot topic. Trials in Iceland, Japan, and the UK have shown that reducing work hours can actually increase productivity while improving employee well-being. However, skeptics argue that not all industries can adapt to this model. The gig economy adds another layer of complexity — millions of people now work as freelancers, without traditional employment benefits. The future likely belongs to those who embrace lifelong learning and adaptability, regardless of whether they hold a formal degree.", "questions": [{"q": "Traditional education path is being:", "opts": ["Strengthened", "Disrupted", "Ignored", "Unchanged"], "answer": 1}, {"q": "Four-day work week trials showed:", "opts": ["Lower productivity", "Same productivity", "Increased productivity", "No results"], "answer": 2}, {"q": "The future belongs to those who:", "opts": ["Have degrees", "Are young", "Embrace lifelong learning", "Work harder"], "answer": 2}, {"q": "Gig economy workers are:", "opts": ["All employed", "Freelancers", "All in tech", "All students"], "answer": 1}]}, "writing": {"prompt": "✍️ DEBATE: Escolha um tema e debata (10+ frases):\n\n🔴 Opção A: 'University degrees will become obsolete within 20 years.'\n🔵 Opção B: 'A four-day work week should be mandatory for all companies.'\n🟢 Opção C: 'Remote work is better than office work for everyone.'\n\n💡 Use PEEL para argumentos + ARE para contra-argumentos!", "keywords": ["firmly", "believe", "evidence", "suggests", "employer", "perspective", "student", "however", "acknowledge", "fails", "consider", "contrary", "crux", "lifelong", "obsolete", "upskilling", "balance", "productivity", "degree", "experience", "furthermore", "therefore", "compelling", "standpoint"]}, "speaking": [{"phrase": "I argue that university degrees are becoming less relevant.", "phonetic": "/aɪ ˈɑːrɡjuː ðæt/", "translation": "Argumento que diplomas estão se tornando menos relevantes."}, {"phrase": "From the employer's perspective, practical skills matter most.", "phonetic": "/frəm ðə ɪmˈplɔɪərz pərˈspektɪv/", "translation": "Na perspectiva do empregador, habilidades práticas importam mais."}, {"phrase": "The crux of the matter is lifelong learning, not a single degree.", "phonetic": "/ðə krʌks əv ðə ˈmætər/", "translation": "O cerne é aprendizado contínuo, não um único diploma."}, {"phrase": "The four-day work week has proven to increase productivity.", "phonetic": "/ðə fɔːr deɪ wɜːrk wiːk/", "translation": "A semana de 4 dias provou aumentar a produtividade."}], "quiz": [{"type": "choice", "q": "'Upskilling' =", "opts": ["Descansar", "Requalificar-se", "Demitir", "Estudar menos"], "answer": 1}, {"type": "fill", "q": "From the employer's ___, skills matter. (perspectiva)", "answer": "perspective"}, {"type": "choice", "q": "Gig economy involves:", "opts": ["Only tech jobs", "Freelancers and independent workers", "Government jobs", "Factory work"], "answer": 1}, {"type": "fill", "q": "Lifelong ___ is the new norm. (aprendizado)", "answer": "learning"}, {"type": "choice", "q": "Four-day work week trials showed:", "opts": ["Disaster", "Increased productivity", "No change", "Lower wages"], "answer": 1}]}, {"id": 45, "module": "Módulo 15: Debate Livre — Hot Topics", "moduleIcon": "🔥", "title": "Debate: Climate & Environment", "titlePt": "Debate: Clima e Meio Ambiente", "teacher": {"name": "👩‍🏫 Coach Greta", "tip": "Clima é o debate do SÉCULO! <b>Vocabulário essencial:</b> carbon footprint, renewable energy, sustainability, greenhouse gases. <b>Mairo Vergara:</b> Leia o The Guardian Environment section. <b>Técnica:</b> Use dados do IPCC e ONU para fortalecer argumentos. Números são poderosos!", "method": "🔑 Data-Driven Arguments + Environmental Vocabulary"}, "vocab": [{"word": "Carbon footprint", "phonetic": "/ˈkɑːrbən ˈfʊtprɪnt/", "trans": "Pegada de carbono", "example": "We must reduce our carbon footprint."}, {"word": "Renewable energy", "phonetic": "/rɪˈnjuːəbəl ˈenərdʒi/", "trans": "Energia renovável", "example": "Renewable energy is the future."}, {"word": "Sustainability", "phonetic": "/səˌsteɪnəˈbɪləti/", "trans": "Sustentabilidade", "example": "Sustainability should be a priority."}, {"word": "Greenhouse gases", "phonetic": "/ˈɡriːnhaʊs ˈɡæsɪz/", "trans": "Gases de efeito estufa", "example": "Greenhouse gases cause global warming."}, {"word": "Deforestation", "phonetic": "/diːˌfɒrɪˈsteɪʃən/", "trans": "Desmatamento", "example": "Deforestation is destroying biodiversity."}, {"word": "Fossil fuels", "phonetic": "/ˈfɒsəl fjuːəlz/", "trans": "Combustíveis fósseis", "example": "We must phase out fossil fuels."}, {"word": "Climate crisis", "phonetic": "/ˈklaɪmət ˈkraɪsɪs/", "trans": "Crise climática", "example": "The climate crisis demands urgent action."}, {"word": "Net zero", "phonetic": "/net ˈzɪroʊ/", "trans": "Emissão líquida zero", "example": "Many countries aim for net zero by 2050."}, {"word": "Biodiversity", "phonetic": "/ˌbaɪoʊdaɪˈvɜːrsəti/", "trans": "Biodiversidade", "example": "Protecting biodiversity is essential."}, {"word": "Carbon tax", "phonetic": "/ˈkɑːrbən tæks/", "trans": "Imposto sobre carbono", "example": "Should we implement a carbon tax?"}], "grammar": {"title": "Debating with Statistics & Urgency", "explanation": "Para debates sobre clima, use <b>dados urgentes</b>: 'According to the IPCC...', 'The data is clear...', 'We have less than X years to...' <b>Linguagem de urgência:</b> 'We cannot afford to wait', 'The window of opportunity is closing', 'Future generations depend on our actions today.'", "table": [["Técnica", "Expressão", "Exemplo", ""], ["Dados", "According to NASA/IPCC/UN...", "Global temperatures have risen 1.1°C.", ""], ["Urgência", "We cannot afford to...", "We cannot afford to delay action.", ""], ["Consequência", "If we fail to act...", "If we fail to act, sea levels will rise 1 meter.", ""], ["Solução", "The solution lies in...", "The solution lies in renewable energy.", ""], ["Responsabilidade", "It is our duty to...", "It is our duty to protect the planet.", ""]], "examples": [{"en": "According to the IPCC, we have less than a decade to halve global emissions. If we fail to act, the consequences will be irreversible.", "ph": "/əˈkɔːrdɪŋ tə ðə ˌaɪpiːsiːˈsiː/", "pt": "Segundo o IPCC, temos menos de uma década para reduzir emissões pela metade."}, {"en": "While some argue that environmental regulations harm the economy, the evidence shows that green industries create more jobs than fossil fuels.", "ph": "/waɪl sʌm ˈɑːrɡjuː/", "pt": "Embora alguns argumentem que regulações ambientais prejudicam a economia, evidências mostram que indústrias verdes criam mais empregos."}], "tip": "⚡ <b>Frase poderosa:</b> 'We are the first generation to feel the effects of climate change, and the last generation that can do something about it.' — Barack Obama"}, "dialogue": [{"speaker": "A", "name": "Activist", "en": "The climate crisis is the defining challenge of our generation. According to NASA, 2024 was the hottest year ever recorded. We cannot afford to wait.", "ph": "/ðə ˈklaɪmət ˈkraɪsɪs/", "pt": "A crise climática é o desafio definidor da nossa geração."}, {"speaker": "B", "name": "Skeptic", "en": "While I acknowledge that temperatures are rising, I'd challenge the premise that radical action won't harm developing economies. Millions depend on fossil fuels for their livelihoods.", "ph": "/waɪl aɪ əkˈnɒlɪdʒ/", "pt": "Embora reconheça que temperaturas estão subindo, questiono que ação radical não prejudicará economias em desenvolvimento."}, {"speaker": "A", "name": "Activist", "en": "That argument fails to consider the economic cost of inaction. According to Swiss Re, climate change could reduce global GDP by 23% by 2100. The cost of action is far less than the cost of doing nothing.", "ph": "/ðæt ˈɑːrɡjumənt feɪlz/", "pt": "Esse argumento falha em considerar o custo econômico da inação."}, {"speaker": "B", "name": "Skeptic", "en": "Even if we grant those projections, my opponent overlooks that renewable energy transition needs to be gradual. Shutting down coal plants overnight would cause mass unemployment.", "ph": "/ˈiːvən ɪf wiː ɡrænt/", "pt": "Mesmo concedendo essas projeções, meu oponente ignora que a transição precisa ser gradual."}, {"speaker": "A", "name": "Activist", "en": "On the contrary, the renewable energy sector already employs more people than fossil fuels in many countries. The solution lies in a just transition — retraining workers for green jobs while phasing out polluting industries.", "ph": "/ɒn ðə ˈkɒntrəri/", "pt": "Pelo contrário, o setor renovável já emprega mais pessoas que fósseis em muitos países."}, {"speaker": "B", "name": "Skeptic", "en": "That's a fair point. I agree we need action, but it must be balanced and equitable. Perhaps a carbon tax with revenue returned to citizens would be the most effective approach.", "ph": "/ðæts ə fɛr pɔɪnt/", "pt": "Ponto justo. Concordo que precisamos agir, mas de forma equilibrada."}], "reading": {"title": "📖 The Climate Debate: Facts and Perspectives", "text": "Climate change is one of the most well-documented phenomena in science. Over 97% of climate scientists agree that human activities are causing global warming. The main driver is the burning of fossil fuels, which releases greenhouse gases into the atmosphere. The effects are already visible: rising sea levels, more frequent extreme weather events, melting ice caps, and loss of biodiversity. Yet the debate continues — not about whether climate change is real, but about how to address it. Some advocate for aggressive government regulation, including carbon taxes and banning fossil fuels. Others argue for market-based solutions, such as cap-and-trade systems and investment in clean technology. Developing nations face a unique dilemma: they need economic growth to lift people out of poverty, but they also need to avoid the polluting path that developed nations took. The concept of 'climate justice' argues that wealthy nations, which have historically produced the most emissions, should bear a greater responsibility for solving the crisis. Whatever the approach, one thing is clear: the cost of inaction far exceeds the cost of action.", "questions": [{"q": "What percentage of scientists agree?", "opts": ["50%", "75%", "97%", "100%"], "answer": 2}, {"q": "Main driver of climate change:", "opts": ["Volcanoes", "Sun activity", "Burning fossil fuels", "Oceans"], "answer": 2}, {"q": "Climate justice argues:", "opts": ["Everyone is equal", "Wealthy nations should bear more responsibility", "Poor nations caused it", "It's not real"], "answer": 1}, {"q": "Cost of inaction vs action:", "opts": ["Same", "Inaction is cheaper", "Inaction far exceeds action", "Action is impossible"], "answer": 2}]}, "writing": {"prompt": "✍️ DEBATE: 'Governments should ban all fossil fuels within 10 years.' Argue FOR or AGAINST (10+ frases).\n\n💡 Use: According to IPCC/NASA, carbon footprint, renewable energy, net zero, just transition, economic impact\n\n🏆 BONUS: Include data, address counterarguments, end with a powerful closing statement!", "keywords": ["carbon", "renewable", "climate", "crisis", "fossil", "greenhouse", "sustainability", "evidence", "according", "afford", "fail", "act", "solution", "transition", "economy", "tax", "biodiversity", "generation", "urgent", "net zero", "deforestation", "however", "acknowledge"]}, "speaking": [{"phrase": "The climate crisis demands urgent action.", "phonetic": "/ðə ˈklaɪmət ˈkraɪsɪs dɪˈmændz/", "translation": "A crise climática demanda ação urgente."}, {"phrase": "According to the IPCC, we have less than a decade to act.", "phonetic": "/əˈkɔːrdɪŋ tə ðə ˌaɪpiːsiːˈsiː/", "translation": "Segundo o IPCC, temos menos de uma década."}, {"phrase": "The cost of inaction far exceeds the cost of action.", "phonetic": "/ðə kɒst əv ɪnˈækʃən/", "translation": "O custo da inação supera em muito o custo da ação."}, {"phrase": "The solution lies in a just transition to renewable energy.", "phonetic": "/ðə səˈluːʃən laɪz ɪn ə dʒʌst trænˈzɪʃən/", "translation": "A solução está numa transição justa para energia renovável."}], "quiz": [{"type": "choice", "q": "97% of scientists agree on:", "opts": ["Nothing", "Human-caused warming", "Cooling", "No change"], "answer": 1}, {"type": "fill", "q": "We must reduce our carbon ___. (pegada)", "answer": "footprint"}, {"type": "choice", "q": "'Net zero' =", "opts": ["Zero internet", "Zero emissions balance", "Zero cost", "Zero effort"], "answer": 1}, {"type": "fill", "q": "Renewable ___ is the future. (energia)", "answer": "energy"}, {"type": "choice", "q": "'Climate justice' means:", "opts": ["Punishing everyone", "Rich nations bear more responsibility", "Ignoring the problem", "Banning all industry"], "answer": 1}]}, {"id": 46, "module": "Módulo 15: Debate Livre — Hot Topics", "moduleIcon": "🔥", "title": "Debate: Social Issues & Ethics", "titlePt": "Debate: Questões Sociais e Ética", "teacher": {"name": "👨‍🏫 Coach Martin", "tip": "Debates sobre questões sociais exigem EMPATIA + LÓGICA! <b>Regra de ouro:</b> Respeite SEMPRE o oponente, mesmo discordando completamente. <b>Mairo Vergara:</b> Assista debates do TED e Intelligence Squared. <b>Técnica:</b> Use 'I understand the concern, and here's why I believe...' — reconheça antes de argumentar. <b>PARABÉNS</b> por chegar à última aula! Você é um debatedor em inglês agora! 🏆", "method": "🔑 Empathy + Logic + Respectful Disagreement"}, "vocab": [{"word": "Inequality", "phonetic": "/ˌɪnɪˈkwɒləti/", "trans": "Desigualdade", "example": "Income inequality is a growing problem."}, {"word": "Privilege", "phonetic": "/ˈprɪvəlɪdʒ/", "trans": "Privilégio", "example": "We must acknowledge our privilege."}, {"word": "Universal basic income", "phonetic": "/ˌjuːnɪˈvɜːrsəl ˈbeɪsɪk ˈɪnkʌm/", "trans": "Renda básica universal", "example": "Should we implement universal basic income?"}, {"word": "Freedom of speech", "phonetic": "/ˈfriːdəm əv spiːtʃ/", "trans": "Liberdade de expressão", "example": "Freedom of speech has limits."}, {"word": "Privacy", "phonetic": "/ˈpraɪvəsi/", "trans": "Privacidade", "example": "Digital privacy is under threat."}, {"word": "Accountability", "phonetic": "/əˌkaʊntəˈbɪləti/", "trans": "Responsabilização", "example": "We need more accountability."}, {"word": "Disproportionately", "phonetic": "/ˌdɪsprəˈpɔːrʃənətli/", "trans": "Desproporcionalmente", "example": "This affects minorities disproportionately."}, {"word": "Nuanced", "phonetic": "/ˈnjuːɑːnst/", "trans": "Nuançado/Sutil", "example": "This is a nuanced issue that requires careful thought."}, {"word": "Systemic", "phonetic": "/sɪˈstemɪk/", "trans": "Sistêmico", "example": "Systemic changes are needed."}, {"word": "Empathy", "phonetic": "/ˈempəθi/", "trans": "Empatia", "example": "Empathy is essential in these discussions."}], "grammar": {"title": "Debating Sensitive Topics with Nuance", "explanation": "Temas sensíveis requerem <b>nuance</b>: evite generalizações ('ALL people...'), use linguagem inclusiva, reconheça complexidade ('This is a nuanced issue...'). <b>Framework:</b> Acknowledge complexity → Present your view → Support with evidence → Show empathy for other side.", "table": [["Técnica", "Expressão", "Quando usar", ""], ["Reconhecer complexidade", "This is a nuanced issue...", "Início", ""], ["Mostrar empatia", "I understand the concern...", "Antes de discordar", ""], ["Evitar generalização", "Many/Some people... (não ALL)", "Sempre", ""], ["Reconhecer limitação", "I may not have all the answers, but...", "Quando incerto", ""], ["Buscar diálogo", "What are your thoughts on this?", "Para engajar", ""]], "examples": [{"en": "This is a deeply nuanced issue, and I don't think there are easy answers. However, I believe that universal basic income could address some of the systemic inequalities we see today.", "ph": "/ðɪs ɪz ə ˈdiːpli ˈnjuːɑːnst ˈɪʃuː/", "pt": "Esta é uma questão profundamente nuançada, sem respostas fáceis."}, {"en": "I understand the concern about freedom of speech, and I share it. However, I firmly believe that there must be limits when speech incites violence or discrimination.", "ph": "/aɪ ˌʌndərˈstænd ðə kənˈsɜːrn/", "pt": "Entendo a preocupação com liberdade de expressão. Porém, acredito que deve haver limites."}], "tip": "⚡ <b>Última dica do curso:</b> O objetivo de um debate NÃO é vencer — é APRENDER. Os melhores debatedores saem de um debate tendo mudado de ideia sobre pelo menos um ponto. Isso é crescimento intelectual! 🏆"}, "dialogue": [{"speaker": "A", "name": "Speaker1", "en": "I'd like to discuss whether universal basic income is the solution to growing inequality. This is a nuanced issue, but I firmly believe it's worth serious consideration.", "ph": "/aɪd laɪk tə dɪˈskʌs ˈweðər/", "pt": "Gostaria de discutir se renda básica universal é solução para desigualdade."}, {"speaker": "B", "name": "Speaker2", "en": "I understand the appeal, but I'd challenge the premise that simply giving money solves systemic problems. The evidence from pilot programs is mixed.", "ph": "/aɪ ˌʌndərˈstænd ðə əˈpiːl/", "pt": "Entendo o apelo, mas questiono a premissa de que dar dinheiro resolve problemas sistêmicos."}, {"speaker": "A", "name": "Speaker1", "en": "That's a fair point. However, the Finland pilot showed reduced stress and improved well-being, even if employment rates didn't change significantly. The crux is not just money — it's dignity and security.", "ph": "/ðæts ə fɛr pɔɪnt. haʊˈevər/", "pt": "Ponto justo. Porém, o piloto da Finlândia mostrou redução de estresse."}, {"speaker": "B", "name": "Speaker2", "en": "I acknowledge those benefits, but who pays for it? Even if we grant that it improves well-being, the fiscal impact could be enormous. This disproportionately affects taxpayers.", "ph": "/aɪ əkˈnɒlɪdʒ ðoʊz ˈbenɪfɪts/", "pt": "Reconheço esses benefícios, mas quem paga? O impacto fiscal seria enorme."}, {"speaker": "A", "name": "Speaker1", "en": "Studies suggest it could be funded through a combination of carbon taxes, wealth taxes, and redirecting existing welfare spending. In light of growing automation and job displacement, we may have no choice but to rethink our social contract.", "ph": "/ˈstʌdiz səˈdʒest/", "pt": "Estudos sugerem que pode ser financiado por impostos sobre carbono e riqueza."}, {"speaker": "B", "name": "Speaker2", "en": "You make a compelling case. I may not fully agree yet, but I appreciate the thoughtful discussion. This is exactly the kind of nuanced debate we need more of in society.", "ph": "/juː meɪk ə kəmˈpelɪŋ keɪs/", "pt": "Argumento convincente. Talvez eu não concorde totalmente, mas agradeço a discussão."}], "reading": {"title": "📖 The Power of Respectful Debate", "text": "In an age of social media outrage and political polarization, the ability to engage in respectful, evidence-based debate is more important than ever. True debate is not about shouting louder or scoring points — it's about exchanging ideas, testing assumptions, and arriving at better understanding. The ancient Greek philosopher Socrates believed that truth emerges through dialogue, not monologue. He asked questions not to win arguments, but to help others examine their own beliefs. Today, we need this Socratic approach more than ever. When debating sensitive topics like inequality, privacy, or ethics, remember these principles: 1) Assume good faith — your opponent probably has good intentions. 2) Listen to understand, not to respond. 3) Be willing to say 'I hadn't considered that' or 'You've changed my mind on this point.' 4) Focus on ideas, not identities. 5) End every debate with gratitude: 'Thank you for this conversation.' Congratulations on completing this debate module. You now have the tools to engage in sophisticated, respectful English-language debates on any topic. The world needs more thoughtful voices — and yours is ready.", "questions": [{"q": "True debate is about:", "opts": ["Winning", "Exchanging ideas and understanding", "Shouting", "Being right"], "answer": 1}, {"q": "Socrates believed truth comes from:", "opts": ["Books", "Monologue", "Dialogue", "Authority"], "answer": 2}, {"q": "When debating, assume your opponent has:", "opts": ["Bad intentions", "Good intentions", "No knowledge", "All answers"], "answer": 1}, {"q": "You should be willing to say:", "opts": ["I'm always right", "You're wrong", "I hadn't considered that", "I don't care"], "answer": 2}]}, "writing": {"prompt": "✍️ DEBATE FINAL: Escolha UM tema e escreva um debate completo (12+ frases):\n\n🔴 A: 'Social media companies should be held legally responsible for content on their platforms.'\n🔵 B: 'Universal basic income should be implemented worldwide.'\n🟢 C: 'Privacy is more important than national security.'\n\n💡 Use TUDO que aprendeu: PEEL, ARE, softeners, data, multiple perspectives, nuance, powerful closing!\n\n🏆 Este é seu EXAME FINAL de debate em inglês!", "keywords": ["firmly", "believe", "evidence", "suggests", "acknowledge", "however", "fails", "consider", "contrary", "even if", "grant", "crux", "nuanced", "compelling", "perspective", "systemic", "disproportionately", "accountability", "empathy", "privilege", "furthermore", "therefore", "undeniable", "unprecedented", "light"]}, "speaking": [{"phrase": "This is a deeply nuanced issue with no easy answers.", "phonetic": "/ðɪs ɪz ə ˈdiːpli ˈnjuːɑːnst ˈɪʃuː/", "translation": "Esta é uma questão profundamente nuançada sem respostas fáceis."}, {"phrase": "I understand the concern, and here's why I believe differently.", "phonetic": "/aɪ ˌʌndərˈstænd ðə kənˈsɜːrn/", "translation": "Entendo a preocupação, e aqui está por que penso diferente."}, {"phrase": "You make a compelling case. I hadn't considered that perspective.", "phonetic": "/juː meɪk ə kəmˈpelɪŋ keɪs/", "translation": "Argumento convincente. Não tinha considerado essa perspectiva."}, {"phrase": "Thank you for this thoughtful and respectful debate.", "phonetic": "/θæŋk juː fɔːr ðɪs ˈθɔːtfəl/", "translation": "Obrigado por este debate respeitoso e reflexivo."}], "quiz": [{"type": "choice", "q": "'Nuanced' =", "opts": ["Simples", "Preto e branco", "Complexo e sutil", "Óbvio"], "answer": 2}, {"type": "fill", "q": "This affects minorities ___. (desproporcionalmente)", "answer": "disproportionately"}, {"type": "choice", "q": "Best way to end a debate:", "opts": ["Slam the table", "Walk away", "Thank the opponent", "Declare victory"], "answer": 2}, {"type": "fill", "q": "___ is essential in sensitive debates. (empatia)", "answer": "Empathy"}, {"type": "choice", "q": "Socratic method uses:", "opts": ["Monologue", "Questions and dialogue", "Authority", "Force"], "answer": 1}]}];

let state={currentLesson:null,currentSection:'teacher',completedLessons:JSON.parse(localStorage.getItem('em_completed')||'[]'),xp:parseInt(localStorage.getItem('em_xp')||'0'),streak:parseInt(localStorage.getItem('em_streak')||'0'),lastStudyDate:localStorage.getItem('em_lastDate')||'',todaySeconds:parseInt(localStorage.getItem('em_todaySec')||'0'),dailyMissions:JSON.parse(localStorage.getItem('em_missions')||'{"vocab":false,"reading":false,"writing":false,"speaking":false,"quiz":false}')};
let timerInterval=null;
function startTimer(){if(timerInterval)return;const today=new Date().toDateString();if(state.lastStudyDate!==today){state.todaySeconds=0;state.dailyMissions={vocab:false,reading:false,writing:false,speaking:false,quiz:false};if(state.lastStudyDate){if((new Date(today)-new Date(state.lastStudyDate))/864e5>1)state.streak=0;}state.lastStudyDate=today;saveState();}timerInterval=setInterval(()=>{state.todaySeconds++;updateUI();if(state.todaySeconds%30===0)saveState();},1000);}
function updateUI(){const m=Math.floor(state.todaySeconds/60),s=state.todaySeconds%60;document.getElementById('navTimer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;document.getElementById('navXP').textContent=state.xp+' XP';document.getElementById('navStreak').textContent=state.streak;}
function saveState(){localStorage.setItem('em_completed',JSON.stringify(state.completedLessons));localStorage.setItem('em_xp',state.xp);localStorage.setItem('em_streak',state.streak);localStorage.setItem('em_lastDate',state.lastStudyDate);localStorage.setItem('em_todaySec',state.todaySeconds);localStorage.setItem('em_missions',JSON.stringify(state.dailyMissions));updateUI();updateSidebar();}
function addXP(a){state.xp+=a;saveState();showAch('⚡','+ '+a+' XP!','Continue!');}
function showAch(i,t,d){const p=document.getElementById('achievementPopup');document.getElementById('achIcon').textContent=i;document.getElementById('achTitle').textContent=t;document.getElementById('achDesc').textContent=d;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3000);}
function completeMission(k){if(!state.dailyMissions[k]){state.dailyMissions[k]=true;addXP(XP_PER_SECTION);if(Object.values(state.dailyMissions).every(v=>v)&&state.todaySeconds>=DAILY_GOAL_MINUTES*60){state.streak++;showAch('🔥','Streak: '+state.streak+'!','Missão completa!');}saveState();}}
function completeLesson(id){if(!state.completedLessons.includes(id)){state.completedLessons.push(id);addXP(50);showAch('🏆','Aula Concluída!','Parabéns!');saveState();}}
function updateSidebar(){const c=document.getElementById('sidebarLessons');let h='',cm='';lessons.forEach(l=>{if(l.module!==cm){if(cm)h+='</div>';cm=l.module;h+=`<div class="module-group"><div class="module-title">${l.moduleIcon} ${l.module}</div>`;}const ic=state.completedLessons.includes(l.id),ia=state.currentLesson&&state.currentLesson.id===l.id;h+=`<button class="lesson-btn ${ic?'completed':''} ${ia?'active':''}" onclick="openLesson(${l.id})"><div class="l-icon">${ic?'✓':l.id}</div><div><div style="font-weight:600;font-size:.82rem">${l.title}</div><div style="font-size:.7rem;color:var(--text2)">${l.titlePt}</div></div></button>`;});h+='</div>';c.innerHTML=h;const p=Math.round((state.completedLessons.length/lessons.length)*100);document.getElementById('globalProgress').style.width=p+'%';document.getElementById('globalProgressText').textContent=p+'%';}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function speak(text,rate=0.85){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate;const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'));if(v)u.voice=v;window.speechSynthesis.speak(u);}}
let recognition=null,isRecording=false;
function initSR(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){recognition=new SR();recognition.lang='en-US';recognition.continuous=false;}}
function toggleRec(target,rid){if(!recognition){document.getElementById(rid).innerHTML='<div class="speak-result retry">⚠️ Use Chrome/Edge.</div>';return;}if(isRecording){recognition.stop();isRecording=false;return;}isRecording=true;recognition.start();recognition.onresult=(e)=>{const t=e.results[0][0].transcript.toLowerCase(),tw=target.toLowerCase().replace(/[.,!?]/g,'').split(/\s+/),sw=t.replace(/[.,!?]/g,'').split(/\s+/);let m=0;tw.forEach(w=>{if(sw.includes(w))m++;});const sc=Math.round((m/tw.length)*100);document.getElementById(rid).innerHTML=sc>=80?`<div class="speak-result good">✅ ${sc}% — "${t}"</div>`:`<div class="speak-result retry">🔄 ${sc}% — "${t}"</div>`;if(sc>=80)completeMission('speaking');isRecording=false;};recognition.onerror=()=>{isRecording=false;};recognition.onend=()=>{isRecording=false;};}
function showHome(){state.currentLesson=null;updateSidebar();const mc=document.getElementById('mainContent'),gm=DAILY_GOAL_MINUTES,cm=Math.floor(state.todaySeconds/60),p=Math.min(100,Math.round((cm/gm)*100)),ms=state.dailyMissions;
mc.innerHTML=`<div class="home-hero"><h1>🇬🇧 English Mastery</h1><p>${lessons.length} aulas em 11 módulos — Básico ao Avançado + TOEFL + IELTS</p><button class="btn-primary" onclick="openLesson(${getNext()})">🚀 ${state.completedLessons.length>0?'Continuar':'Começar'}</button></div><div class="timer-bar"><div class="timer-icon">⏱️</div><div class="timer-info"><div class="t-label">Estudo hoje</div><div class="t-time">${cm}/${gm} min</div></div><div class="timer-progress"><div class="tp-bg"><div class="tp-fill" style="width:${p}%"></div></div><div class="tp-text">${p>=100?'✅ Meta!':gm-cm+' min restantes'}</div></div></div><div class="daily-panel"><h3>🎯 Missões Diárias</h3>${['vocab','reading','writing','speaking','quiz'].map(k=>`<div class="mission-item"><div class="mission-check ${ms[k]?'done':''}">✓</div><div class="mission-info"><div class="m-title">${{vocab:'📝 Vocabulário',reading:'📖 Leitura',writing:'✍️ Escrita',speaking:'🎤 Fala',quiz:'🧠 Quiz'}[k]}</div></div><div class="mission-xp">+25 XP</div></div>`).join('')}</div><div class="hero-cards"><div class="hero-card"><div class="hc-icon">📚</div><h3>${lessons.length} Aulas</h3><p>11 módulos completos</p></div><div class="hero-card"><div class="hc-icon">🎯</div><h3>TOEFL Prep</h3><p>Reading, Listening, Speaking, Writing</p></div><div class="hero-card"><div class="hc-icon">🏅</div><h3>IELTS Prep</h3><p>Band 7+ strategies</p></div><div class="hero-card"><div class="hc-icon">🎤</div><h3>Conversação</h3><p>6 módulos práticos</p></div></div>`;}
function getNext(){for(let l of lessons)if(!state.completedLessons.includes(l.id))return l.id;return 1;}
function openLesson(id){const l=lessons.find(x=>x.id===id);if(!l)return;state.currentLesson=l;state.currentSection='teacher';updateSidebar();renderLesson();document.getElementById('sidebar').classList.remove('open');window.scrollTo(0,0);}
function switchSec(s){state.currentSection=s;document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.section-content').forEach(x=>x.classList.remove('active'));document.querySelector(`[data-section="${s}"]`).classList.add('active');document.getElementById('s-'+s).classList.add('active');}
function renderLesson(){const l=state.currentLesson,mc=document.getElementById('mainContent');
mc.innerHTML=`<div class="lesson-header"><div class="breadcrumb">${l.moduleIcon} ${l.module} › <span>${l.title}</span></div><h1>${l.title}</h1><div class="subtitle">${l.titlePt}</div></div><div class="section-tabs"><button class="sec-tab active" data-section="teacher" onclick="switchSec('teacher')">👨‍🏫 Aula</button><button class="sec-tab" data-section="vocab" onclick="switchSec('vocab')">📝 Vocab</button><button class="sec-tab" data-section="grammar" onclick="switchSec('grammar')">📐 Gramática</button><button class="sec-tab" data-section="dialogue" onclick="switchSec('dialogue')">💬 Diálogo</button><button class="sec-tab" data-section="reading" onclick="switchSec('reading')">📖 Leitura</button><button class="sec-tab" data-section="writing" onclick="switchSec('writing')">✍️ Escrita</button><button class="sec-tab" data-section="speaking" onclick="switchSec('speaking')">🎤 Fala</button><button class="sec-tab" data-section="quiz" onclick="switchSec('quiz')">🧠 Quiz</button></div><div id="s-teacher" class="section-content active">${rTeacher(l)}</div><div id="s-vocab" class="section-content">${rVocab(l)}</div><div id="s-grammar" class="section-content">${rGrammar(l)}</div><div id="s-dialogue" class="section-content">${rDialogue(l)}</div><div id="s-reading" class="section-content">${rReading(l)}</div><div id="s-writing" class="section-content">${rWriting(l)}</div><div id="s-speaking" class="section-content">${rSpeaking(l)}</div><div id="s-quiz" class="section-content">${rQuiz(l)}</div><div class="lesson-nav">${l.id>1?`<button class="btn-secondary" onclick="openLesson(${l.id-1})">← Anterior</button>`:'<div></div>'}<button class="btn-next" onclick="finishL(${l.id})">✅ Concluir</button>${l.id<lessons.length?`<button class="btn-secondary" onclick="openLesson(${l.id+1})">Próxima →</button>`:'<div></div>'}</div>`;}
function finishL(id){completeLesson(id);const n=lessons.find(l=>l.id===id+1);if(n){if(confirm('🎉 Parabéns! Próxima aula?'))openLesson(n.id);}else{alert('🏆 Todas concluídas!');showHome();}}
function rTeacher(l){return`<div class="teacher-box"><div class="teacher-avatar">👨‍🏫</div><div class="teacher-content"><div class="t-name">${l.teacher.name}</div><div class="t-tip">${l.teacher.tip}</div><div class="t-method">${l.teacher.method}</div></div></div><div class="grammar-box" style="border-left-color:var(--accent3)"><h3>📋 Nesta aula:</h3><p>✅ ${l.vocab.length} palavras com IPA • ${l.grammar.title}</p><p>✅ Diálogo + Leitura + Escrita + Fala + Quiz</p></div><div style="text-align:center;margin-top:18px"><button class="btn-primary" onclick="switchSec('vocab')">Começar →</button></div>`;}
function rVocab(l){return`<h3 style="color:var(--accent)">📝 Vocabulário</h3><p style="color:var(--text2);margin-bottom:14px;font-size:.83rem">Clique para ouvir 🔊</p><div class="vocab-grid">${l.vocab.map(v=>`<div class="vocab-card" onclick="speak('${v.word.replace(/'/g,"\\'")}')"><button class="v-speak" onclick="event.stopPropagation();speak('${v.word.replace(/'/g,"\\'")}')">🔊</button><div class="v-word">${v.word}</div><div class="v-phonetic">${v.phonetic}</div><div class="v-trans">${v.trans}</div><div class="v-example">${v.example}</div></div>`).join('')}</div><div style="text-align:center;margin-top:14px"><button class="btn-check" onclick="completeMission('vocab');switchSec('grammar')">✓ → Gramática</button></div>`;}
function rGrammar(l){const g=l.grammar;let t='';if(g.table&&g.table.length>1){t='<table class="grammar-table"><thead><tr>'+g.table[0].map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+g.table.slice(1).map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';}return`<div class="grammar-box"><h3>📐 ${g.title}</h3><p>${g.explanation}</p>${t}<h4 style="margin-top:14px;color:var(--accent)">Exemplos:</h4>${g.examples.map(e=>`<div class="example"><div class="en" style="cursor:pointer" onclick="speak('${e.en.replace(/'/g,"\\'")}')">${e.en} 🔊</div><div class="phonetic">${e.ph}</div><div class="pt">${e.pt}</div></div>`).join('')}<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;font-size:.83rem">${g.tip}</div></div><div style="text-align:center;margin-top:14px"><button class="btn-check" onclick="switchSec('dialogue')">→ Diálogo</button></div>`;}
function rDialogue(l){return`<div class="reading-box"><h3>💬 Diálogo</h3>${l.dialogue.map(d=>`<div class="dialogue-line"><div class="dl-avatar ${d.speaker.toLowerCase()}">${d.name[0]}</div><div class="dl-bubble" onclick="speak('${d.en.replace(/'/g,"\\'")}')"><div class="dl-en">${d.name}: ${d.en} 🔊</div><div class="dl-ph">${d.ph}</div><div class="dl-pt">${d.pt}</div></div></div>`).join('')}<div style="text-align:center;margin-top:18px"><button class="listen-btn" onclick="playD()">▶️ Ouvir</button><button class="btn-check" onclick="switchSec('reading')">→ Leitura</button></div></div>`;}
function playD(){if(!state.currentLesson)return;const ls=state.currentLesson.dialogue;let i=0;(function n(){if(i<ls.length){speak(ls[i].en,0.8);i++;setTimeout(n,3500);}})();}
function rReading(l){const r=l.reading;return`<div class="reading-box"><h3>${r.title}</h3><button class="listen-btn" onclick="speak(\`${r.text.replace(/`/g,"'").replace(/'/g,"\\'")}\`,0.8)" style="margin-bottom:10px">🔊 Ouvir</button><div class="reading-text">${r.text}</div><h4 style="color:var(--accent);margin:14px 0 7px">📝 Compreensão:</h4>${r.questions.map((q,qi)=>`<div class="rq-item"><div class="rq-q">${qi+1}. ${q.q}</div>${q.opts.map((o,oi)=>`<label id="rq${qi}_${oi}"><input type="radio" name="rq${qi}" onchange="checkR(${qi},${oi},${q.answer})">${o}</label>`).join('')}</div>`).join('')}<div style="text-align:center;margin-top:14px"><button class="btn-check" onclick="switchSec('writing')">→ Escrita</button></div></div>`;}
function checkR(qi,sel,cor){document.querySelectorAll(`[id^="rq${qi}_"]`).forEach((l,i)=>{l.classList.remove('correct','wrong');if(i===cor)l.classList.add('correct');else if(i===sel&&i!==cor)l.classList.add('wrong');});completeMission('reading');}
function rWriting(l){return`<div class="writing-box"><h3>✍️ Escrita</h3><div class="writing-prompt">${l.writing.prompt.replace(/\n/g,'<br>')}</div><textarea class="writing-area" id="wI" placeholder="Escreva em inglês..." rows="6"></textarea><button class="btn-check" onclick="checkW()">📝 Verificar</button><div id="wF" class="writing-feedback"></div></div>`;}
function checkW(){const t=document.getElementById('wI').value.trim(),fb=document.getElementById('wF');if(t.length<20){fb.className='writing-feedback show';fb.style.cssText='background:rgba(255,82,82,.1);border:1px solid var(--danger)';fb.innerHTML='⚠️ Texto muito curto!';return;}const lo=t.toLowerCase();let f=state.currentLesson.writing.keywords.filter(k=>lo.includes(k.toLowerCase()));const kl=state.currentLesson.writing.keywords.length;const sc=Math.round((f.length/kl)*100);fb.className='writing-feedback show';if(sc>=60){fb.style.cssText='background:rgba(0,230,118,.1);border:1px solid var(--accent2)';fb.innerHTML=`✅ Muito bem! ${f.length}/${kl} palavras-chave.`;completeMission('writing');}else{fb.style.cssText='background:rgba(255,152,0,.1);border:1px solid var(--accent3)';fb.innerHTML=`⚠️ Use mais: ${state.currentLesson.writing.keywords.filter(k=>!lo.includes(k.toLowerCase())).join(', ')}`;}}
function rSpeaking(l){return l.speaking.map((s,i)=>`<div class="speaking-box"><h3>🎤 ${i+1}/${l.speaking.length}</h3><button class="listen-btn" onclick="speak('${s.phrase.replace(/'/g,"\\'")}',0.75)">🔊 Ouvir</button><div class="speak-prompt">"${s.phrase}"</div><div class="speak-phonetic">${s.phonetic}</div><div class="speak-translation">${s.translation}</div><button class="mic-btn" onclick="toggleRec('${s.phrase.replace(/'/g,"\\'")}','sr${i}')">🎙️</button><p style="font-size:.73rem;color:var(--text2)">Clique e fale</p><div id="sr${i}"></div></div>`).join('');}
function rQuiz(l){return`<div class="quiz-box"><h3>🧠 Quiz</h3>${l.quiz.map((q,i)=>q.type==='choice'?`<div class="quiz-item"><div class="qi-q">${i+1}. ${q.q}</div><div class="qi-options">${q.opts.map((o,oi)=>`<label id="qi${i}_${oi}"><input type="radio" name="qi${i}" value="${oi}">${o}</label>`).join('')}</div></div>`:`<div class="quiz-item"><div class="qi-q">${i+1}. ${q.q}</div><input class="qi-input" id="qiI${i}" placeholder="Resposta..."></div>`).join('')}<div style="text-align:center"><button class="btn-primary" onclick="checkQ()">Verificar</button></div><div id="qR" class="quiz-result"></div></div>`;}
function checkQ(){const l=state.currentLesson;let c=0;l.quiz.forEach((q,i)=>{if(q.type==='choice'){const s=document.querySelector(`input[name="qi${i}"]:checked`);if(s){const v=parseInt(s.value);document.querySelectorAll(`[id^="qi${i}_"]`).forEach((lb,j)=>{lb.classList.remove('correct','wrong');if(j===q.answer)lb.classList.add('correct');else if(j===v&&j!==q.answer)lb.classList.add('wrong');});if(v===q.answer)c++;}}else{const inp=document.getElementById('qiI'+i);if(inp&&inp.value.trim().toLowerCase()===q.answer.toLowerCase()){inp.style.cssText='border-color:var(--accent2);background:rgba(0,230,118,.1)';c++;}else if(inp){inp.style.cssText='border-color:var(--danger);background:rgba(255,82,82,.1)';inp.placeholder='→ '+q.answer;}}});const p=Math.round((c/l.quiz.length)*100),r=document.getElementById('qR');r.className='quiz-result show';r.style.cssText=`background:${p>=60?'rgba(0,230,118,.1)':'rgba(255,82,82,.1)'};border:1px solid ${p>=60?'var(--accent2)':'var(--danger)'}`;r.innerHTML=`<div class="qr-score" style="color:${p>=60?'var(--accent2)':'var(--danger)'}">${c}/${l.quiz.length} (${p}%)</div><div class="qr-msg">${p>=80?'🏆 Excelente!':p>=60?'✅ Bom!':'📚 Revise!'}</div>`;if(p>=60)completeMission('quiz');}
window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').style.display='none',600);},1200);initSR();startTimer();updateSidebar();showHome();if(window.speechSynthesis)window.speechSynthesis.getVoices();});
</script></body></html>
