<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇬🇧 English Mastery — Curso Completo + TOEFL + IELTS</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--card:#1e2746;--accent:#4fc3f7;--accent2:#00e676;--accent3:#ff9800;--accent4:#e040fb;--danger:#ff5252;--text:#e8eaf6;--text2:#90a4ae;--gold:#ffd700;--gradient:linear-gradient(135deg,#4fc3f7,#00e676);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:7px;}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px;}
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;}
#splash.hide{opacity:0;pointer-events:none;}
#splash h1{font-size:2.5rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.loader{width:50px;height:50px;border:4px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-top:25px;}
@keyframes spin{to{transform:rotate(360deg);}}
.navbar{background:var(--bg2);border-bottom:1px solid rgba(79,195,247,.12);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.nav-brand{font-size:1.25rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;}
.nav-stats{display:flex;gap:12px;}.stat-badge{display:flex;align-items:center;gap:4px;background:var(--bg3);padding:4px 10px;border-radius:16px;font-size:.78rem;font-weight:600;}
.layout{display:flex;min-height:calc(100vh - 50px);}
.sidebar{width:270px;background:var(--bg2);border-right:1px solid rgba(79,195,247,.08);overflow-y:auto;flex-shrink:0;transition:transform .3s;}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(79,195,247,.08);}
.sidebar-header h3{font-size:.9rem;color:var(--accent);margin-bottom:6px;}
.progress-bar-bg{background:var(--bg);border-radius:8px;height:8px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--gradient);border-radius:8px;transition:width .5s;}
.progress-text{font-size:.68rem;color:var(--text2);margin-top:3px;}
.module-group{padding:4px 0;}
.module-title{padding:8px 16px;font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;}
.lesson-btn{width:100%;padding:9px 16px;background:none;border:none;color:var(--text2);text-align:left;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:8px;transition:all .2s;}
.lesson-btn:hover{background:rgba(79,195,247,.06);color:var(--text);}
.lesson-btn.active{background:rgba(79,195,247,.12);color:var(--accent);border-left:3px solid var(--accent);}
.lesson-btn.completed{color:var(--accent2);}
.lesson-btn .l-icon{width:20px;height:20px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;}
.lesson-btn.completed .l-icon{background:var(--accent2);border-color:var(--accent2);color:var(--bg);}
.main-content{flex:1;padding:24px;max-width:880px;margin:0 auto;overflow-y:auto;}
.home-hero{text-align:center;padding:40px 16px;}
.home-hero h1{font-size:2.4rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.home-hero p{color:var(--text2);font-size:1.05rem;max-width:580px;margin:0 auto 20px;}
.hero-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:24px;}
.hero-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid rgba(79,195,247,.08);transition:transform .2s;}
.hero-card:hover{transform:translateY(-3px);}
.hero-card .hc-icon{font-size:2rem;margin-bottom:8px;}
.hero-card h3{font-size:.88rem;margin-bottom:5px;color:var(--accent);}
.hero-card p{font-size:.76rem;color:var(--text2);}
.btn-primary{background:var(--gradient);color:#000;border:none;padding:12px 28px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .2s;display:inline-block;margin-top:16px;}
.btn-primary:hover{transform:scale(1.03);}
.btn-secondary{background:transparent;border:2px solid var(--accent);color:var(--accent);padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;margin:4px;}
.btn-secondary:hover{background:rgba(79,195,247,.1);}
.daily-panel{background:var(--card);border-radius:12px;padding:18px;margin-top:20px;border:1px solid rgba(255,152,0,.15);}
.daily-panel h3{color:var(--accent3);margin-bottom:12px;font-size:.95rem;}
.mission-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.mission-item:last-child{border:none;}
.mission-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--text2);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;}
.mission-check.done{background:var(--accent2);border-color:var(--accent2);color:#000;}
.mission-info .m-title{font-size:.82rem;font-weight:600;}
.mission-xp{color:var(--gold);font-weight:700;font-size:.75rem;margin-left:auto;}
.timer-bar{background:var(--bg3);border-radius:9px;padding:12px 18px;margin:16px 0;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,152,0,.1);}
.timer-bar .timer-icon{font-size:1.2rem;}
.timer-bar .timer-info .t-label{font-size:.7rem;color:var(--text2);}
.timer-bar .timer-info .t-time{font-size:1.1rem;font-weight:700;color:var(--accent3);}
.timer-progress{flex:2;}
.timer-progress .tp-bg{background:var(--bg);border-radius:6px;height:6px;overflow:hidden;}
.timer-progress .tp-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent2));border-radius:6px;transition:width 1s;}
.timer-progress .tp-text{font-size:.65rem;color:var(--text2);margin-top:2px;}
.lesson-header{margin-bottom:22px;}
.lesson-header .breadcrumb{font-size:.74rem;color:var(--text2);margin-bottom:5px;}
.lesson-header .breadcrumb span{color:var(--accent);}
.lesson-header h1{font-size:1.6rem;font-weight:700;margin-bottom:2px;}
.lesson-header .subtitle{color:var(--text2);font-size:.92rem;}
.section-tabs{display:flex;gap:3px;margin-bottom:20px;flex-wrap:wrap;}
.sec-tab{padding:8px 13px;background:var(--bg3);border:none;color:var(--text2);border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;}
.sec-tab:hover{background:rgba(79,195,247,.1);color:var(--text);}
.sec-tab.active{background:var(--accent);color:#000;}
.teacher-box{background:linear-gradient(135deg,rgba(79,195,247,.06),rgba(0,230,118,.03));border:1px solid rgba(79,195,247,.1);border-radius:12px;padding:18px;margin-bottom:18px;display:flex;gap:12px;}
.teacher-avatar{width:46px;height:46px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.teacher-content .t-name{font-weight:700;color:var(--accent);font-size:.85rem;margin-bottom:4px;}
.teacher-content .t-tip{font-size:.85rem;line-height:1.55;}
.teacher-content .t-method{font-size:.72rem;color:var(--accent2);margin-top:6px;font-style:italic;}
.teacher-class{background:var(--card);border-radius:12px;padding:18px;margin:14px 0;border-left:4px solid var(--accent2);}
.teacher-class h3{color:var(--accent2);margin-bottom:10px;font-size:.98rem;}
.class-step{display:flex;gap:10px;margin:8px 0;align-items:flex-start;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent2);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;}
.step-content{flex:1;font-size:.85rem;line-height:1.5;}
.step-content b{color:var(--accent);}
.pron-legend{background:rgba(255,171,64,.06);border:1px solid rgba(255,171,64,.12);border-radius:9px;padding:10px 14px;margin:12px 0;font-size:.78rem;}
.pron-legend h4{color:#ffab40;font-size:.84rem;margin-bottom:4px;}
.pron-legend p{color:var(--text2);line-height:1.45;}
.pron-legend .key{color:#ffab40;font-weight:700;}
.pronpt-badge{display:inline-block;background:rgba(255,171,64,.1);border:1px solid rgba(255,171,64,.2);border-radius:5px;padding:1px 6px;font-size:.7rem;color:#ffab40;font-weight:700;margin-left:3px;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin:14px 0;}
.vocab-card{background:var(--bg3);border-radius:10px;padding:12px;border:1px solid rgba(79,195,247,.06);transition:transform .2s;cursor:pointer;position:relative;}
.vocab-card:hover{transform:translateY(-2px);border-color:var(--accent);}
.vocab-card .v-word{font-size:1.05rem;font-weight:700;color:var(--accent);}
.vocab-card .v-pronpt{font-size:.8rem;color:#ffab40;font-weight:600;margin:2px 0;}
.vocab-card .v-phonetic{font-size:.75rem;color:var(--accent4);margin:1px 0;}
.vocab-card .v-trans{font-size:.82rem;color:var(--text2);}
.vocab-card .v-example{font-size:.75rem;color:var(--text);margin-top:4px;font-style:italic;border-left:2px solid var(--accent);padding-left:6px;}
.vocab-card .v-speak{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--accent);font-size:1rem;cursor:pointer;}
.grammar-box{background:var(--card);border-radius:12px;padding:20px;margin:14px 0;border-left:4px solid var(--accent);}
.grammar-box h3{color:var(--accent);margin-bottom:8px;font-size:1rem;}
.grammar-box p{line-height:1.6;margin-bottom:8px;font-size:.88rem;}
.grammar-box .example{background:var(--bg);padding:9px 12px;border-radius:7px;margin:6px 0;font-size:.85rem;}
.grammar-box .example .en{color:var(--accent);font-weight:600;}
.grammar-box .example .pt{color:var(--text2);font-size:.78rem;}
.grammar-box .example .phonetic{color:var(--accent4);font-size:.74rem;}
.grammar-box .example .ex-pronpt{color:#ffab40;font-size:.76rem;font-weight:600;}
.grammar-table{width:100%;border-collapse:collapse;margin:8px 0;}
.grammar-table th{background:var(--bg3);color:var(--accent);padding:7px;text-align:left;font-size:.78rem;}
.grammar-table td{padding:7px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem;}
.reading-box{background:var(--card);border-radius:12px;padding:20px;margin:14px 0;}
.reading-box h3{color:var(--accent);margin-bottom:12px;}
.reading-text{background:var(--bg);padding:16px;border-radius:10px;line-height:1.8;font-size:.9rem;margin-bottom:16px;}
.rq-item{margin-bottom:12px;}
.rq-item .rq-q{font-weight:600;margin-bottom:6px;font-size:.87rem;}
.rq-item label{display:block;padding:6px 10px;background:var(--bg3);border-radius:6px;margin:3px 0;cursor:pointer;font-size:.82rem;border:1px solid transparent;}
.rq-item label:hover{border-color:var(--accent);}
.rq-item input[type=radio]{margin-right:6px;}
.rq-item label.correct{border-color:var(--accent2);background:rgba(0,230,118,.08);}
.rq-item label.wrong{border-color:var(--danger);background:rgba(255,82,82,.08);}
.writing-box{background:var(--card);border-radius:12px;padding:20px;margin:14px 0;}
.writing-box h3{color:var(--accent);margin-bottom:8px;}
.writing-prompt{background:var(--bg);padding:12px;border-radius:8px;margin-bottom:12px;font-size:.87rem;line-height:1.5;border-left:3px solid var(--accent3);}
.writing-area{width:100%;min-height:100px;background:var(--bg);border:1px solid rgba(79,195,247,.1);border-radius:8px;padding:12px;color:var(--text);font-size:.9rem;resize:vertical;font-family:inherit;line-height:1.5;}
.writing-area:focus{outline:none;border-color:var(--accent);}
.writing-feedback{margin-top:8px;padding:10px;border-radius:8px;font-size:.82rem;display:none;}
.writing-feedback.show{display:block;}
.speaking-box{background:var(--card);border-radius:12px;padding:20px;margin:14px 0;text-align:center;}
.speaking-box h3{color:var(--accent);margin-bottom:12px;}
.speak-prompt{font-size:1.1rem;font-weight:600;margin:12px 0;color:var(--accent);}
.speak-pronpt{color:#ffab40;font-size:.9rem;margin-bottom:6px;font-weight:600;}
.speak-phonetic{color:var(--accent4);font-size:.88rem;margin-bottom:12px;}
.speak-translation{color:var(--text2);font-size:.85rem;margin-bottom:16px;}
.mic-btn{width:66px;height:66px;border-radius:50%;border:3px solid var(--accent);background:transparent;color:var(--accent);font-size:1.6rem;cursor:pointer;transition:all .3s;margin:8px auto;display:flex;align-items:center;justify-content:center;}
.mic-btn:hover{background:rgba(79,195,247,.1);}
.mic-btn.recording{background:var(--danger);border-color:var(--danger);color:#fff;animation:prec 1.5s infinite;}
@keyframes prec{0%,100%{box-shadow:0 0 0 0 rgba(255,82,82,.3);}50%{box-shadow:0 0 0 10px rgba(255,82,82,0);}}
.speak-result{margin-top:12px;padding:10px;border-radius:8px;font-size:.85rem;}
.speak-result.good{background:rgba(0,230,118,.08);border:1px solid var(--accent2);}
.speak-result.retry{background:rgba(255,152,0,.08);border:1px solid var(--accent3);}
.listen-btn{background:var(--bg3);border:1px solid var(--accent);color:var(--accent);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.84rem;margin:5px;}
.listen-btn:hover{background:rgba(79,195,247,.1);}
.quiz-box{background:var(--card);border-radius:12px;padding:20px;margin:14px 0;}
.quiz-box h3{color:var(--accent);margin-bottom:12px;}
.quiz-item{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.quiz-item:last-child{border:none;}
.quiz-item .qi-q{font-weight:600;margin-bottom:8px;font-size:.87rem;}
.quiz-item .qi-input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid rgba(79,195,247,.1);border-radius:6px;color:var(--text);font-size:.85rem;}
.quiz-item .qi-input:focus{outline:none;border-color:var(--accent);}
.quiz-item .qi-options label{display:block;padding:6px 10px;background:var(--bg3);border-radius:6px;margin:3px 0;cursor:pointer;font-size:.82rem;border:1px solid transparent;}
.quiz-item .qi-options label:hover{border-color:var(--accent);}
.quiz-result{text-align:center;padding:16px;margin-top:12px;border-radius:10px;display:none;}
.quiz-result.show{display:block;}
.quiz-result .qr-score{font-size:1.6rem;font-weight:800;}
.quiz-result .qr-msg{color:var(--text2);margin-top:5px;}
.btn-check{background:var(--accent);color:#000;border:none;padding:8px 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.84rem;margin-top:8px;}
.btn-check:hover{transform:scale(1.02);}
.btn-next{background:var(--accent2);color:#000;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.88rem;margin-top:12px;}
.lesson-nav{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.03);}
.achievement-popup{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:16px 20px;z-index:200;transform:translateX(400px);transition:transform .5s cubic-bezier(.68,-.55,.27,1.55);display:flex;align-items:center;gap:10px;}
.achievement-popup.show{transform:translateX(0);}
.achievement-popup .ach-icon{font-size:1.8rem;}
.achievement-popup .ach-text h4{color:var(--gold);font-size:.82rem;}
.achievement-popup .ach-text p{color:var(--text2);font-size:.72rem;}
.dialogue-line{display:flex;gap:9px;margin:8px 0;}
.dialogue-line .dl-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.dialogue-line .dl-avatar.a{background:var(--accent);color:#000;}
.dialogue-line .dl-avatar.b{background:var(--accent3);color:#000;}
.dialogue-line .dl-bubble{background:var(--bg3);padding:9px 12px;border-radius:10px;flex:1;}
.dialogue-line .dl-bubble .dl-en{font-weight:600;font-size:.85rem;}
.dialogue-line .dl-bubble .dl-pronpt{color:#ffab40;font-size:.74rem;font-weight:600;}
.dialogue-line .dl-bubble .dl-ph{color:var(--accent4);font-size:.72rem;}
.dialogue-line .dl-bubble .dl-pt{color:var(--text2);font-size:.75rem;margin-top:2px;}
.section-content{display:none;animation:fadeIn .3s;}
.section-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:768px){
.sidebar{position:fixed;left:0;top:50px;bottom:0;z-index:90;transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.main-content{padding:12px;}
.home-hero h1{font-size:1.6rem;}
.vocab-grid{grid-template-columns:1fr;}
.hero-cards{grid-template-columns:1fr;}
}
.menu-toggle{display:none;background:none;border:none;color:var(--accent);font-size:1.3rem;cursor:pointer;}
@media(max-width:768px){.menu-toggle{display:block;}}
</style>
</head>

<div id="splash"><h1>🇬🇧 English Mastery</h1><p style="color:#90a4ae;margin-top:8px;">Carregando 46 aulas com pronúncia em português...</p><div class="loader"></div></div>
<div id="achievementPopup" class="achievement-popup"><div class="ach-icon" id="achIcon">🏆</div><div class="ach-text"><h4 id="achTitle"></h4><p id="achDesc"></p></div></div>

<script>

let state={currentLesson:null,currentSection:'teacher',completedLessons:JSON.parse(localStorage.getItem('em_completed')||'[]'),xp:parseInt(localStorage.getItem('em_xp')||'0'),streak:parseInt(localStorage.getItem('em_streak')||'0'),lastStudyDate:localStorage.getItem('em_lastDate')||'',todaySeconds:parseInt(localStorage.getItem('em_todaySec')||'0'),dailyMissions:JSON.parse(localStorage.getItem('em_missions')||'{"vocab":false,"reading":false,"writing":false,"speaking":false,"quiz":false}')};
let timerInterval=null;
function startTimer(){if(timerInterval)return;const today=new Date().toDateString();if(state.lastStudyDate!==today){state.todaySeconds=0;state.dailyMissions={vocab:false,reading:false,writing:false,speaking:false,quiz:false};if(state.lastStudyDate&&(new Date(today)-new Date(state.lastStudyDate))/864e5>1)state.streak=0;state.lastStudyDate=today;saveState();}timerInterval=setInterval(()=>{state.todaySeconds++;updateUI();if(state.todaySeconds%30===0)saveState();},1000);}
function updateUI(){const m=Math.floor(state.todaySeconds/60),s=state.todaySeconds%60;document.getElementById('navTimer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;document.getElementById('navXP').textContent=state.xp+' XP';document.getElementById('navStreak').textContent=state.streak;}
function saveState(){localStorage.setItem('em_completed',JSON.stringify(state.completedLessons));localStorage.setItem('em_xp',state.xp);localStorage.setItem('em_streak',state.streak);localStorage.setItem('em_lastDate',state.lastStudyDate);localStorage.setItem('em_todaySec',state.todaySeconds);localStorage.setItem('em_missions',JSON.stringify(state.dailyMissions));updateUI();updateSidebar();}
function addXP(a){state.xp+=a;saveState();showAch('⚡','+ '+a+' XP!','Continue!');}
function showAch(i,t,d){const p=document.getElementById('achievementPopup');document.getElementById('achIcon').textContent=i;document.getElementById('achTitle').textContent=t;document.getElementById('achDesc').textContent=d;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3000);}
function completeMission(k){if(!state.dailyMissions[k]){state.dailyMissions[k]=true;addXP(XP_PER_SECTION);if(Object.values(state.dailyMissions).every(v=>v)){state.streak++;showAch('🔥','Streak '+state.streak+'!','Missão completa!');}saveState();}}
function completeLesson(id){if(!state.completedLessons.includes(id)){state.completedLessons.push(id);addXP(50);showAch('🏆','Aula Concluída!','Parabéns!');saveState();}}
function updateSidebar(){const c=document.getElementById('sidebarLessons');let h='',cm='';lessons.forEach(l=>{if(l.module!==cm){if(cm)h+='</div>';cm=l.module;h+=`<div class="module-group"><div class="module-title">${l.moduleIcon} ${l.module}</div>`;}const ic=state.completedLessons.includes(l.id),ia=state.currentLesson&&state.currentLesson.id===l.id;h+=`<button class="lesson-btn ${ic?'completed':''} ${ia?'active':''}" onclick="openLesson(${l.id})"><div class="l-icon">${ic?'✓':l.id}</div><div><div style="font-weight:600;font-size:.78rem">${l.title}</div><div style="font-size:.66rem;color:var(--text2)">${l.titlePt}</div></div></button>`;});h+='</div>';c.innerHTML=h;const p=Math.round((state.completedLessons.length/lessons.length)*100);document.getElementById('globalProgress').style.width=p+'%';document.getElementById('globalProgressText').textContent=p+'%';}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function speak(text,rate=0.85){if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate;const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'));if(v)u.voice=v;window.speechSynthesis.speak(u);}}
let recognition=null,isRecording=false;
function initSR(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){recognition=new SR();recognition.lang='en-US';recognition.continuous=false;}}
function toggleRec(target,rid){if(!recognition){document.getElementById(rid).innerHTML='<div class="speak-result retry">⚠️ Use Chrome/Edge.</div>';return;}if(isRecording){recognition.stop();isRecording=false;return;}isRecording=true;recognition.start();recognition.onresult=(e)=>{const t=e.results[0][0].transcript.toLowerCase(),tw=target.toLowerCase().replace(/[.,!?]/g,'').split(/\s+/),sw=t.replace(/[.,!?]/g,'').split(/\s+/);let m=0;tw.forEach(w=>{if(sw.includes(w))m++;});const sc=Math.round((m/tw.length)*100);document.getElementById(rid).innerHTML=sc>=80?`<div class="speak-result good">✅ ${sc}% — "${t}"</div>`:`<div class="speak-result retry">🔄 ${sc}% — "${t}"</div>`;if(sc>=80)completeMission('speaking');isRecording=false;};recognition.onerror=()=>{isRecording=false;};recognition.onend=()=>{isRecording=false;};}
// ======================== HOME ========================
function showHome(){state.currentLesson=null;updateSidebar();const mc=document.getElementById('mainContent'),gm=DAILY_GOAL_MINUTES,cm=Math.floor(state.todaySeconds/60),p=Math.min(100,Math.round((cm/gm)*100)),ms=state.dailyMissions;
mc.innerHTML=`<div class="home-hero"><h1>🇬🇧 English Mastery</h1><p>${lessons.length} aulas • 15 módulos • Pronúncia em português 🇧🇷 • Professor em cada aula 👨‍🏫</p><button class="btn-primary" onclick="openLesson(${getNext()})">🚀 ${state.completedLessons.length>0?'Continuar':'Começar'}</button></div><div class="timer-bar"><div class="timer-icon">⏱️</div><div class="timer-info"><div class="t-label">Estudo hoje</div><div class="t-time">${cm}/${gm} min</div></div><div class="timer-progress"><div class="tp-bg"><div class="tp-fill" style="width:${p}%"></div></div><div class="tp-text">${p>=100?'✅ Meta!':gm-cm+' min restantes'}</div></div></div><div class="daily-panel"><h3>🎯 Missões Diárias</h3>${['vocab','reading','writing','speaking','quiz'].map(k=>`<div class="mission-item"><div class="mission-check ${ms[k]?'done':''}">✓</div><div class="mission-info"><div class="m-title">${{vocab:'📝 Vocabulário',reading:'📖 Leitura',writing:'✍️ Escrita',speaking:'🎤 Fala',quiz:'🧠 Quiz'}[k]}</div></div><div class="mission-xp">+25 XP</div></div>`).join('')}</div><div class="hero-cards"><div class="hero-card"><div class="hc-icon">📚</div><h3>${lessons.length} Aulas</h3><p>15 módulos completos</p></div><div class="hero-card"><div class="hc-icon">🇧🇷</div><h3>Pronúncia PT</h3><p>Leia como se fosse português!</p></div><div class="hero-card"><div class="hc-icon">👨‍🏫</div><h3>Professor</h3><p>Explicação detalhada em cada aula</p></div><div class="hero-card"><div class="hc-icon">🎯</div><h3>TOEFL + IELTS</h3><p>Preparação para certificações</p></div></div>`;}
function getNext(){for(let l of lessons)if(!state.completedLessons.includes(l.id))return l.id;return 1;}
// ======================== LESSON ========================
function openLesson(id){const l=lessons.find(x=>x.id===id);if(!l)return;state.currentLesson=l;updateSidebar();renderLesson();document.getElementById('sidebar').classList.remove('open');window.scrollTo(0,0);}
function switchSec(s){document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.section-content').forEach(x=>x.classList.remove('active'));document.querySelector(`[data-section="${s}"]`).classList.add('active');document.getElementById('s-'+s).classList.add('active');}
function renderLesson(){const l=state.currentLesson,mc=document.getElementById('mainContent');
mc.innerHTML=`<div class="lesson-header"><div class="breadcrumb">${l.moduleIcon} ${l.module} › <span>${l.title}</span></div><h1>${l.title}</h1><div class="subtitle">${l.titlePt}</div></div><div class="section-tabs"><button class="sec-tab active" data-section="teacher" onclick="switchSec('teacher')">👨‍🏫 Aula</button><button class="sec-tab" data-section="vocab" onclick="switchSec('vocab')">📝 Vocab</button><button class="sec-tab" data-section="grammar" onclick="switchSec('grammar')">📐 Gramática</button><button class="sec-tab" data-section="dialogue" onclick="switchSec('dialogue')">💬 Diálogo</button><button class="sec-tab" data-section="reading" onclick="switchSec('reading')">📖 Leitura</button><button class="sec-tab" data-section="writing" onclick="switchSec('writing')">✍️ Escrita</button><button class="sec-tab" data-section="speaking" onclick="switchSec('speaking')">🎤 Fala</button><button class="sec-tab" data-section="quiz" onclick="switchSec('quiz')">🧠 Quiz</button></div><div id="s-teacher" class="section-content active">${rTeacher(l)}</div><div id="s-vocab" class="section-content">${rVocab(l)}</div><div id="s-grammar" class="section-content">${rGrammar(l)}</div><div id="s-dialogue" class="section-content">${rDialogue(l)}</div><div id="s-reading" class="section-content">${rReading(l)}</div><div id="s-writing" class="section-content">${rWriting(l)}</div><div id="s-speaking" class="section-content">${rSpeaking(l)}</div><div id="s-quiz" class="section-content">${rQuiz(l)}</div><div class="lesson-nav">${l.id>1?`<button class="btn-secondary" onclick="openLesson(${l.id-1})">← Anterior</button>`:'<div></div>'}<button class="btn-next" onclick="finishL(${l.id})">✅ Concluir</button>${l.id<lessons.length?`<button class="btn-secondary" onclick="openLesson(${l.id+1})">Próxima →</button>`:'<div></div>'}</div>`;}
function finishL(id){completeLesson(id);const n=lessons.find(l=>l.id===id+1);if(n){if(confirm('🎉 Parabéns! Próxima aula?'))openLesson(n.id);}else{alert('🏆 Todas as 46 aulas concluídas! Parabéns!');showHome();}}
// ======================== ENHANCED TEACHER ========================
function rTeacher(l){const vp=l.vocab.slice(0,3).map(v=>`<b>${v.word}</b> <span class="pronpt-badge">${pronPt(v.word)}</span>`).join(' • ');
return`<div class="teacher-box"><div class="teacher-avatar">👨‍🏫</div><div class="teacher-content"><div class="t-name">${l.teacher.name}</div><div class="t-tip">${l.teacher.tip}</div><div class="t-method">${l.teacher.method}</div></div></div>
<div class="teacher-class"><h3>📚 Aula do Professor — ${l.title}</h3>
<div class="class-step"><div class="step-num">1</div><div class="step-content"><b>Objetivo:</b> Dominar <b>${l.grammar.title}</b> e ${l.vocab.length} palavras novas com pronúncia em português e IPA.</div></div>
<div class="class-step"><div class="step-num">2</div><div class="step-content"><b>Vocabulário:</b> Clique em cada palavra para ouvir. A legenda 🇧🇷 mostra como ler: ${vp}</div></div>
<div class="class-step"><div class="step-num">3</div><div class="step-content"><b>Gramática:</b> Estude <b>${l.grammar.title}</b> com tabelas e exemplos práticos.</div></div>
<div class="class-step"><div class="step-num">4</div><div class="step-content"><b>Diálogo:</b> Pratique <b>Shadowing</b> — repita cada frase imitando ritmo e entonação.</div></div>
<div class="class-step"><div class="step-num">5</div><div class="step-content"><b>Prática:</b> Complete: Leitura → Escrita → Fala (use o 🎙️!) → Quiz. Cada = <b>+25 XP</b>!</div></div></div>
<div class="pron-legend"><h4>🇧🇷 Como ler a pronúncia em português:</h4><p>MAIÚSCULAS = sílaba forte • <span class="key">rr</span> = H aspirado • <span class="key">dh</span> = TH (língua nos dentes) • <span class="key">x</span> = SH • <span class="key">tch</span> = CH • <span class="key">â</span> = A curto • <span class="key">ê/ô</span> = fechado</p></div>
<div style="text-align:center;margin-top:16px"><button class="btn-primary" onclick="switchSec('vocab')">Começar a Aula →</button></div>`;}
// ======================== VOCAB WITH PT PRON ========================
function rVocab(l){return`<h3 style="color:var(--accent)">📝 Vocabulário — ${l.vocab.length} palavras</h3><p style="color:var(--text2);margin-bottom:12px;font-size:.8rem">Clique para ouvir 🔊 | 🇧🇷 = pronúncia em português</p><div class="vocab-grid">${l.vocab.map(v=>`<div class="vocab-card" onclick="speak('${v.word.replace(/'/g,"\\'")}')"><button class="v-speak" onclick="event.stopPropagation();speak('${v.word.replace(/'/g,"\\'")}')">🔊</button><div class="v-word">${v.word}</div><div class="v-pronpt">${pronPt(v.word)}</div><div class="v-phonetic">${v.phonetic}</div><div class="v-trans">${v.trans}</div><div class="v-example">${v.example}</div></div>`).join('')}</div><div style="text-align:center;margin-top:12px"><button class="btn-check" onclick="completeMission('vocab');switchSec('grammar')">✓ Estudado → Gramática</button></div>`;}
// ======================== GRAMMAR ========================
function rGrammar(l){const g=l.grammar;let t='';if(g.table&&g.table.length>1){t='<table class="grammar-table"><thead><tr>'+g.table[0].map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+g.table.slice(1).map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';}return`<div class="grammar-box"><h3>📐 ${g.title}</h3><p>${g.explanation}</p>${t}<h4 style="margin-top:12px;color:var(--accent)">Exemplos:</h4>${g.examples.map(e=>`<div class="example"><div class="en" style="cursor:pointer" onclick="speak('${e.en.replace(/'/g,"\\'")}')">${e.en} 🔊</div><div class="ex-pronpt">${pronPt(e.en)}</div><div class="phonetic">${e.ph}</div><div class="pt">${e.pt}</div></div>`).join('')}<div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:7px;font-size:.8rem">${g.tip}</div></div><div style="text-align:center;margin-top:12px"><button class="btn-check" onclick="switchSec('dialogue')">→ Diálogo</button></div>`;}
// ======================== DIALOGUE WITH PT PRON ========================
function rDialogue(l){return`<div class="reading-box"><h3>💬 Diálogo — Pratique Shadowing!</h3><p style="color:var(--text2);margin-bottom:10px;font-size:.8rem">Clique para ouvir 🔊 | 🇧🇷 Pronúncia em português</p>${l.dialogue.map(d=>`<div class="dialogue-line"><div class="dl-avatar ${d.speaker.toLowerCase()}">${d.name[0]}</div><div class="dl-bubble" onclick="speak('${d.en.replace(/'/g,"\\'")}')"><div class="dl-en">${d.name}: ${d.en} 🔊</div><div class="dl-pronpt">${pronPt(d.en)}</div><div class="dl-ph">${d.ph}</div><div class="dl-pt">${d.pt}</div></div></div>`).join('')}<div style="text-align:center;margin-top:16px"><button class="listen-btn" onclick="playD()">▶️ Ouvir</button><button class="btn-check" onclick="switchSec('reading')">→ Leitura</button></div></div>`;}
function playD(){if(!state.currentLesson)return;const ls=state.currentLesson.dialogue;let i=0;(function n(){if(i<ls.length){speak(ls[i].en,0.8);i++;setTimeout(n,3500);}})();}
// ======================== READING ========================
function rReading(l){const r=l.reading;return`<div class="reading-box"><h3>${r.title}</h3><button class="listen-btn" onclick="speak(\`${r.text.replace(/`/g,"'").replace(/'/g,"\\'")}\`,0.8)" style="margin-bottom:8px">🔊 Ouvir</button><div class="reading-text">${r.text}</div><h4 style="color:var(--accent);margin:12px 0 6px">📝 Compreensão:</h4>${r.questions.map((q,qi)=>`<div class="rq-item"><div class="rq-q">${qi+1}. ${q.q}</div>${q.opts.map((o,oi)=>`<label id="rq${qi}_${oi}"><input type="radio" name="rq${qi}" onchange="checkR(${qi},${oi},${q.answer})">${o}</label>`).join('')}</div>`).join('')}<div style="text-align:center;margin-top:12px"><button class="btn-check" onclick="switchSec('writing')">→ Escrita</button></div></div>`;}
function checkR(qi,sel,cor){document.querySelectorAll(`[id^="rq${qi}_"]`).forEach((l,i)=>{l.classList.remove('correct','wrong');if(i===cor)l.classList.add('correct');else if(i===sel&&i!==cor)l.classList.add('wrong');});completeMission('reading');}
// ======================== WRITING ========================
function rWriting(l){return`<div class="writing-box"><h3>✍️ Escrita</h3><div class="writing-prompt">${l.writing.prompt.replace(/\n/g,'<br>')}</div><textarea class="writing-area" id="wI" placeholder="Escreva em inglês..." rows="5"></textarea><button class="btn-check" onclick="checkW()">📝 Verificar</button><div id="wF" class="writing-feedback"></div></div>`;}
function checkW(){const t=document.getElementById('wI').value.trim(),fb=document.getElementById('wF');if(t.length<20){fb.className='writing-feedback show';fb.style.cssText='background:rgba(255,82,82,.08);border:1px solid var(--danger)';fb.innerHTML='⚠️ Texto muito curto!';return;}const lo=t.toLowerCase();let f=state.currentLesson.writing.keywords.filter(k=>lo.includes(k.toLowerCase()));const kl=state.currentLesson.writing.keywords.length;fb.className='writing-feedback show';if(f.length/kl>=0.5){fb.style.cssText='background:rgba(0,230,118,.08);border:1px solid var(--accent2)';fb.innerHTML=`✅ Muito bem! ${f.length}/${kl} palavras-chave. ${t.split(/[.!?]+/).filter(s=>s.trim()).length} frases.`;completeMission('writing');}else{fb.style.cssText='background:rgba(255,152,0,.08);border:1px solid var(--accent3)';fb.innerHTML=`⚠️ Use mais: ${state.currentLesson.writing.keywords.filter(k=>!lo.includes(k.toLowerCase())).join(', ')}`;}}
// ======================== SPEAKING WITH PT PRON ========================
function rSpeaking(l){return l.speaking.map((s,i)=>`<div class="speaking-box"><h3>🎤 ${i+1}/${l.speaking.length}</h3><button class="listen-btn" onclick="speak('${s.phrase.replace(/'/g,"\\'")}',0.75)">🔊 Ouvir</button><div class="speak-prompt">"${s.phrase}"</div><div class="speak-pronpt">${pronPt(s.phrase)}</div><div class="speak-phonetic">${s.phonetic}</div><div class="speak-translation">${s.translation}</div><button class="mic-btn" onclick="toggleRec('${s.phrase.replace(/'/g,"\\'")}','sr${i}')">🎙️</button><p style="font-size:.7rem;color:var(--text2)">Clique no 🎙️ e fale</p><div id="sr${i}"></div></div>`).join('');}
// ======================== QUIZ ========================
function rQuiz(l){return`<div class="quiz-box"><h3>🧠 Quiz</h3>${l.quiz.map((q,i)=>q.type==='choice'?`<div class="quiz-item"><div class="qi-q">${i+1}. ${q.q}</div><div class="qi-options">${q.opts.map((o,oi)=>`<label id="qi${i}_${oi}"><input type="radio" name="qi${i}" value="${oi}">${o}</label>`).join('')}</div></div>`:`<div class="quiz-item"><div class="qi-q">${i+1}. ${q.q}</div><input class="qi-input" id="qiI${i}" placeholder="Resposta..."></div>`).join('')}<div style="text-align:center"><button class="btn-primary" onclick="checkQ()">Verificar</button></div><div id="qR" class="quiz-result"></div></div>`;}
function checkQ(){const l=state.currentLesson;let c=0;l.quiz.forEach((q,i)=>{if(q.type==='choice'){const s=document.querySelector(`input[name="qi${i}"]:checked`);if(s){const v=parseInt(s.value);document.querySelectorAll(`[id^="qi${i}_"]`).forEach((lb,j)=>{lb.classList.remove('correct','wrong');if(j===q.answer)lb.classList.add('correct');else if(j===v&&j!==q.answer)lb.classList.add('wrong');});if(v===q.answer)c++;}}else{const inp=document.getElementById('qiI'+i);if(inp&&inp.value.trim().toLowerCase()===q.answer.toLowerCase()){inp.style.cssText='border-color:var(--accent2);background:rgba(0,230,118,.08)';c++;}else if(inp){inp.style.cssText='border-color:var(--danger);background:rgba(255,82,82,.08)';inp.placeholder='→ '+q.answer;}}});const p=Math.round((c/l.quiz.length)*100),r=document.getElementById('qR');r.className='quiz-result show';r.style.cssText=`background:${p>=60?'rgba(0,230,118,.08)':'rgba(255,82,82,.08)'};border:1px solid ${p>=60?'var(--accent2)':'var(--danger)'}`;r.innerHTML=`<div class="qr-score" style="color:${p>=60?'var(--accent2)':'var(--danger)'}">${c}/${l.quiz.length} (${p}%)</div><div class="qr-msg">${p>=80?'🏆 Excelente!':p>=60?'✅ Bom!':'📚 Revise!'}</div>`;if(p>=60)completeMission('quiz');}
// ======================== INIT ========================
window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').style.display='none',600);},1000);initSR();startTimer();updateSidebar();showHome();if(window.speechSynthesis)window.speechSynthesis.getVoices();});
</script></body></html>
