<!DOCTYPE html>

<head>

<title>🇬🇧 English Mastery — Curso Imersivo + TOEFL + IELTS</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--card:#1e2746;--accent:#4fc3f7;--accent2:#00e676;--accent3:#ff9800;--accent4:#e040fb;--danger:#ff5252;--text:#e8eaf6;--text2:#90a4ae;--gold:#ffd700;--gradient:linear-gradient(135deg,#4fc3f7,#00e676);--shadow:0 8px 32px rgba(0,0,0,.4);--toefl:linear-gradient(135deg,#ff6f00,#ff9800);--ielts:linear-gradient(135deg,#d32f2f,#f44336);}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px;}
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;}#splash.hide{opacity:0;pointer-events:none;}#splash h1{font-size:2.6rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 2s infinite;}#splash p{color:var(--text2);margin-top:10px;}

.layout{display:flex;min-height:calc(100vh - 56px);}.sidebar{width:280px;background:var(--bg2);border-right:1px solid rgba(79,195,247,.1);overflow-y:auto;flex-shrink:0;transition:transform .3s;}

.main-content{flex:1;padding:28px;max-width:900px;margin:0 auto;overflow-y:auto;}
.home-hero{text-align:center;padding:50px 20px;}.home-hero h1{font-size:2.6rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px;}.home-hero p{color:var(--text2);font-size:1.1rem;max-width:600px;margin:0 auto 24px;}

.daily-panel{background:var(--card);border-radius:14px;padding:20px;margin-top:24px;border:1px solid rgba(255,152,0,.2);}.daily-panel h3{color:var(--accent3);margin-bottom:14px;font-size:1rem;}
.mission-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}.mission-item:last-child{border:none;}.mission-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--text2);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;}.mission-check.done{background:var(--accent2);border-color:var(--accent2);color:#000;}.mission-info{flex:1;}.mission-info .m-title{font-size:.85rem;font-weight:600;}.mission-xp{color:var(--gold);font-weight:700;font-size:.8rem;}
.timer-bar{background:var(--bg3);border-radius:10px;padding:14px 20px;margin:18px 0;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,152,0,.12);}.timer-bar .timer-icon{font-size:1.3rem;}.timer-bar .timer-info{flex:1;}.timer-bar .timer-info .t-label{font-size:.75rem;color:var(--text2);}.timer-bar .timer-info .t-time{font-size:1.2rem;font-weight:700;color:var(--accent3);}.timer-progress{flex:2;}.timer-progress .tp-bg{background:var(--bg);border-radius:8px;height:7px;overflow:hidden;}.timer-progress .tp-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent2));border-radius:8px;transition:width 1s;}.timer-progress .tp-text{font-size:.68rem;color:var(--text2);margin-top:3px;}
.lesson-header{margin-bottom:26px;}.lesson-header .breadcrumb{font-size:.78rem;color:var(--text2);margin-bottom:6px;}.lesson-header .breadcrumb span{color:var(--accent);}.lesson-header h1{font-size:1.7rem;font-weight:700;margin-bottom:3px;}.lesson-header .subtitle{color:var(--text2);font-size:.95rem;}
.section-tabs{display:flex;gap:3px;margin-bottom:22px;flex-wrap:wrap;}.sec-tab{padding:9px 15px;background:var(--bg3);border:none;color:var(--text2);border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:5px;}.sec-tab:hover{background:rgba(79,195,247,.12);color:var(--text);}.sec-tab.active{background:var(--accent);color:#000;}
.teacher-box{background:linear-gradient(135deg,rgba(79,195,247,.07),rgba(0,230,118,.04));border:1px solid rgba(79,195,247,.12);border-radius:14px;padding:20px;margin-bottom:22px;display:flex;gap:14px;align-items:flex-start;}.teacher-avatar{width:50px;height:50px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}.teacher-content{flex:1;}.teacher-content .t-name{font-weight:700;color:var(--accent);font-size:.88rem;margin-bottom:5px;}.teacher-content .t-tip{font-size:.88rem;line-height:1.6;}.teacher-content .t-method{font-size:.75rem;color:var(--accent2);margin-top:7px;font-style:italic;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin:18px 0;}.vocab-card{background:var(--bg3);border-radius:11px;padding:14px;border:1px solid rgba(79,195,247,.07);transition:transform .2s;cursor:pointer;position:relative;}.vocab-card:hover{transform:translateY(-2px);border-color:var(--accent);}.vocab-card .v-word{font-size:1.1rem;font-weight:700;color:var(--accent);}.vocab-card .v-phonetic{font-size:.78rem;color:var(--accent4);margin:2px 0;}.vocab-card .v-trans{font-size:.84rem;color:var(--text2);}.vocab-card .v-example{font-size:.78rem;color:var(--text);margin-top:5px;font-style:italic;border-left:2px solid var(--accent);padding-left:7px;}.vocab-card .v-speak{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--accent);font-size:1.1rem;cursor:pointer;}
.grammar-box{background:var(--card);border-radius:14px;padding:22px;margin:18px 0;border-left:4px solid var(--accent);}.grammar-box h3{color:var(--accent);margin-bottom:10px;font-size:1.05rem;}.grammar-box p{line-height:1.65;margin-bottom:9px;font-size:.9rem;}.grammar-box .example{background:var(--bg);padding:10px 14px;border-radius:8px;margin:7px 0;font-size:.87rem;}.grammar-box .example .en{color:var(--accent);font-weight:600;}.grammar-box .example .pt{color:var(--text2);font-size:.8rem;}.grammar-box .example .phonetic{color:var(--accent4);font-size:.77rem;}
.grammar-table{width:100%;border-collapse:collapse;margin:10px 0;}.grammar-table th{background:var(--bg3);color:var(--accent);padding:9px;text-align:left;font-size:.82rem;}.grammar-table td{padding:9px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;}
.reading-box{background:var(--card);border-radius:14px;padding:24px;margin:18px 0;}.reading-box h3{color:var(--accent);margin-bottom:14px;}.reading-text{background:var(--bg);padding:18px;border-radius:11px;line-height:1.85;font-size:.92rem;margin-bottom:18px;}.rq-item{margin-bottom:14px;}.rq-item .rq-q{font-weight:600;margin-bottom:7px;font-size:.9rem;}.rq-item label{display:block;padding:7px 12px;background:var(--bg3);border-radius:7px;margin:3px 0;cursor:pointer;font-size:.85rem;transition:all .2s;border:1px solid transparent;}.rq-item label:hover{border-color:var(--accent);}.rq-item input[type=radio]{margin-right:7px;}.rq-item label.correct{border-color:var(--accent2);background:rgba(0,230,118,.1);}.rq-item label.wrong{border-color:var(--danger);background:rgba(255,82,82,.1);}
.writing-box{background:var(--card);border-radius:14px;padding:22px;margin:18px 0;}.writing-box h3{color:var(--accent);margin-bottom:10px;}.writing-prompt{background:var(--bg);padding:14px;border-radius:10px;margin-bottom:14px;font-size:.9rem;line-height:1.55;border-left:3px solid var(--accent3);}.writing-area{width:100%;min-height:110px;background:var(--bg);border:1px solid rgba(79,195,247,.12);border-radius:10px;padding:14px;color:var(--text);font-size:.92rem;resize:vertical;font-family:inherit;line-height:1.55;}.writing-area:focus{outline:none;border-color:var(--accent);}.writing-feedback{margin-top:10px;padding:12px;border-radius:10px;font-size:.85rem;display:none;}.writing-feedback.show{display:block;}
.speaking-box{background:var(--card);border-radius:14px;padding:22px;margin:18px 0;text-align:center;}.speaking-box h3{color:var(--accent);margin-bottom:14px;}.speak-prompt{font-size:1.15rem;font-weight:600;margin:14px 0;color:var(--accent);}.speak-phonetic{color:var(--accent4);font-size:.92rem;margin-bottom:14px;}.speak-translation{color:var(--text2);font-size:.87rem;margin-bottom:18px;}
.mic-btn{width:72px;height:72px;border-radius:50%;border:3px solid var(--accent);background:transparent;color:var(--accent);font-size:1.8rem;cursor:pointer;transition:all .3s;margin:8px auto;display:flex;align-items:center;justify-content:center;}.mic-btn:hover{background:rgba(79,195,247,.12);}.mic-btn.recording{background:var(--danger);border-color:var(--danger);color:#fff;animation:pulse-rec 1.5s infinite;}@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(255,82,82,.4);}50%{box-shadow:0 0 0 12px rgba(255,82,82,0);}}
.speak-result{margin-top:14px;padding:12px;border-radius:10px;font-size:.88rem;}.speak-result.good{background:rgba(0,230,118,.1);border:1px solid var(--accent2);}.speak-result.retry{background:rgba(255,152,0,.1);border:1px solid var(--accent3);}
.listen-btn{background:var(--bg3);border:1px solid var(--accent);color:var(--accent);padding:9px 18px;border-radius:10px;cursor:pointer;font-size:.87rem;margin:6px;transition:all .2s;}.listen-btn:hover{background:rgba(79,195,247,.12);}
.quiz-box{background:var(--card);border-radius:14px;padding:22px;margin:18px 0;}.quiz-box h3{color:var(--accent);margin-bottom:14px;}.quiz-item{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.04);}.quiz-item:last-child{border:none;}.quiz-item .qi-q{font-weight:600;margin-bottom:9px;font-size:.9rem;}.quiz-item .qi-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid rgba(79,195,247,.12);border-radius:7px;color:var(--text);font-size:.87rem;}.quiz-item .qi-input:focus{outline:none;border-color:var(--accent);}.quiz-item .qi-options label{display:block;padding:7px 12px;background:var(--bg3);border-radius:7px;margin:3px 0;cursor:pointer;font-size:.85rem;border:1px solid transparent;}.quiz-item .qi-options label:hover{border-color:var(--accent);}
.quiz-result{text-align:center;padding:18px;margin-top:14px;border-radius:11px;display:none;}.quiz-result.show{display:block;}.quiz-result .qr-score{font-size:1.8rem;font-weight:800;}.quiz-result .qr-msg{color:var(--text2);margin-top:6px;}
.btn-check{background:var(--accent);color:#000;border:none;padding:9px 22px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.87rem;transition:all .2s;margin-top:10px;}.btn-check:hover{transform:scale(1.03);}
.btn-next{background:var(--accent2);color:#000;border:none;padding:11px 26px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.92rem;margin-top:14px;}.btn-next:hover{transform:scale(1.03);}
.lesson-nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,255,255,.04);}
.achievement-popup{position:fixed;top:18px;right:18px;background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:18px 22px;z-index:200;transform:translateX(400px);transition:transform .5s cubic-bezier(.68,-.55,.27,1.55);display:flex;align-items:center;gap:12px;box-shadow:0 8px 28px rgba(255,215,0,.2);}.achievement-popup.show{transform:translateX(0);}.achievement-popup .ach-icon{font-size:2rem;}.achievement-popup .ach-text h4{color:var(--gold);font-size:.85rem;}.achievement-popup .ach-text p{color:var(--text2);font-size:.75rem;}
.dialogue-line{display:flex;gap:10px;margin:9px 0;align-items:flex-start;}.dialogue-line .dl-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}.dialogue-line .dl-avatar.a{background:var(--accent);color:#000;}.dialogue-line .dl-avatar.b{background:var(--accent3);color:#000;}.dialogue-line .dl-bubble{background:var(--bg3);padding:10px 14px;border-radius:11px;flex:1;}.dialogue-line .dl-bubble .dl-en{font-weight:600;font-size:.88rem;}.dialogue-line .dl-bubble .dl-ph{color:var(--accent4);font-size:.76rem;}.dialogue-line .dl-bubble .dl-pt{color:var(--text2);font-size:.78rem;margin-top:3px;}
.section-content{display:none;animation:fadeIn .4s;}.section-content.active{display:block;}@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.exam-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.65rem;font-weight:700;margin-left:6px;letter-spacing:.5px;color:#000;}.exam-badge.toefl{background:var(--toefl);}.exam-badge.ielts{background:var(--ielts);}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:56px;bottom:0;z-index:90;transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main-content{padding:14px;}.home-hero h1{font-size:1.7rem;}.vocab-grid{grid-template-columns:1fr;}.hero-cards{grid-template-columns:1fr;}.nav-stats{gap:6px;}.stat-badge{padding:3px 7px;font-size:.72rem;}}
.menu-toggle{display:none;background:none;border:none;color:var(--accent);font-size:1.4rem;cursor:pointer;}@media(max-width:768px){.menu-toggle{display:block;}}
</style>

<div id="splash"><h1>🇬🇧 English Mastery</h1><p>Carregando curso + TOEFL + IELTS...</p><div class="loader"></div></div>
<div id="achievementPopup" class="achievement-popup"><div class="ach-icon" id="achIcon">🏆</div><div class="ach-text"><h4 id="achTitle"></h4><p id="achDesc"></p></div></div>
<nav class="navbar"><div style="display:flex;align-items:center;gap:12px;"><button class="menu-toggle" onclick="toggleSidebar()">☰</button><div class="nav-brand" onclick="showHome()">🇬🇧 English Mastery</div></div><div class="nav-stats"><div class="stat-badge"><span>⏱️</span><span id="navTimer">00:00</span></div><div class="stat-badge"><span>⚡</span><span id="navXP">0 XP</span></div><div class="stat-badge"><span>🔥</span><span id="navStreak">0</span></div></div></nav>

<script>

ntando Histórias", "example": "Example with So basically."}, {"word": "All of a sudden", "phonetic": "/all.../", "trans": "Contando Histórias", "example": "Example with All of a sudden."}, {"word": "It turns out", "phonetic": "/it .../", "trans": "Contando Histórias", "example": "Example with It turns out."}, {"word": "Couldn't believe", "phonetic": "/cou.../", "trans": "Contando Histórias", "example": "Example with Couldn't believe."}, {"word": "Funniest thing", "phonetic": "/fun.../", "trans": "Contando Histórias", "example": "Example with Funniest thing."}, {"word": "Long story short", "phonetic": "/lon.../", "trans": "Contando Histórias", "example": "Example with Long story short."}], "grammar": {"title": "Storytelling", "explanation": "Aprenda Storytelling com exemplos práticos.", "table": [["Estrutura", "Exemplo", "", ""]], "examples": [{"en": "Example sentence about Telling Stories.", "ph": "/.../", "pt": " Exemplo."}], "tip": "⚡ Dica prática sobre Storytelling!"}, "dialogue": [{"speaker": "A", "name": "Person1", "en": "Let's practice Telling Stories!", "ph": "/.../", "pt": " Vamos praticar!"}, {"speaker": "B", "name": "Person2", "en": "Sure, that sounds great!", "ph": "/.../", "pt": " Claro!"}], "reading": {"title": "📖 Telling Stories", "text": "A reading passage about Telling Stories. This topic is important for English learners. Practice reading and comprehension skills. Understanding Telling Stories helps in real conversations.", "questions": [{"q": "What is the main topic?", "opts": ["Grammar", "Vocabulary", "Telling Stories", "Writing"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva sobre Contando Histórias em inglês (6+ frases).", "keywords": ["you won't believe", "guess what", "so basically", "all of a sudden", "it turns out", "couldn't believe"]}, "speaking": [{"phrase": "Let's talk about Telling Stories.", "phonetic": "/.../", "translation": " Vamos falar sobre isso."}], "quiz": [{"type": "choice", "q": "Esta aula é sobre:", "opts": ["Math", "Science", "Telling Stories", "History"], "answer": 2}, {"type": "fill", "q": "Complete: I am learning ___.", "answer": "telling"}]}, {"id": 25, "module": "Módulo 10: TOEFL Prep", "moduleIcon": "🎯", "title": "TOEFL Reading Skills", "titlePt": "TOEFL Leitura Acadêmica", "teacher": {"name": "👨‍🏫 TOEFL Coach Alex", "tip": "O TOEFL Reading tem 3-4 passagens acadêmicas de ~700 palavras. Você terá 54-72 minutos. <b>Estratégia:</b> Leia o parágrafo de introdução primeiro, depois as perguntas, depois o texto. <b>Dica:</b> Procure por palavras de transição (however, therefore, in contrast) — elas indicam a estrutura do argumento.", "method": "🔑 Skimming Acadêmico + Vocabulary in Context"}, "vocab": [{"word": "Hypothesis", "phonetic": "/haɪˈpɒθəsɪs/", "trans": "Hipótese", "example": "The hypothesis was proven correct."}, {"word": "Phenomenon", "phonetic": "/fɪˈnɒmɪnɒn/", "trans": "Fenômeno", "example": "A natural phenomenon."}, {"word": "Significant", "phonetic": "/sɪɡˈnɪfɪkənt/", "trans": "Significativo", "example": "A significant discovery."}, {"word": "Implications", "phonetic": "/ˌɪmplɪˈkeɪʃənz/", "trans": "Implicações", "example": "The implications are serious."}, {"word": "Nevertheless", "phonetic": "/ˌnevərðəˈles/", "trans": "No entanto", "example": "Nevertheless, the results show..."}, {"word": "Constitute", "phonetic": "/ˈkɒnstɪtjuːt/", "trans": "Constituir", "example": "These factors constitute a risk."}, {"word": "Subsequently", "phonetic": "/ˈsʌbsɪkwəntli/", "trans": "Subsequentemente", "example": "Subsequently, the theory evolved."}, {"word": "Inherent", "phonetic": "/ɪnˈhɪrənt/", "trans": "Inerente", "example": "An inherent problem."}, {"word": "Empirical", "phonetic": "/ɪmˈpɪrɪkəl/", "trans": "Empírico", "example": "Empirical evidence supports this."}, {"word": "Paradigm", "phonetic": "/ˈpærədaɪm/", "trans": "Paradigma", "example": "A paradigm shift in science."}], "grammar": {"title": "TOEFL Reading: Question Types", "explanation": "O TOEFL Reading testa: <b>1) Factual Information</b> (fatos do texto), <b>2) Inference</b> (o que está implícito), <b>3) Vocabulary in Context</b> (significado no contexto), <b>4) Summary/Table</b> (resumo geral).", "table": [["Tipo", "Estratégia", "Exemplo", ""], ["Factual", "Procure palavras-chave no texto", "According to the passage...", ""], ["Inference", "O que o autor SUGERE", "It can be inferred that...", ""], ["Vocabulary", "Significado NAQUELE contexto", "The word 'conducted' means...", ""], ["Summary", "Ideia principal de cada parágrafo", "Which sentences best summarize?", ""]], "examples": [{"en": "The passage suggests that climate change has accelerated significantly.", "ph": "/ðə ˈpæsɪdʒ səˈdʒests/", "pt": "A passagem sugere que as mudanças climáticas aceleraram."}, {"en": "According to paragraph 2, the researchers found...", "ph": "/əˈkɔːrdɪŋ tə ˈpærəɡræf/", "pt": "De acordo com o parágrafo 2..."}], "tip": "⚡ <b>TOEFL Tip:</b> Nunca escolha uma resposta que contradiz o texto, mesmo que pareça verdadeira no mundo real. A resposta SEMPRE está no texto!"}, "dialogue": [{"speaker": "A", "name": "Tutor", "en": "Let's practice a TOEFL reading passage. Read the first paragraph and identify the main idea.", "ph": "/lets ˈpræktɪs/", "pt": "Vamos praticar."}, {"speaker": "B", "name": "Student", "en": "The main idea seems to be about the effects of deforestation on biodiversity.", "ph": "/ðə meɪn aɪˈdɪə/", "pt": "A ideia principal parece ser sobre desmatamento."}, {"speaker": "A", "name": "Tutor", "en": "Excellent! Now, look at question 1. It asks for a factual detail. Where in the text can you find it?", "ph": "/ˈeksələnt!/", "pt": "Excelente! Agora veja a pergunta 1."}, {"speaker": "B", "name": "Student", "en": "I found it in the third sentence of paragraph two.", "ph": "/aɪ faʊnd ɪt/", "pt": "Encontrei na terceira frase do parágrafo 2."}], "reading": {"title": "📖 TOEFL Practice: The Water Cycle", "text": "The water cycle, also known as the hydrological cycle, describes the continuous movement of water on, above, and below the surface of the Earth. Water evaporates from the surface of oceans and lakes, forming clouds through condensation. These clouds eventually release water as precipitation — rain, snow, or hail. Some of this water flows into rivers and streams (surface runoff), while some seeps into the ground (infiltration), replenishing underground aquifers. Plants absorb water through their roots and release it back into the atmosphere through transpiration. This process is essential for maintaining ecosystems and regulating global temperatures. Human activities, such as deforestation and urbanization, have significantly altered the natural water cycle, leading to increased flooding in some areas and drought in others. Scientists warn that climate change could further disrupt this delicate balance.", "questions": [{"q": "What is the water cycle also known as?", "opts": ["Carbon cycle", "Hydrological cycle", "Nitrogen cycle", "Rock cycle"], "answer": 1}, {"q": "What happens during condensation?", "opts": ["Water falls as rain", "Water evaporates", "Clouds form", "Water freezes"], "answer": 2}, {"q": "What is 'infiltration'?", "opts": ["Water flowing in rivers", "Water seeping into ground", "Water evaporating", "Cloud formation"], "answer": 1}, {"q": "According to the passage, human activities have:", "opts": ["Improved the water cycle", "Had no effect", "Significantly altered it", "Stopped the cycle"], "answer": 2}]}, "writing": {"prompt": "✍️ TOEFL Writing Practice: Escreva um resumo do texto sobre o ciclo da água em suas próprias palavras (150+ palavras). Inclua: processo principal, etapas, e impacto humano.", "keywords": ["water cycle", "evaporation", "condensation", "precipitation", "surface", "climate", "human", "ecosystem", "process", "significant"]}, "speaking": [{"phrase": "The passage discusses the hydrological cycle.", "phonetic": "/ðə ˈpæsɪdʒ dɪˈskʌsɪz/", "translation": "A passagem discute o ciclo hidrológico."}, {"phrase": "According to the text, human activities have altered the water cycle.", "phonetic": "/əˈkɔːrdɪŋ tə ðə tekst/", "translation": "Segundo o texto, atividades humanas alteraram o ciclo."}, {"phrase": "The main idea of this passage is the importance of the water cycle.", "phonetic": "/ðə meɪn aɪˈdɪə/", "translation": "A ideia principal é a importância do ciclo da água."}], "quiz": [{"type": "choice", "q": "TOEFL Reading has how many passages?", "opts": ["1-2", "3-4", "5-6", "7-8"], "answer": 1}, {"type": "fill", "q": "The water cycle is also called the ___ cycle.", "answer": "hydrological"}, {"type": "choice", "q": "'Infiltration' in context means:", "opts": ["Evaporation", "Cloud formation", "Water seeping into ground", "Rainfall"], "answer": 2}, {"type": "fill", "q": "Human activities have ___ altered the water cycle.", "answer": "significantly"}, {"type": "choice", "q": "Best strategy for TOEFL Reading:", "opts": ["Read questions first, then text", "Read text word by word", "Skip difficult words", "Guess all answers"], "answer": 0}]}, {"id": 26, "module": "Módulo 10: TOEFL Prep", "moduleIcon": "🎯", "title": "TOEFL Listening & Speaking", "titlePt": "TOEFL Escuta e Fala", "teacher": {"name": "👩‍🏫 TOEFL Coach Maria", "tip": "O TOEFL Listening tem lectures acadêmicas (3-5 min) e conversas no campus. <b>Estratégia:</b> Tome notas das ideias PRINCIPAIS, não de cada palavra. O Speaking tem 4 tasks — 1 independente e 3 integradas. Você tem 15-30 segundos para preparar e 45-60 segundos para falar.", "method": "🔑 Note-Taking + Timed Speaking"}, "vocab": [{"word": "Lecture", "phonetic": "/ˈlektʃər/", "trans": "Aula/Palestra", "example": "The professor gave a lecture on biology."}, {"word": "Take notes", "phonetic": "/teɪk noʊts/", "trans": "Anotar", "example": "Always take notes during lectures."}, {"word": "Main point", "phonetic": "/meɪn pɔɪnt/", "trans": "Ponto principal", "example": "What is the main point?"}, {"word": "In other words", "phonetic": "/ɪn ˈʌðər wɜːrdz/", "trans": "Em outras palavras", "example": "In other words, the theory is..."}, {"word": "For example", "phonetic": "/fɔːr ɪɡˈzæmpəl/", "trans": "Por exemplo", "example": "For example, consider this case."}, {"word": "To clarify", "phonetic": "/tə ˈklærɪfaɪ/", "trans": "Para esclarecer", "example": "To clarify, I mean that..."}, {"word": "In conclusion", "phonetic": "/ɪn kənˈkluːʒən/", "trans": "Concluindo", "example": "In conclusion, the evidence shows..."}, {"word": "Regarding", "phonetic": "/rɪˈɡɑːrdɪŋ/", "trans": "Em relação a", "example": "Regarding your question..."}, {"word": "Campus", "phonetic": "/ˈkæmpəs/", "trans": "Campus", "example": "Meet me on campus."}, {"word": "Assignment", "phonetic": "/əˈsaɪnmənt/", "trans": "Tarefa/Trabalho", "example": "The assignment is due Friday."}], "grammar": {"title": "TOEFL Speaking: Templates & Timing", "explanation": "<b>Task 1 (Independent):</b> State opinion + 2 reasons + examples. <b>Tasks 2-4 (Integrated):</b> Summarize what you read/heard + connect ideas. Use templates!", "table": [["Task", "Tempo", "Template", ""], ["Task 1", "45 sec", "In my opinion... First... Second...", ""], ["Task 2", "60 sec", "The reading states... The speaker says...", ""], ["Task 3", "60 sec", "The concept of X means... The professor illustrates...", ""], ["Task 4", "60 sec", "The professor discusses... The first point is...", ""]], "examples": [{"en": "In my opinion, studying abroad is beneficial for two reasons.", "ph": "/ɪn maɪ əˈpɪnjən/", "pt": "Na minha opinião, estudar fora é benéfico por dois motivos."}, {"en": "The reading passage states that..., however the professor argues that...", "ph": "/ðə ˈriːdɪŋ ˈpæsɪdʒ steɪts/", "pt": "A leitura afirma que..., porém o professor argumenta que..."}], "tip": "⚡ <b>TOEFL Speaking Tip:</b> Use transition words: First, Second, For example, However, In conclusion. Isso organiza sua fala e impressiona os avaliadores!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "Let's practice Task 1. Do you prefer studying alone or in groups? You have 15 seconds to prepare.", "ph": "/lets ˈpræktɪs/", "pt": "Vamos praticar. Prefere estudar sozinho ou em grupo?"}, {"speaker": "B", "name": "Student", "en": "In my opinion, studying in groups is more effective. First, you can share different perspectives. Second, it helps you stay motivated.", "ph": "/ɪn maɪ əˈpɪnjən/", "pt": "Na minha opinião, em grupo é mais eficaz."}, {"speaker": "A", "name": "Coach", "en": "Good structure! Now add a specific example to support your second reason.", "ph": "/ɡʊd ˈstrʌktʃər!/", "pt": "Boa estrutura! Adicione um exemplo."}, {"speaker": "B", "name": "Student", "en": "For example, when I studied with my classmates last semester, we all improved our grades because we kept each other accountable.", "ph": "/fɔːr ɪɡˈzæmpəl/", "pt": "Por exemplo, quando estudei com colegas, todos melhoramos as notas."}], "reading": {"title": "📖 TOEFL Listening Practice", "text": "In a TOEFL listening section, you will hear academic lectures and campus conversations. For lectures, the professor typically introduces a topic, provides background information, presents the main theory or concept, gives examples, and then concludes. Key phrases to listen for include: What I want to focus on today is, The important thing to remember is, Now, this is interesting because, and Let me give you an example. For campus conversations, pay attention to the problem being discussed and the solutions offered. Common topics include registration issues, library services, dormitory problems, and academic advising. Always take notes using abbreviations and symbols to save time.", "questions": [{"q": "TOEFL Listening includes:", "opts": ["Only lectures", "Only conversations", "Lectures and conversations", "Only music"], "answer": 2}, {"q": "What should you note in lectures?", "opts": ["Every word", "Main ideas and examples", "Only numbers", "Nothing"], "answer": 1}, {"q": "Key phrase 'What I want to focus on' signals:", "opts": ["A joke", "The main topic", "The end", "A question"], "answer": 1}]}, "writing": {"prompt": "✍️ TOEFL Speaking Practice: Responda em inglês (45 segundos falando = ~100 palavras escritas): 'Do you prefer to learn from books or from experience? Give reasons and examples.'", "keywords": ["in my opinion", "first", "second", "for example", "because", "experience", "learn", "important", "prefer", "however"]}, "speaking": [{"phrase": "In my opinion, learning from experience is more effective.", "phonetic": "/ɪn maɪ əˈpɪnjən/", "translation": "Na minha opinião, aprender pela experiência é mais eficaz."}, {"phrase": "First, practical experience helps you remember information longer.", "phonetic": "/fɜːrst, ˈpræktɪkəl/", "translation": "Primeiro, a experiência prática ajuda a lembrar."}, {"phrase": "For example, I learned more English by speaking than by reading grammar books.", "phonetic": "/fɔːr ɪɡˈzæmpəl/", "translation": "Por exemplo, aprendi mais inglês falando."}], "quiz": [{"type": "choice", "q": "TOEFL Speaking Task 1 is:", "opts": ["Integrated", "Independent", "Written", "Multiple choice"], "answer": 1}, {"type": "fill", "q": "You have ___ seconds to prepare for Task 1.", "answer": "15"}, {"type": "choice", "q": "Best way to organize TOEFL Speaking:", "opts": ["Random thoughts", "Opinion + reasons + examples", "Just one sentence", "Repeat the question"], "answer": 2}, {"type": "fill", "q": "In my ___, studying abroad is beneficial.", "answer": "opinion"}, {"type": "choice", "q": "TOEFL Listening note-taking should focus on:", "opts": ["Every word", "Main ideas", "Spelling", "Grammar"], "answer": 1}]}, {"id": 27, "module": "Módulo 10: TOEFL Prep", "moduleIcon": "🎯", "title": "TOEFL Writing Mastery", "titlePt": "TOEFL Redação", "teacher": {"name": "👨‍🏫 TOEFL Coach David", "tip": "O TOEFL Writing tem 2 tasks: <b>Integrated</b> (ler + ouvir + escrever, 20 min, 150-225 palavras) e <b>Independent/Academic Discussion</b> (10 min, 100+ palavras). <b>Estratégia:</b> Use a estrutura de 4-5 parágrafos: Intro, Body 1, Body 2, (Body 3), Conclusion.", "method": "🔑 Essay Structure + Academic Vocabulary"}, "vocab": [{"word": "Furthermore", "phonetic": "/ˈfɜːrðərmɔːr/", "trans": "Além disso", "example": "Furthermore, research indicates..."}, {"word": "Consequently", "phonetic": "/ˈkɒnsɪkwəntli/", "trans": "Consequentemente", "example": "Consequently, the results improved."}, {"word": "In contrast", "phonetic": "/ɪn ˈkɒntræst/", "trans": "Em contraste", "example": "In contrast to previous studies..."}, {"word": "It is worth noting", "phonetic": "/ɪt ɪz wɜːrθ ˈnoʊtɪŋ/", "trans": "Vale notar", "example": "It is worth noting that..."}, {"word": "To illustrate", "phonetic": "/tə ˈɪləstreɪt/", "trans": "Para ilustrar", "example": "To illustrate this point..."}, {"word": "Whereas", "phonetic": "/wɛrˈæz/", "trans": "Enquanto que", "example": "Whereas some believe..., others argue..."}, {"word": "Predominantly", "phonetic": "/prɪˈdɒmɪnəntli/", "trans": "Predominantemente", "example": "The area is predominantly urban."}, {"word": "Compelling", "phonetic": "/kəmˈpelɪŋ/", "trans": "Convincente", "example": "A compelling argument."}, {"word": "Drawback", "phonetic": "/ˈdrɔːbæk/", "trans": "Desvantagem", "example": "The main drawback is cost."}, {"word": "Outweigh", "phonetic": "/ˌaʊtˈweɪ/", "trans": "Superar", "example": "Benefits outweigh the risks."}], "grammar": {"title": "TOEFL Essay Structure", "explanation": "<b>Intro:</b> Hook + thesis. <b>Body 1:</b> Reason 1 + example. <b>Body 2:</b> Reason 2 + example. <b>Conclusion:</b> Restate thesis + final thought.", "table": [["Parágrafo", "Conteúdo", "Palavras", ""], ["Introduction", "Thesis statement", "2-3 sentences", ""], ["Body 1", "First reason + example", "4-6 sentences", ""], ["Body 2", "Second reason + example", "4-6 sentences", ""], ["Conclusion", "Summary + final thought", "2-3 sentences", ""]], "examples": [{"en": "Some people argue that technology improves education; however, others believe it is a distraction.", "ph": "/sʌm ˈpiːpəl ˈɑːrɡjuː/", "pt": "Alguns argumentam que tecnologia melhora educação; outros acham que distrai."}, {"en": "In conclusion, the advantages of online learning clearly outweigh the disadvantages.", "ph": "/ɪn kənˈkluːʒən/", "pt": "Em conclusão, as vantagens superam as desvantagens."}], "tip": "⚡ <b>TOEFL Writing Tip:</b> Use 'academic hedging': 'It could be argued that...', 'Evidence suggests...', 'It is likely that...' — isso mostra sofisticação linguística!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "Write a thesis statement for: 'Should universities require students to study abroad?'", "ph": "/raɪt ə ˈθiːsɪs/", "pt": "Escreva uma tese."}, {"speaker": "B", "name": "Student", "en": "I believe that universities should encourage, but not require, students to study abroad because it can be financially burdensome for many families.", "ph": "/aɪ bɪˈliːv ðæt/", "pt": "Acredito que universidades deveriam encorajar, mas não obrigar."}, {"speaker": "A", "name": "Coach", "en": "Great thesis! It states your position clearly and gives a reason. Now develop Body Paragraph 1.", "ph": "/ɡreɪt ˈθiːsɪs!/", "pt": "Ótima tese! Agora desenvolva o parágrafo 1."}], "reading": {"title": "📖 TOEFL Writing: Sample Essay Topic", "text": "The question of whether technology helps or hinders education has been widely debated. Proponents argue that technology provides access to vast resources, enables personalized learning, and prepares students for the digital workforce. For instance, online platforms like Khan Academy offer free courses to millions of students worldwide. On the other hand, critics contend that excessive screen time reduces attention spans and promotes superficial learning. Furthermore, not all students have equal access to technology, which can widen the educational gap. In my view, while technology has some drawbacks, its benefits for education are substantial. The key is to use it wisely and ensure equitable access for all students.", "questions": [{"q": "What do proponents of technology in education argue?", "opts": ["It's harmful", "It provides access to resources", "It's too expensive", "It's unnecessary"], "answer": 1}, {"q": "What concern do critics raise?", "opts": ["It's too slow", "It reduces attention spans", "It's boring", "It costs nothing"], "answer": 1}, {"q": "The author's position is:", "opts": ["Technology is bad", "Technology is perfect", "Benefits outweigh drawbacks", "No opinion"], "answer": 2}]}, "writing": {"prompt": "✍️ TOEFL Essay: Escreva um ensaio de 4 parágrafos (200+ palavras) sobre: 'Do you agree or disagree: Working from home is better than working in an office?' Use a estrutura: Intro + Body 1 + Body 2 + Conclusion.", "keywords": ["furthermore", "however", "in contrast", "for example", "in conclusion", "argue", "believe", "evidence", "benefit", "drawback", "whereas", "consequently"]}, "speaking": [{"phrase": "Some people argue that working from home is more productive.", "phonetic": "/sʌm ˈpiːpəl ˈɑːrɡjuː/", "translation": "Alguns argumentam que trabalhar de casa é mais produtivo."}, {"phrase": "Furthermore, remote work reduces commuting time and costs.", "phonetic": "/ˈfɜːrðərmɔːr/", "translation": "Além disso, trabalho remoto reduz tempo de deslocamento."}, {"phrase": "In conclusion, I believe the benefits outweigh the drawbacks.", "phonetic": "/ɪn kənˈkluːʒən/", "translation": "Concluindo, acredito que os benefícios superam."}], "quiz": [{"type": "choice", "q": "TOEFL Integrated Writing time:", "opts": ["10 min", "20 min", "30 min", "60 min"], "answer": 1}, {"type": "fill", "q": "Benefits ___ the risks. (superam)", "answer": "outweigh"}, {"type": "choice", "q": "Good thesis statement has:", "opts": ["Only opinion", "Opinion + reason", "Just a question", "A story"], "answer": 1}, {"type": "fill", "q": "___, research indicates improvements. (além disso)", "answer": "Furthermore"}, {"type": "choice", "q": "Academic hedging example:", "opts": ["I know for sure", "It could be argued that", "Obviously", "Everyone agrees"], "answer": 1}]}, {"id": 28, "module": "Módulo 10: TOEFL Prep", "moduleIcon": "🎯", "title": "TOEFL Full Practice & Strategy", "titlePt": "TOEFL Simulado e Estratégias", "teacher": {"name": "👩‍🏫 TOEFL Coach Sarah", "tip": "Esta é a aula de <b>revisão completa do TOEFL</b>! Vamos revisar estratégias para as 4 seções e fazer um mini-simulado. <b>Pontuação:</b> 0-120 (30 por seção). Para universidades top: 100+. Para a maioria: 80+. <b>Dica final:</b> Faça simulados cronometrados toda semana. O TOEFL testa resistência tanto quanto inglês!", "method": "🔑 Simulado Completo + Time Management"}, "vocab": [{"word": "Score", "phonetic": "/skɔːr/", "trans": "Pontuação", "example": "My TOEFL score was 95."}, {"word": "Section", "phonetic": "/ˈsekʃən/", "trans": "Seção", "example": "The reading section is first."}, {"word": "Time management", "phonetic": "/taɪm ˈmænɪdʒmənt/", "trans": "Gestão de tempo", "example": "Time management is crucial."}, {"word": "Eliminate", "phonetic": "/ɪˈlɪmɪneɪt/", "trans": "Eliminar", "example": "Eliminate wrong answers first."}, {"word": "Paraphrase", "phonetic": "/ˈpærəfreɪz/", "trans": "Parafrasear", "example": "Paraphrase the main idea."}, {"word": "Transition", "phonetic": "/trænˈzɪʃən/", "trans": "Transição", "example": "Use transition words."}, {"word": "Academic", "phonetic": "/ˌækəˈdemɪk/", "trans": "Acadêmico", "example": "Academic English is formal."}, {"word": "Proficiency", "phonetic": "/prəˈfɪʃənsi/", "trans": "Proficiência", "example": "English proficiency test."}, {"word": "Standardized", "phonetic": "/ˈstændərdaɪzd/", "trans": "Padronizado", "example": "A standardized test."}, {"word": "Requirement", "phonetic": "/rɪˈkwaɪərmənt/", "trans": "Requisito", "example": "A minimum score requirement."}], "grammar": {"title": "TOEFL: Complete Strategy Guide", "explanation": "Revisão das 4 seções: <b>Reading</b> (54-72 min), <b>Listening</b> (41-57 min), <b>Speaking</b> (17 min), <b>Writing</b> (30 min). Total: ~3 horas.", "table": [["Seção", "Duração", "Dicas", ""], ["Reading", "54-72 min", "Skim first, then answer", ""], ["Listening", "41-57 min", "Take notes, focus on main ideas", ""], ["Speaking", "17 min", "Use templates, practice timing", ""], ["Writing", "30 min", "Structure: Intro-Body-Conclusion", ""]], "examples": [{"en": "The most effective strategy is to eliminate obviously wrong answers first.", "ph": "/ðə moʊst ɪˈfektɪv ˈstrætədʒi/", "pt": "A estratégia mais eficaz é eliminar respostas erradas primeiro."}, {"en": "Time management is just as important as English proficiency on the TOEFL.", "ph": "/taɪm ˈmænɪdʒmənt/", "pt": "Gestão de tempo é tão importante quanto proficiência."}], "tip": "⚡ <b>Dia do teste:</b> Durma bem, chegue cedo, leve documento de identidade. Lembre-se: você pode refazer o TOEFL. Relaxe e dê seu melhor!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "What's your target TOEFL score?", "ph": "/wɒts jʊr ˈtɑːrɡɪt/", "pt": "Qual sua meta?"}, {"speaker": "B", "name": "Student", "en": "I need at least 90 for my university application.", "ph": "/aɪ niːd æt liːst ˈnaɪnti/", "pt": "Preciso de pelo menos 90."}, {"speaker": "A", "name": "Coach", "en": "Good. Let's focus on your weakest section. Which one is it?", "ph": "/lets ˈfoʊkəs/", "pt": "Bom. Vamos focar na mais fraca."}, {"speaker": "B", "name": "Student", "en": "I think Speaking is my weakest. I get nervous with the time limit.", "ph": "/aɪ θɪŋk ˈspiːkɪŋ/", "pt": "Acho que Speaking. Fico nervoso com o tempo."}, {"speaker": "A", "name": "Coach", "en": "Practice with a timer every day. Record yourself and listen back. You'll improve fast!", "ph": "/ˈpræktɪs wɪð ə ˈtaɪmər/", "pt": "Pratique com timer todo dia. Grave e ouça."}], "reading": {"title": "📖 TOEFL: What to Expect on Test Day", "text": "The TOEFL iBT is a computer-based test taken at authorized testing centers worldwide. The test takes approximately three hours. You will need a valid passport or government ID. The Reading section comes first, followed by Listening, then a short break, then Speaking, and finally Writing. During the test, you can take notes on scratch paper provided by the center. Your scores are available online approximately 4-8 days after the test. Each section is scored from 0 to 30, for a total of 120 points. Most universities require a minimum score between 79 and 100. You can retake the test as many times as you want, with a minimum of 3 days between tests. Preparation is key: take practice tests, build your academic vocabulary, and practice all four skills daily.", "questions": [{"q": "TOEFL total score is:", "opts": ["100", "120", "150", "200"], "answer": 1}, {"q": "How long is the test?", "opts": ["1 hour", "2 hours", "3 hours", "4 hours"], "answer": 2}, {"q": "When are scores available?", "opts": ["Immediately", "4-8 days", "1 month", "3 months"], "answer": 1}, {"q": "Most universities require:", "opts": ["50-60", "79-100", "110-120", "30-40"], "answer": 1}]}, "writing": {"prompt": "✍️ Escreva um plano de estudos para o TOEFL (6+ frases). Inclua: meta de pontuação, seções para focar, rotina diária de estudo.", "keywords": ["TOEFL", "score", "practice", "reading", "listening", "speaking", "writing", "improve", "strategy", "daily"]}, "speaking": [{"phrase": "My target TOEFL score is ninety-five.", "phonetic": "/maɪ ˈtɑːrɡɪt skɔːr/", "translation": "Minha meta é 95 pontos."}, {"phrase": "I need to improve my speaking skills.", "phonetic": "/aɪ niːd tə ɪmˈpruːv/", "translation": "Preciso melhorar minha fala."}, {"phrase": "I will practice with timed tests every week.", "phonetic": "/aɪ wɪl ˈpræktɪs/", "translation": "Vou praticar com simulados toda semana."}], "quiz": [{"type": "choice", "q": "TOEFL total points:", "opts": ["100", "120", "150", "200"], "answer": 1}, {"type": "fill", "q": "Each section is scored from 0 to ___.", "answer": "30"}, {"type": "choice", "q": "Best TOEFL preparation:", "opts": ["Cram the night before", "Practice daily over weeks", "Only read grammar", "Watch movies"], "answer": 1}, {"type": "fill", "q": "Time ___ is crucial for TOEFL.", "answer": "management"}, {"type": "choice", "q": "You can retake TOEFL:", "opts": ["Never", "Once a year", "As many times as you want", "Only twice"], "answer": 2}]}, {"id": 29, "module": "Módulo 11: IELTS Prep", "moduleIcon": "🏅", "title": "IELTS Reading & Vocabulary", "titlePt": "IELTS Leitura e Vocabulário", "teacher": {"name": "👨‍🏫 IELTS Coach Thomas", "tip": "O IELTS Reading tem 3 passagens com 40 perguntas em 60 minutos. <b>Diferença do TOEFL:</b> O IELTS tem mais tipos de pergunta: True/False/Not Given, Matching Headings, Sentence Completion, Diagram Labeling. <b>Estratégia:</b> Gaste ~20 min por passagem. Passagem 1 é mais fácil, 3 é mais difícil.", "method": "🔑 T/F/NG Strategy + Skimming/Scanning"}, "vocab": [{"word": "Whereas", "phonetic": "/wɛrˈæz/", "trans": "Enquanto que", "example": "Whereas TOEFL is American, IELTS is British."}, {"word": "Abundant", "phonetic": "/əˈbʌndənt/", "trans": "Abundante", "example": "Abundant resources available."}, {"word": "Detrimental", "phonetic": "/ˌdetrɪˈmentəl/", "trans": "Prejudicial", "example": "Detrimental effects on health."}, {"word": "Fluctuate", "phonetic": "/ˈflʌktʃueɪt/", "trans": "Flutuar", "example": "Prices fluctuate daily."}, {"word": "Substantial", "phonetic": "/səbˈstænʃəl/", "trans": "Substancial", "example": "A substantial increase."}, {"word": "Predominantly", "phonetic": "/prɪˈdɒmɪnəntli/", "trans": "Predominantemente", "example": "Predominantly urban areas."}, {"word": "Feasible", "phonetic": "/ˈfiːzəbəl/", "trans": "Viável", "example": "A feasible solution."}, {"word": "Undermine", "phonetic": "/ˌʌndərˈmaɪn/", "trans": "Minar/Enfraquecer", "example": "Undermine the argument."}, {"word": "Virtually", "phonetic": "/ˈvɜːrtʃuəli/", "trans": "Praticamente", "example": "Virtually impossible."}, {"word": "Trigger", "phonetic": "/ˈtrɪɡər/", "trans": "Desencadear", "example": "Trigger a reaction."}], "grammar": {"title": "IELTS Reading: True/False/Not Given", "explanation": "<b>TRUE:</b> A informação CONCORDA com o texto. <b>FALSE:</b> A informação CONTRADIZ o texto. <b>NOT GIVEN:</b> A informação NÃO ESTÁ no texto. Cuidado: NOT GIVEN ≠ FALSE!", "table": [["Resposta", "Significado", "Dica", ""], ["TRUE", "Concorda com o texto", "Informação confirmada", ""], ["FALSE", "Contradiz o texto", "Informação oposta", ""], ["NOT GIVEN", "Não mencionado", "Não tem no texto", ""]], "examples": [{"en": "The text states that renewable energy has grown substantially — this is TRUE.", "ph": "/ðə tekst steɪts/", "pt": "O texto afirma — TRUE."}, {"en": "The text says costs decreased, but the statement says they increased — this is FALSE.", "ph": "/ðə tekst sez/", "pt": "O texto diz que diminuiu, a afirmação diz que aumentou — FALSE."}], "tip": "⚡ <b>IELTS Tip:</b> Para T/F/NG: se a informação não está mencionada NO TEXTO, é NOT GIVEN, mesmo que você saiba a resposta no mundo real!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "Read this passage. Statement: 'Solar energy production doubled in 2023.' Is this True, False, or Not Given?", "ph": "/riːd ðɪs/", "pt": "Leia. A produção solar dobrou?"}, {"speaker": "B", "name": "Student", "en": "The passage mentions solar energy growth but doesn't give specific numbers for 2023. So it's Not Given.", "ph": "/ðə ˈpæsɪdʒ ˈmenʃənz/", "pt": "Menciona crescimento mas sem números específicos. Not Given."}, {"speaker": "A", "name": "Coach", "en": "Exactly right! Remember: if the text doesn't mention it specifically, it's Not Given.", "ph": "/ɪɡˈzæktli raɪt!/", "pt": "Exatamente! Se não menciona, é Not Given."}], "reading": {"title": "📖 IELTS Reading Practice", "text": "Global urbanization is one of the most significant demographic shifts in human history. In 1950, approximately 30 percent of the world's population lived in cities. By 2050, this figure is projected to reach 68 percent. This rapid urban growth presents both opportunities and challenges. On one hand, cities are engines of economic growth, innovation, and cultural exchange. They offer better access to education, healthcare, and employment. On the other hand, unplanned urbanization can lead to overcrowding, pollution, inadequate housing, and strain on infrastructure. Developing countries are experiencing the fastest rates of urbanization, often without sufficient resources to manage the growth effectively. Sustainable urban planning is therefore essential to ensure that cities can accommodate growing populations while maintaining quality of life.", "questions": [{"q": "In 1950, what percentage lived in cities?", "opts": ["10%", "30%", "50%", "68%"], "answer": 1}, {"q": "By 2050, urban population projected at:", "opts": ["30%", "50%", "68%", "90%"], "answer": 2}, {"q": "Cities are described as engines of:", "opts": ["War", "Economic growth", "Pollution", "Poverty"], "answer": 1}, {"q": "Fastest urbanization is in:", "opts": ["Europe", "North America", "Developing countries", "Antarctica"], "answer": 2}]}, "writing": {"prompt": "✍️ IELTS Practice: Leia o texto e responda: 'Urban growth is always positive.' True, False, or Not Given? Justifique em inglês (4+ frases).", "keywords": ["true", "false", "not given", "text", "states", "mentions", "according", "however", "urban", "growth"]}, "speaking": [{"phrase": "According to the passage, urban growth has both benefits and challenges.", "phonetic": "/əˈkɔːrdɪŋ tə/", "translation": "Segundo o texto, tem benefícios e desafios."}, {"phrase": "The statement is FALSE because the text mentions negative effects too.", "phonetic": "/ðə ˈsteɪtmənt ɪz fɒls/", "translation": "É FALSE pois o texto menciona efeitos negativos."}, {"phrase": "The text states that unplanned urbanization leads to problems.", "phonetic": "/ðə tekst steɪts/", "translation": "O texto diz que urbanização não planejada causa problemas."}], "quiz": [{"type": "choice", "q": "IELTS Reading has how many questions?", "opts": ["20", "30", "40", "50"], "answer": 2}, {"type": "choice", "q": "'Not Given' means:", "opts": ["It's false", "It contradicts", "Not mentioned in text", "It's true"], "answer": 2}, {"type": "fill", "q": "The text says 30% lived in cities in ___.", "answer": "1950"}, {"type": "choice", "q": "IELTS Reading time:", "opts": ["30 min", "45 min", "60 min", "90 min"], "answer": 2}, {"type": "fill", "q": "Sustainable urban ___ is essential.", "answer": "planning"}]}, {"id": 30, "module": "Módulo 11: IELTS Prep", "moduleIcon": "🏅", "title": "IELTS Writing Tasks 1 & 2", "titlePt": "IELTS Redação", "teacher": {"name": "👩‍🏫 IELTS Coach Rebecca", "tip": "<b>Task 1 (Academic):</b> Descreva um gráfico/tabela/processo em 150+ palavras (20 min). <b>Task 2:</b> Ensaio argumentativo em 250+ palavras (40 min). Task 2 vale MAIS que Task 1! <b>Banda 7+:</b> Use vocabulário variado, estruturas complexas e conectores.", "method": "🔑 Graph Description + Essay Writing"}, "vocab": [{"word": "Increase", "phonetic": "/ɪnˈkriːs/", "trans": "Aumentar", "example": "Sales increased by 20%."}, {"word": "Decrease", "phonetic": "/dɪˈkriːs/", "trans": "Diminuir", "example": "Costs decreased significantly."}, {"word": "Fluctuate", "phonetic": "/ˈflʌktʃueɪt/", "trans": "Flutuar", "example": "Prices fluctuated throughout the year."}, {"word": "Peak", "phonetic": "/piːk/", "trans": "Atingir o pico", "example": "Sales peaked in December."}, {"word": "Gradually", "phonetic": "/ˈɡrædʒuəli/", "trans": "Gradualmente", "example": "Gradually increased over time."}, {"word": "Sharply", "phonetic": "/ˈʃɑːrpli/", "trans": "Drasticamente", "example": "Dropped sharply in March."}, {"word": "Remain stable", "phonetic": "/rɪˈmeɪn ˈsteɪbəl/", "trans": "Permanecer estável", "example": "Remained stable at 50%."}, {"word": "Overall", "phonetic": "/ˌoʊvərˈɔːl/", "trans": "No geral", "example": "Overall, there was an upward trend."}, {"word": "Proportion", "phonetic": "/prəˈpɔːrʃən/", "trans": "Proporção", "example": "The proportion of women increased."}, {"word": "Respectively", "phonetic": "/rɪˈspektɪvli/", "trans": "Respectivamente", "example": "30% and 40%, respectively."}], "grammar": {"title": "IELTS Writing: Task 1 & Task 2 Structure", "explanation": "<b>Task 1:</b> Overview + Details (NÃO dê opinião!). <b>Task 2:</b> Introduction + Body 1 + Body 2 + Conclusion (DÊ opinião!).", "table": [["Task", "Palavras", "Tempo", "Peso"], ["Task 1", "150+", "20 min", "1/3"], ["Task 2", "250+", "40 min", "2/3"]], "examples": [{"en": "The graph shows that sales increased gradually from 2018 to 2022.", "ph": "/ðə ɡræf ʃoʊz/", "pt": "O gráfico mostra que vendas aumentaram gradualmente."}, {"en": "Overall, the most significant change was the sharp decline in 2020.", "ph": "/ˌoʊvərˈɔːl/", "pt": "No geral, a mudança mais significativa foi a queda drástica em 2020."}], "tip": "⚡ <b>IELTS Task 1:</b> Sempre comece com uma frase de overview: 'Overall, the most notable trend is...' Isso é ESSENCIAL para banda 7+!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "Describe this bar chart showing internet usage from 2010 to 2020.", "ph": "/dɪˈskraɪb/", "pt": "Descreva este gráfico de barras."}, {"speaker": "B", "name": "Student", "en": "The bar chart illustrates internet usage in three countries between 2010 and 2020. Overall, all three countries experienced a significant increase.", "ph": "/ðə bɑːr tʃɑːrt ˈɪləstreɪts/", "pt": "O gráfico ilustra o uso de internet em três países."}, {"speaker": "A", "name": "Coach", "en": "Excellent overview! Now add specific data points.", "ph": "/ˈeksələnt/", "pt": "Excelente overview! Agora dados específicos."}, {"speaker": "B", "name": "Student", "en": "In 2010, Country A had the highest usage at 60%, while Country C had the lowest at 25%. By 2020, all countries exceeded 80%.", "ph": "/ɪn ˈtwenti ten/", "pt": "Em 2010, País A tinha 60%, País C 25%. Em 2020, todos acima de 80%."}], "reading": {"title": "📖 IELTS Task 2: Sample Question", "text": "Some people believe that the best way to reduce crime is to give longer prison sentences. Others, however, believe there are better alternative ways to reduce crime. Discuss both views and give your own opinion. This is a classic IELTS Task 2 question. You must discuss BOTH sides before giving your opinion. Structure: Paragraph 1 — Introduction (paraphrase question + thesis). Paragraph 2 — View 1 (longer sentences) with reasons. Paragraph 3 — View 2 (alternatives) with reasons. Paragraph 4 — Your opinion + conclusion. Use linking words: On one hand, On the other hand, While, Although, In my view.", "questions": [{"q": "IELTS Task 2 requires:", "opts": ["Only your opinion", "Only facts", "Both views + your opinion", "A story"], "answer": 2}, {"q": "How many words minimum for Task 2?", "opts": ["150", "200", "250", "300"], "answer": 2}, {"q": "Task 2 is worth:", "opts": ["1/3", "1/2", "2/3", "All"], "answer": 2}]}, "writing": {"prompt": "✍️ IELTS Task 2: Escreva um ensaio de 250+ palavras sobre: 'Some people think that social media has a negative impact on society. Others believe it has many benefits. Discuss both views and give your opinion.'", "keywords": ["on one hand", "on the other hand", "while", "although", "in my view", "furthermore", "however", "for instance", "in conclusion", "argue", "believe", "society"]}, "speaking": [{"phrase": "On one hand, social media connects people worldwide.", "phonetic": "/ɒn wʌn hænd/", "translation": "Por um lado, conecta pessoas."}, {"phrase": "On the other hand, it can lead to addiction and misinformation.", "phonetic": "/ɒn ðə ˈʌðər hænd/", "translation": "Por outro, pode causar vício e desinformação."}, {"phrase": "In my view, the benefits outweigh the drawbacks when used responsibly.", "phonetic": "/ɪn maɪ vjuː/", "translation": "Na minha visão, os benefícios superam quando usado com responsabilidade."}], "quiz": [{"type": "choice", "q": "IELTS Task 1 — you should:", "opts": ["Give your opinion", "Describe data objectively", "Write a story", "Argue a point"], "answer": 1}, {"type": "fill", "q": "The graph shows sales increased ___ from 2018 to 2022.", "answer": "gradually"}, {"type": "choice", "q": "'Discuss both views' means:", "opts": ["Choose one side only", "Present both sides + opinion", "Ignore one side", "Write about yourself"], "answer": 1}, {"type": "fill", "q": "Overall, the most notable ___ is...", "answer": "trend"}, {"type": "choice", "q": "IELTS Writing bands go from:", "opts": ["1-5", "0-9", "0-100", "A-F"], "answer": 1}]}, {"id": 31, "module": "Módulo 11: IELTS Prep", "moduleIcon": "🏅", "title": "IELTS Speaking Parts 1-3", "titlePt": "IELTS Fala", "teacher": {"name": "👨‍🏫 IELTS Coach William", "tip": "O IELTS Speaking é uma entrevista presencial de 11-14 min com 3 partes. <b>Part 1:</b> Perguntas pessoais (4-5 min). <b>Part 2:</b> Fale sobre um tópico por 2 min (1 min de preparação). <b>Part 3:</b> Discussão aprofundada (4-5 min). <b>Para banda 7+:</b> Use vocabulário variado, estruturas complexas, fillers naturais e pronúncia clara.", "method": "🔑 Fluency + Lexical Resource + Pronunciation"}, "vocab": [{"word": "Well", "phonetic": "/wel/", "trans": "Bem/Então", "example": "Well, I think that..."}, {"word": "To be honest", "phonetic": "/tə biː ˈɒnɪst/", "trans": "Para ser honesto", "example": "To be honest, I prefer..."}, {"word": "It depends", "phonetic": "/ɪt dɪˈpendz/", "trans": "Depende", "example": "It depends on the situation."}, {"word": "I'd say", "phonetic": "/aɪd seɪ/", "trans": "Eu diria", "example": "I'd say it's quite important."}, {"word": "Tend to", "phonetic": "/tend tə/", "trans": "Ter tendência", "example": "I tend to prefer..."}, {"word": "Fascinated by", "phonetic": "/ˈfæsɪneɪtɪd baɪ/", "trans": "Fascinado por", "example": "I'm fascinated by technology."}, {"word": "From my perspective", "phonetic": "/frəm maɪ pərˈspektɪv/", "trans": "Na minha perspectiva", "example": "From my perspective..."}, {"word": "That being said", "phonetic": "/ðæt ˈbiːɪŋ sed/", "trans": "Dito isso", "example": "That being said, I also think..."}, {"word": "Considerably", "phonetic": "/kənˈsɪdərəbli/", "trans": "Consideravelmente", "example": "Considerably more popular."}, {"word": "Inevitable", "phonetic": "/ɪnˈevɪtəbəl/", "trans": "Inevitável", "example": "Change is inevitable."}], "grammar": {"title": "IELTS Speaking: Band 7+ Strategies", "explanation": "<b>Part 1:</b> Respostas de 2-3 frases. <b>Part 2:</b> Use os bullet points do card. Fale por 2 minutos completos! <b>Part 3:</b> Dê opiniões elaboradas com exemplos.", "table": [["Part", "Duração", "Tipo", "Dica"], ["Part 1", "4-5 min", "Perguntas pessoais", "2-3 frases por resposta"], ["Part 2", "3-4 min", "Monólogo (1 min prep + 2 min fala)", "Cubra todos os bullet points"], ["Part 3", "4-5 min", "Discussão abstrata", "Elabore com exemplos"]], "examples": [{"en": "Well, to be honest, I'm quite fascinated by technology. I tend to spend a lot of time learning about new gadgets.", "ph": "/wel, tə biː ˈɒnɪst/", "pt": "Para ser honesto, sou fascinado por tecnologia."}, {"en": "From my perspective, social media has both advantages and disadvantages. That being said, I believe the benefits outweigh the risks.", "ph": "/frəm maɪ pərˈspektɪv/", "pt": "Na minha perspectiva, redes sociais têm prós e contras."}], "tip": "⚡ <b>IELTS Speaking Tip:</b> Use 'fillers' naturais: 'Well...', 'Let me think...', 'That's an interesting question...', 'I'd say...' — isso dá tempo para pensar sem ficar em silêncio!"}, "dialogue": [{"speaker": "A", "name": "Examiner", "en": "Tell me about your hometown.", "ph": "/tel miː əˈbaʊt/", "pt": "Fale sobre sua cidade."}, {"speaker": "B", "name": "Candidate", "en": "Well, I'm from Jaguariúna, which is a small city in São Paulo state. It's quite peaceful compared to bigger cities. I'd say the best thing about it is the sense of community — everyone knows each other.", "ph": "/wel, aɪm frəm/", "pt": "Bem, sou de Jaguariúna, uma cidade pequena em SP."}, {"speaker": "A", "name": "Examiner", "en": "Now I'd like you to talk about a skill you learned recently. You have one minute to prepare.", "ph": "/naʊ aɪd laɪk/", "pt": "Agora fale sobre uma habilidade recente. 1 min para preparar."}, {"speaker": "B", "name": "Candidate", "en": "I'd like to talk about learning English. I started studying seriously about a year ago using an online course. What motivated me was my desire to advance in my IT career. I practice every day for at least thirty minutes — reading, writing, speaking, and listening. The most challenging part has been pronunciation, but I've improved considerably. To be honest, it has already opened new doors for me professionally.", "ph": "/aɪd laɪk tə tɔːk/", "pt": "Gostaria de falar sobre aprender inglês. Comecei há um ano..."}], "reading": {"title": "📖 IELTS Speaking: Common Topics", "text": "The IELTS Speaking test covers everyday topics in Part 1 (work, studies, hobbies, hometown), a specific topic in Part 2 (describe a person, place, event, or experience), and abstract discussions in Part 3 (society, education, technology, environment). The examiner assesses four criteria: Fluency and Coherence (speaking smoothly with good organization), Lexical Resource (vocabulary range and accuracy), Grammatical Range and Accuracy (using varied structures correctly), and Pronunciation (clear speech with natural intonation). To score Band 7 or higher, you need to speak fluently with only occasional hesitation, use a wide range of vocabulary including less common items, use complex sentence structures with good accuracy, and have clear pronunciation with appropriate stress and intonation.", "questions": [{"q": "IELTS Speaking has how many parts?", "opts": ["2", "3", "4", "5"], "answer": 1}, {"q": "Part 2 preparation time:", "opts": ["30 seconds", "1 minute", "2 minutes", "5 minutes"], "answer": 1}, {"q": "How many criteria are assessed?", "opts": ["2", "3", "4", "5"], "answer": 2}, {"q": "For Band 7+ you need:", "opts": ["Perfect grammar", "Fluency + varied vocabulary + accuracy + pronunciation", "Only good pronunciation", "Only vocabulary"], "answer": 1}]}, "writing": {"prompt": "✍️ IELTS Part 2 Practice: Escreva um monólogo de 2 minutos (~200 palavras) sobre: 'Describe a hobby you enjoy. You should say: what it is, when you started, why you enjoy it, and how it has benefited you.'", "keywords": ["well", "to be honest", "I'd say", "tend to", "fascinated", "from my perspective", "considerably", "for instance", "that being said", "enjoy"]}, "speaking": [{"phrase": "Well, I'd like to talk about my hobby, which is playing guitar.", "phonetic": "/wel, aɪd laɪk tə tɔːk/", "translation": "Bem, gostaria de falar sobre tocar violão."}, {"phrase": "To be honest, I'm quite fascinated by music.", "phonetic": "/tə biː ˈɒnɪst/", "translation": "Para ser honesto, sou fascinado por música."}, {"phrase": "From my perspective, hobbies are essential for mental health.", "phonetic": "/frəm maɪ pərˈspektɪv/", "translation": "Na minha perspectiva, hobbies são essenciais."}, {"phrase": "That being said, I also enjoy reading in English.", "phonetic": "/ðæt ˈbiːɪŋ sed/", "translation": "Dito isso, também gosto de ler em inglês."}], "quiz": [{"type": "choice", "q": "IELTS Speaking Part 2 — you speak for:", "opts": ["30 seconds", "1 minute", "2 minutes", "5 minutes"], "answer": 2}, {"type": "fill", "q": "'To be ___' — filler natural. (honesto)", "answer": "honest"}, {"type": "choice", "q": "IELTS is scored in:", "opts": ["Points (0-120)", "Bands (0-9)", "Letters (A-F)", "Percentages"], "answer": 1}, {"type": "fill", "q": "I ___ to prefer working alone.", "answer": "tend"}, {"type": "choice", "q": "Natural filler in English:", "opts": ["Uhm", "Éééé", "Well, let me think...", "Tipo"], "answer": 2}]}, {"id": 32, "module": "Módulo 11: IELTS Prep", "moduleIcon": "🏅", "title": "IELTS Listening & Full Strategy", "titlePt": "IELTS Escuta e Estratégia Completa", "teacher": {"name": "👩‍🏫 IELTS Coach Emma", "tip": "O IELTS Listening tem 4 seções, 40 perguntas, 30 min de áudio + 10 min para transferir respostas. <b>Seção 1:</b> Conversa cotidiana. <b>Seção 2:</b> Monólogo social. <b>Seção 3:</b> Conversa acadêmica. <b>Seção 4:</b> Palestra acadêmica. <b>Dica crucial:</b> Você ouve APENAS UMA VEZ! Leia as perguntas ANTES do áudio começar.", "method": "🔑 Prediction + Spelling + Transfer"}, "vocab": [{"word": "Approximately", "phonetic": "/əˈprɒksɪmətli/", "trans": "Aproximadamente", "example": "Approximately 500 students."}, {"word": "In terms of", "phonetic": "/ɪn tɜːrmz əv/", "trans": "Em termos de", "example": "In terms of quality..."}, {"word": "Spell", "phonetic": "/spel/", "trans": "Soletrar", "example": "Can you spell your name?"}, {"word": "Transfer", "phonetic": "/ˈtrænsfɜːr/", "trans": "Transferir", "example": "Transfer your answers."}, {"word": "Multiple choice", "phonetic": "/ˈmʌltɪpəl tʃɔɪs/", "trans": "Múltipla escolha", "example": "Multiple choice questions."}, {"word": "Map labeling", "phonetic": "/mæp ˈleɪbəlɪŋ/", "trans": "Rotulação de mapa", "example": "Label the map correctly."}, {"word": "Matching", "phonetic": "/ˈmætʃɪŋ/", "trans": "Correspondência", "example": "Matching exercise."}, {"word": "Distractor", "phonetic": "/dɪˈstræktər/", "trans": "Distrator", "example": "Watch out for distractors."}, {"word": "Band score", "phonetic": "/bænd skɔːr/", "trans": "Nota/Banda", "example": "My band score is 7."}, {"word": "Overall band", "phonetic": "/ˌoʊvərˈɔːl bænd/", "trans": "Banda geral", "example": "Overall band 7.5."}], "grammar": {"title": "IELTS: Complete Exam Strategy", "explanation": "<b>Listening:</b> 30+10 min. <b>Reading:</b> 60 min. <b>Writing:</b> 60 min. <b>Speaking:</b> 11-14 min (dia separado). Banda 0-9. Maioria das universidades: 6.0-7.0.", "table": [["Seção", "Formato", "Dicas", ""], ["Listening", "4 sections, 40 questions", "Read questions before audio", ""], ["Reading", "3 passages, 40 questions", "20 min per passage", ""], ["Writing", "Task 1 + Task 2", "Spend 40 min on Task 2", ""], ["Speaking", "Face-to-face interview", "Use fillers, elaborate answers", ""]], "examples": [{"en": "Read the questions before the audio starts. This helps you predict answers.", "ph": "/riːd ðə ˈkwestʃənz/", "pt": "Leia as perguntas antes do áudio."}, {"en": "Pay attention to spelling — even small mistakes count as wrong in IELTS Listening.", "ph": "/peɪ əˈtenʃən tə ˈspelɪŋ/", "pt": "Atenção à grafia — erros contam como errado."}], "tip": "⚡ <b>IELTS vs TOEFL:</b> IELTS Speaking é face-to-face (TOEFL é no computador). IELTS Listening toca UMA vez (TOEFL permite replay). IELTS usa bandas 0-9 (TOEFL usa pontos 0-120). Ambos são aceitos pela maioria das universidades!"}, "dialogue": [{"speaker": "A", "name": "Coach", "en": "Let's compare IELTS and TOEFL. Which one should you take?", "ph": "/lets kəmˈpɛr/", "pt": "Vamos comparar. Qual fazer?"}, {"speaker": "B", "name": "Student", "en": "I've heard that IELTS is better for UK and Australia, and TOEFL for the US.", "ph": "/aɪv hɜːrd ðæt/", "pt": "Ouvi que IELTS é melhor para UK/Austrália, TOEFL para EUA."}, {"speaker": "A", "name": "Coach", "en": "That used to be true, but now most universities accept both. Choose based on your strengths.", "ph": "/ðæt juːst tə biː truː/", "pt": "Isso era verdade, mas agora a maioria aceita ambos."}, {"speaker": "B", "name": "Student", "en": "I think I'd prefer IELTS because the speaking section is with a real person.", "ph": "/aɪ θɪŋk aɪd prɪˈfɜːr/", "pt": "Prefiro IELTS porque o speaking é com pessoa real."}, {"speaker": "A", "name": "Coach", "en": "Good choice! Just remember: practice spelling for Listening, and time management for Reading and Writing.", "ph": "/ɡʊd tʃɔɪs!/", "pt": "Boa escolha! Lembre: pratique grafia e gestão de tempo."}], "reading": {"title": "📖 IELTS vs TOEFL: Which One?", "text": "Both IELTS and TOEFL are internationally recognized English proficiency tests. IELTS is administered by the British Council and IDP, while TOEFL is administered by ETS. IELTS uses a band score system from 0 to 9, with half-band increments. TOEFL uses a point system from 0 to 120. For IELTS, a band score of 6.5 to 7.0 is typically required for university admission, which roughly corresponds to a TOEFL score of 79 to 100. The main differences are: IELTS Listening plays only once, while TOEFL allows replay. IELTS Speaking is face-to-face with an examiner, while TOEFL Speaking is recorded on a computer. IELTS Writing Task 1 requires describing visual data, while TOEFL Integrated Writing requires reading and listening. Choose the test that best matches your strengths and the requirements of your target institution.", "questions": [{"q": "IELTS band score range:", "opts": ["0-100", "0-120", "0-9", "1-10"], "answer": 2}, {"q": "IELTS Listening plays:", "opts": ["Twice", "Three times", "Once", "Unlimited"], "answer": 2}, {"q": "IELTS 6.5-7.0 ≈ TOEFL:", "opts": ["50-60", "79-100", "110-120", "30-40"], "answer": 1}, {"q": "IELTS Speaking format:", "opts": ["Computer-based", "Face-to-face", "Written", "Group discussion"], "answer": 1}]}, "writing": {"prompt": "✍️ Compare IELTS e TOEFL em inglês (6+ frases). Qual você escolheria e por quê?", "keywords": ["IELTS", "TOEFL", "band", "score", "speaking", "listening", "reading", "writing", "prefer", "because", "whereas", "both"]}, "speaking": [{"phrase": "Both IELTS and TOEFL are accepted by most universities.", "phonetic": "/boʊθ ˈaɪelts ænd ˈtoʊfəl/", "translation": "Ambos são aceitos pela maioria das universidades."}, {"phrase": "I would prefer IELTS because the speaking test is face-to-face.", "phonetic": "/aɪ wʊd prɪˈfɜːr/", "translation": "Preferiria IELTS porque o speaking é presencial."}, {"phrase": "Whereas IELTS uses bands, TOEFL uses points.", "phonetic": "/wɛrˈæz/", "translation": "Enquanto IELTS usa bandas, TOEFL usa pontos."}, {"phrase": "Preparation and practice are the keys to success on both tests.", "phonetic": "/ˌprepəˈreɪʃən/", "translation": "Preparação e prática são as chaves do sucesso."}], "quiz": [{"type": "choice", "q": "IELTS is administered by:", "opts": ["ETS", "British Council/IDP", "Cambridge", "Oxford"], "answer": 1}, {"type": "fill", "q": "IELTS uses ___ scores from 0 to 9.", "answer": "band"}, {"type": "choice", "q": "IELTS Listening — audio plays:", "opts": ["Twice", "Once", "Three times", "Unlimited"], "answer": 1}, {"type": "fill", "q": "Most universities require band ___ to 7.0.", "answer": "6.5"}, {"type": "choice", "q": "Best advice for both tests:", "opts": ["Cram last minute", "Practice daily + mock tests", "Only read grammar", "Watch movies"], "answer": 1}]},{"id": 33, "module": "Módulo 12: Conversação Avançada I", "moduleIcon": "💎", "title": "Negotiation & Persuasion", "titlePt": "Negociação e Persuasão", "teacher": {"name": "👨‍🏫 Coach Alexander", "tip": "Negociar em inglês é uma das habilidades mais valiosas no mundo profissional! <b>Regra de ouro:</b> nunca diga 'I want' — diga 'I'd like to propose' ou 'What if we considered...'. <b>Mairo Vergara:</b> Assista negociações em séries como Suits e Shark Tank. <b>Carina Fragozo:</b> O tom de voz importa TANTO quanto as palavras. Fale com confiança mas sem agressividade.", "method": "🔑 Win-Win Framework + Diplomatic Tone"}, "vocab": [{"word": "I'd like to propose", "phonetic": "/aɪd laɪk tə prəˈpoʊz/", "trans": "Gostaria de propor", "example": "I'd like to propose a different approach. /aɪd laɪk tə prəˈpoʊz ə ˈdɪfrənt əˈproʊtʃ/"}, {"word": "What if we considered", "phonetic": "/wɒt ɪf wiː kənˈsɪdərd/", "trans": "E se considerássemos", "example": "What if we considered extending the deadline?"}, {"word": "That's a fair point", "phonetic": "/ðæts ə fɛr pɔɪnt/", "trans": "É um ponto justo", "example": "That's a fair point, but let me explain my perspective."}, {"word": "I see where you're coming from", "phonetic": "/aɪ siː wɛr jʊr ˈkʌmɪŋ frəm/", "trans": "Entendo seu ponto de vista", "example": "I see where you're coming from, however..."}, {"word": "Meet halfway", "phonetic": "/miːt ˈhæfweɪ/", "trans": "Encontrar um meio-termo", "example": "Can we meet halfway on this? /kæn wiː miːt ˈhæfweɪ/"}, {"word": "Bottom line", "phonetic": "/ˈbɒtəm laɪn/", "trans": "Ponto crucial/resultado final", "example": "The bottom line is we need to reduce costs."}, {"word": "Leverage", "phonetic": "/ˈlevərɪdʒ/", "trans": "Alavancagem/Vantagem", "example": "We can leverage our experience. /wiː kæn ˈlevərɪdʒ/"}, {"word": "Compromise", "phonetic": "/ˈkɒmprəmaɪz/", "trans": "Acordo/Compromisso", "example": "Let's find a compromise. /lets faɪnd ə ˈkɒmprəmaɪz/"}, {"word": "Mutual benefit", "phonetic": "/ˈmjuːtʃuəl ˈbenɪfɪt/", "trans": "Benefício mútuo", "example": "This is a solution of mutual benefit."}, {"word": "Non-negotiable", "phonetic": "/nɒn nɪˈɡoʊʃiəbəl/", "trans": "Inegociável", "example": "Quality is non-negotiable for us."}], "grammar": {"title": "Language of Negotiation: Softeners & Hedging", "explanation": "Em negociações, usamos <b>softeners</b> para suavizar pedidos: 'Would it be possible to...?' em vez de 'I want'. <b>Hedging</b> mostra flexibilidade: 'Perhaps we could...', 'I was wondering if...'. <b>Concessões:</b> 'While I understand your concern, I believe...'", "table": [["Técnica", "Exemplo direto", "Exemplo suavizado", ""], ["Pedido", "Give me a discount.", "Would it be possible to discuss the pricing?", ""], ["Recusa", "No.", "I appreciate the offer, but I'm afraid that won't work for us.", ""], ["Concessão", "You're wrong.", "I see your point; however, I'd like to suggest an alternative.", ""], ["Proposta", "Do this.", "What if we tried a different approach?", ""]], "examples": [{"en": "Would it be possible to extend the deadline by one week?", "ph": "/wʊd ɪt biː ˈpɒsəbəl tə ɪkˈstend/", "pt": "Seria possível estender o prazo em uma semana?"}, {"en": "I appreciate your offer, but I was hoping we could find a middle ground.", "ph": "/aɪ əˈpriːʃieɪt jʊr ˈɒfər/", "pt": "Agradeço a oferta, mas esperava um meio-termo."}, {"en": "While I understand your concerns, perhaps we could explore other options.", "ph": "/waɪl aɪ ˌʌndərˈstænd/", "pt": "Embora eu entenda suas preocupações, talvez pudéssemos explorar outras opções."}], "tip": "⚡ <b>Poder das pausas:</b> Depois de fazer uma proposta, PARE e espere. O silêncio é uma ferramenta poderosa de negociação. Não preencha o silêncio com concessões!"}, "dialogue": [{"speaker": "A", "name": "Manager", "en": "Thank you for meeting with me. I'd like to discuss the contract terms.", "ph": "/θæŋk juː fɔːr ˈmiːtɪŋ. aɪd laɪk tə dɪˈskʌs/", "pt": "Obrigado pela reunião. Gostaria de discutir os termos."}, {"speaker": "B", "name": "Client", "en": "Of course. We've reviewed the proposal, and we have some concerns about the pricing.", "ph": "/əv kɔːrs. wiːv rɪˈvjuːd ðə prəˈpoʊzəl/", "pt": "Claro. Revisamos a proposta e temos preocupações com preço."}, {"speaker": "A", "name": "Manager", "en": "I see where you're coming from. What if we considered a phased approach? We could start with a smaller scope at a lower cost.", "ph": "/aɪ siː wɛr jʊr ˈkʌmɪŋ frəm. wɒt ɪf wiː kənˈsɪdərd/", "pt": "Entendo. E se considerássemos uma abordagem em fases?"}, {"speaker": "B", "name": "Client", "en": "That's an interesting idea. But quality is non-negotiable for us.", "ph": "/ðæts ən ˈɪntrəstɪŋ aɪˈdɪə. bʌt ˈkwɒləti ɪz nɒn nɪˈɡoʊʃiəbəl/", "pt": "Ideia interessante. Mas qualidade é inegociável."}, {"speaker": "A", "name": "Manager", "en": "Absolutely. Quality is our priority too. I believe we can find a compromise that works for both sides — a solution of mutual benefit.", "ph": "/ˈæbsəluːtli. ˈkwɒləti ɪz aʊr praɪˈɒrəti/", "pt": "Com certeza. Qualidade é nossa prioridade. Acredito que podemos encontrar um compromisso."}, {"speaker": "B", "name": "Client", "en": "I appreciate your flexibility. Let's meet halfway — we'll accept the phased approach if you can guarantee the same quality standards.", "ph": "/aɪ əˈpriːʃieɪt jʊr ˌfleksəˈbɪləti/", "pt": "Agradeço a flexibilidade. Vamos ao meio-termo."}, {"speaker": "A", "name": "Manager", "en": "That's a fair deal. I'm confident this will be a great partnership.", "ph": "/ðæts ə fɛr diːl/", "pt": "É um acordo justo. Estou confiante nessa parceria."}], "reading": {"title": "📖 The Art of Negotiation", "text": "Successful negotiation is not about winning or losing — it's about finding solutions that benefit all parties. The best negotiators follow key principles. First, always prepare thoroughly. Know your goals, your limits, and the other party's likely interests. Second, listen more than you speak. Understanding the other person's needs gives you valuable information. Third, use 'we' language instead of 'I vs you' — this creates a collaborative atmosphere. Fourth, never make the first concession without getting something in return. Fifth, be willing to walk away if the deal doesn't meet your minimum requirements. Remember: the most powerful word in negotiation isn't 'yes' or 'no' — it's 'what if'. This simple phrase opens doors to creative solutions that neither side initially considered. Finally, always end on a positive note, even if the negotiation was difficult. Today's opponent may be tomorrow's partner.", "questions": [{"q": "Negotiation is about:", "opts": ["Winning at all costs", "Finding mutual solutions", "Saying no", "Being aggressive"], "answer": 1}, {"q": "The most powerful phrase is:", "opts": ["Give me", "I want", "What if", "No deal"], "answer": 2}, {"q": "You should listen:", "opts": ["Never", "Less than you speak", "More than you speak", "Only at the end"], "answer": 2}, {"q": "If a deal doesn't meet your minimum:", "opts": ["Accept anyway", "Be angry", "Walk away", "Lie"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva um diálogo de negociação profissional (8+ frases). Cenário: Você quer um aumento de salário ou renegociar um contrato. Use softeners e hedging!\n\n💡 Use: I'd like to propose, What if we considered, I see where you're coming from, meet halfway, mutual benefit, compromise", "keywords": ["propose", "consider", "fair", "point", "however", "appreciate", "compromise", "halfway", "benefit", "flexible", "approach", "would"]}, "speaking": [{"phrase": "I'd like to propose a different approach.", "phonetic": "/aɪd laɪk tə prəˈpoʊz ə ˈdɪfrənt əˈproʊtʃ/", "translation": "Gostaria de propor uma abordagem diferente."}, {"phrase": "I see where you're coming from, but let me explain.", "phonetic": "/aɪ siː wɛr jʊr ˈkʌmɪŋ frəm/", "translation": "Entendo seu ponto, mas deixe-me explicar."}, {"phrase": "Can we meet halfway on this?", "phonetic": "/kæn wiː miːt ˈhæfweɪ ɒn ðɪs/", "translation": "Podemos encontrar um meio-termo?"}, {"phrase": "I believe this is a solution of mutual benefit.", "phonetic": "/aɪ bɪˈliːv ðɪs ɪz ə səˈluːʃən əv ˈmjuːtʃuəl ˈbenɪfɪt/", "translation": "Acredito que esta é uma solução de benefício mútuo."}], "quiz": [{"type": "choice", "q": "Softener para 'Give me a discount':", "opts": ["Give me discount now!", "Would it be possible to discuss pricing?", "I want cheaper!", "Discount or I leave!"], "answer": 1}, {"type": "fill", "q": "Can we meet ___ on this? (meio-termo)", "answer": "halfway"}, {"type": "choice", "q": "'Non-negotiable' =", "opts": ["Negociável", "Flexível", "Inegociável", "Opcional"], "answer": 2}, {"type": "fill", "q": "I see where you're ___ from. (vindo)", "answer": "coming"}, {"type": "choice", "q": "Most powerful negotiation phrase:", "opts": ["I demand", "What if", "Never", "Give me"], "answer": 1}]}, {"id": 34, "module": "Módulo 12: Conversação Avançada I", "moduleIcon": "💎", "title": "Discussing News & Current Events", "titlePt": "Discutindo Notícias e Atualidades", "teacher": {"name": "👩‍🏫 Coach Sophia", "tip": "Discutir notícias em inglês mostra maturidade linguística! <b>Dica:</b> Use frases como 'Have you heard about...?', 'Apparently...' e 'According to reports...'. <b>Mairo Vergara:</b> Leia um artigo de notícia em inglês por dia — BBC, CNN ou The Guardian. <b>Carina Fragozo:</b> 'Apparently' = /əˈpærəntli/ — a sílaba forte é a SEGUNDA!", "method": "🔑 News Vocabulary + Expressing Opinions on Current Affairs"}, "vocab": [{"word": "Have you heard about", "phonetic": "/hæv juː hɜːrd əˈbaʊt/", "trans": "Você ficou sabendo de", "example": "Have you heard about the new policy?"}, {"word": "Apparently", "phonetic": "/əˈpærəntli/", "trans": "Aparentemente", "example": "Apparently, they're changing the law."}, {"word": "According to reports", "phonetic": "/əˈkɔːrdɪŋ tə rɪˈpɔːrts/", "trans": "Segundo reportagens", "example": "According to reports, the economy is growing."}, {"word": "Breaking news", "phonetic": "/ˈbreɪkɪŋ njuːz/", "trans": "Notícia de última hora", "example": "Breaking news: the president has resigned."}, {"word": "It remains to be seen", "phonetic": "/ɪt rɪˈmeɪnz tə biː siːn/", "trans": "Resta ver/Ainda não se sabe", "example": "It remains to be seen whether this will work."}, {"word": "Controversial", "phonetic": "/ˌkɒntrəˈvɜːrʃəl/", "trans": "Polêmico/Controverso", "example": "It's a highly controversial topic. /ˌkɒntrəˈvɜːrʃəl/"}, {"word": "Unprecedented", "phonetic": "/ʌnˈpresɪdentɪd/", "trans": "Sem precedentes", "example": "An unprecedented situation."}, {"word": "Impact", "phonetic": "/ˈɪmpækt/", "trans": "Impacto", "example": "The impact on the economy is significant."}, {"word": "Biased", "phonetic": "/ˈbaɪəst/", "trans": "Tendencioso", "example": "The report seems biased. /ðə rɪˈpɔːrt siːmz ˈbaɪəst/"}, {"word": "Reliable source", "phonetic": "/rɪˈlaɪəbəl sɔːrs/", "trans": "Fonte confiável", "example": "Always check for reliable sources."}], "grammar": {"title": "Reporting News & Expressing Uncertainty", "explanation": "Para relatar notícias: <b>Reportedly</b>, <b>Allegedly</b>, <b>According to...</b>. Para incerteza: <b>It seems that</b>, <b>It appears that</b>, <b>It remains to be seen</b>. Para opinião: <b>I tend to think</b>, <b>From what I've read</b>.", "table": [["Função", "Expressão", "Nível", ""], ["Relatar", "According to the BBC...", "Neutro", ""]
