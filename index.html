, ["Incerteza", "It seems that / Apparently...", "Cauteloso", ""], ["Opinião", "From what I've read, I tend to think...", "Pessoal", ""], ["Especulação", "It remains to be seen whether...", "Sofisticado", ""]], "examples": [{"en": "According to recent reports, AI is transforming the job market.", "ph": "/əˈkɔːrdɪŋ tə ˈriːsənt rɪˈpɔːrts/", "pt": "Segundo reportagens recentes, a IA está transformando o mercado."}, {"en": "From what I've read, it seems that renewable energy is becoming more affordable.", "ph": "/frəm wɒt aɪv red/", "pt": "Pelo que li, parece que energia renovável está ficando mais acessível."}, {"en": "It remains to be seen whether this policy will achieve its goals.", "ph": "/ɪt rɪˈmeɪnz tə biː siːn/", "pt": "Resta ver se esta política alcançará seus objetivos."}], "tip": "⚡ <b>Evite fake news:</b> Use 'allegedly' (supostamente) e 'reportedly' (segundo relatos) quando a informação não é confirmada. Isso mostra pensamento crítico!"}, "dialogue": [{"speaker": "A", "name": "Felipe", "en": "Have you heard about the new AI regulations in Europe?", "ph": "/hæv juː hɜːrd əˈbaʊt/", "pt": "Ficou sabendo das novas regulações de IA na Europa?"}, {"speaker": "B", "name": "Sarah", "en": "Yes! Apparently, they're going to require companies to disclose when content is AI-generated.", "ph": "/jes! əˈpærəntli/", "pt": "Sim! Aparentemente vão exigir que empresas revelem conteúdo gerado por IA."}, {"speaker": "A", "name": "Felipe", "en": "That's quite controversial. Some people think it'll stifle innovation.", "ph": "/ðæts kwaɪt ˌkɒntrəˈvɜːrʃəl/", "pt": "É bem polêmico. Alguns acham que vai frear inovação."}, {"speaker": "B", "name": "Sarah", "en": "I tend to think regulation is necessary, though. From what I've read, there are real risks with unregulated AI.", "ph": "/aɪ tend tə θɪŋk/", "pt": "Tendo a achar que regulação é necessária. Pelo que li, há riscos reais."}, {"speaker": "A", "name": "Felipe", "en": "That's a fair point. It remains to be seen how companies will adapt.", "ph": "/ðæts ə fɛr pɔɪnt. ɪt rɪˈmeɪnz/", "pt": "Ponto justo. Resta ver como as empresas vão se adaptar."}, {"speaker": "B", "name": "Sarah", "en": "Exactly. The impact could be unprecedented — for better or worse.", "ph": "/ɪɡˈzæktli. ðə ˈɪmpækt kʊd biː ʌnˈpresɪdentɪd/", "pt": "Exatamente. O impacto pode ser sem precedentes."}], "reading": {"title": "📖 Media Literacy in the Digital Age", "text": "In today's world, we are bombarded with information from countless sources — social media, news websites, podcasts, and messaging apps. While access to information has never been easier, distinguishing reliable news from misinformation has become a critical skill. Media literacy involves questioning what you read: Who wrote this? What is their agenda? Is this based on evidence or opinion? Are multiple reliable sources reporting the same thing? Experts recommend following established news organizations, checking facts before sharing, and being aware of your own biases. Remember: just because something confirms what you already believe doesn't make it true. Critical thinking is the best defense against misinformation.", "questions": [{"q": "Media literacy involves:", "opts": ["Believing everything", "Questioning what you read", "Only watching TV", "Ignoring news"], "answer": 1}, {"q": "Before sharing news, you should:", "opts": ["Share immediately", "Check facts first", "Add your opinion", "Delete it"], "answer": 1}, {"q": "Confirmation bias means:", "opts": ["Checking facts", "Believing what confirms your views", "Reading multiple sources", "Being skeptical"], "answer": 1}]}, "writing": {"prompt": "✍️ Discuta uma notícia recente ou um tema atual em inglês (8+ frases). Use expressões de reportagem e dê sua opinião!\n\n💡 Use: According to, Apparently, It seems that, From what I've read, controversial, unprecedented, impact, remains to be seen", "keywords": ["according", "apparently", "seems", "controversial", "impact", "unprecedented", "remains", "opinion", "tend", "think", "however", "believe", "source", "report"]}, "speaking": [{"phrase": "Have you heard about the new AI regulations?", "phonetic": "/hæv juː hɜːrd əˈbaʊt/", "translation": "Ficou sabendo das novas regulações de IA?"}, {"phrase": "Apparently, they're changing the policy.", "phonetic": "/əˈpærəntli/", "translation": "Aparentemente estão mudando a política."}, {"phrase": "From what I've read, it seems quite controversial.", "phonetic": "/frəm wɒt aɪv red/", "translation": "Pelo que li, parece bem polêmico."}, {"phrase": "It remains to be seen what the impact will be.", "phonetic": "/ɪt rɪˈmeɪnz tə biː siːn/", "translation": "Resta ver qual será o impacto."}], "quiz": [{"type": "choice", "q": "'Apparently' pronúncia — sílaba forte:", "opts": ["Primeira", "Segunda", "Terceira", "Quarta"], "answer": 1}, {"type": "fill", "q": "According to ___, the economy is growing. (reportagens)", "answer": "reports"}, {"type": "choice", "q": "'Unprecedented' =", "opts": ["Previsível", "Normal", "Sem precedentes", "Antigo"], "answer": 2}, {"type": "fill", "q": "It remains to be ___ whether this works.", "answer": "seen"}, {"type": "choice", "q": "'Biased' =", "opts": ["Neutro", "Justo", "Tendencioso", "Confiável"], "answer": 2}]}, {"id": 35, "module": "Módulo 12: Conversação Avançada I", "moduleIcon": "💎", "title": "Presentations & Public Speaking", "titlePt": "Apresentações e Oratória", "teacher": {"name": "👨‍🏫 Coach Michael", "tip": "Apresentar em inglês é uma SUPER habilidade! <b>Estrutura TED:</b> 1) Hook poderoso (pergunta, estatística, história), 2) 3 pontos principais, 3) Conclusão memorável. <b>Mairo Vergara:</b> Assista TED Talks e observe como os speakers usam pausas, repetição e storytelling. <b>Carina Fragozo:</b> Projete a voz! Fale 20% mais devagar do que o normal — isso transmite confiança.", "method": "🔑 TED Talk Structure + Power of Pausing"}, "vocab": [{"word": "Good morning, everyone", "phonetic": "/ɡʊd ˈmɔːrnɪŋ ˈevriwʌn/", "trans": "Bom dia a todos", "example": "Good morning, everyone. Thank you for being here."}, {"word": "I'd like to draw your attention to", "phonetic": "/aɪd laɪk tə drɔː jʊr əˈtenʃən/", "trans": "Gostaria de chamar atenção para", "example": "I'd like to draw your attention to this graph."}, {"word": "Let me walk you through", "phonetic": "/let miː wɔːk juː θruː/", "trans": "Deixe-me guiá-los por", "example": "Let me walk you through the key findings."}, {"word": "As you can see", "phonetic": "/æz juː kæn siː/", "trans": "Como podem ver", "example": "As you can see from the chart..."}, {"word": "To put it simply", "phonetic": "/tə pʊt ɪt ˈsɪmpli/", "trans": "Simplificando", "example": "To put it simply, we need to act now."}, {"word": "Moving on to", "phonetic": "/ˈmuːvɪŋ ɒn tə/", "trans": "Passando para", "example": "Moving on to the next point..."}, {"word": "In a nutshell", "phonetic": "/ɪn ə ˈnʌtʃel/", "trans": "Resumindo", "example": "In a nutshell, our strategy is working."}, {"word": "I'd be happy to take questions", "phonetic": "/aɪd biː ˈhæpi tə teɪk/", "trans": "Ficarei feliz em receber perguntas", "example": "I'd be happy to take questions now."}, {"word": "Key takeaway", "phonetic": "/kiː ˈteɪkəweɪ/", "trans": "Conclusão principal", "example": "The key takeaway is that data drives decisions."}, {"word": "To wrap up", "phonetic": "/tə ræp ʌp/", "trans": "Para finalizar", "example": "To wrap up, I'd like to emphasize three things."}], "grammar": {"title": "Presentation Structure & Signposting", "explanation": "<b>Signposting</b> = palavras que guiam a audiência pela apresentação. <b>Abertura:</b> Hook → Objetivo → Agenda. <b>Corpo:</b> Firstly → Secondly → Finally. <b>Fechamento:</b> Resumo → Call to action → Perguntas.", "table": [["Fase", "Expressões", "", ""], ["Abertura", "Good morning. Today I'm going to talk about...", "", ""], ["Transição", "Moving on to... / Let's now look at...", "", ""], ["Ênfase", "What's particularly interesting is... / I'd like to highlight...", "", ""], ["Exemplo", "For instance... / Let me give you an example...", "", ""], ["Fechamento", "To sum up... / The key takeaway is... / Any questions?", "", ""]], "examples": [{"en": "Today I'm going to talk about three strategies that can transform your business.", "ph": "/təˈdeɪ aɪm ˈɡoʊɪŋ tə tɔːk/", "pt": "Hoje vou falar sobre três estratégias que podem transformar seu negócio."}, {"en": "Let me walk you through the data. As you can see, sales have increased by 40%.", "ph": "/let miː wɔːk juː θruː/", "pt": "Deixem-me guiá-los pelos dados. Como podem ver, vendas subiram 40%."}, {"en": "To wrap up, I'd like to leave you with one thought: innovation starts with courage.", "ph": "/tə ræp ʌp/", "pt": "Para finalizar, quero deixar um pensamento: inovação começa com coragem."}], "tip": "⚡ <b>Regra dos 10-20-30:</b> No máximo 10 slides, no máximo 20 minutos, fonte no mínimo 30pt. Menos é MAIS em apresentações!"}, "dialogue": [{"speaker": "A", "name": "Presenter", "en": "Good morning, everyone. Thank you for being here. Today I'm going to share three key strategies for improving team productivity.", "ph": "/ɡʊd ˈmɔːrnɪŋ. θæŋk juː fɔːr ˈbiːɪŋ hɪr/", "pt": "Bom dia. Obrigado por estarem aqui. Hoje vou compartilhar três estratégias."}, {"speaker": "A", "name": "Presenter", "en": "Let me start with a question: How many hours per week do you spend in unproductive meetings?", "ph": "/let miː stɑːrt wɪð ə ˈkwestʃən/", "pt": "Começo com uma pergunta: quantas horas por semana em reuniões improdutivas?"}, {"speaker": "A", "name": "Presenter", "en": "According to recent research, the average professional spends 31 hours per month in meetings — and half of those are considered unnecessary.", "ph": "/əˈkɔːrdɪŋ tə ˈriːsənt rɪˈsɜːrtʃ/", "pt": "Segundo pesquisas, o profissional médio gasta 31 horas/mês em reuniões."}, {"speaker": "A", "name": "Presenter", "en": "Moving on to our first strategy: implement a 'no-meeting Wednesday.' As you can see from this graph, companies that did this reported a 35% increase in productivity.", "ph": "/ˈmuːvɪŋ ɒn tə/", "pt": "Passando para a primeira estratégia: quarta sem reunião."}, {"speaker": "A", "name": "Presenter", "en": "To wrap up, the key takeaway is this: less meetings, more action. I'd be happy to take any questions.", "ph": "/tə ræp ʌp, ðə kiː ˈteɪkəweɪ/", "pt": "Para finalizar: menos reuniões, mais ação. Perguntas?"}, {"speaker": "B", "name": "Audience", "en": "That was very insightful! How did you measure the productivity increase?", "ph": "/ðæt wɒz ˈveri ɪnˈsaɪtfəl!/", "pt": "Muito interessante! Como mediram o aumento?"}], "reading": {"title": "📖 The Power of Public Speaking", "text": "Public speaking is consistently ranked as one of the most feared activities — even above death! Yet it is also one of the most valuable skills you can develop. Great speakers share common traits: they tell stories, use simple language, make eye contact, and pause for effect. Steve Jobs was famous for his 'one more thing' technique — building suspense before revealing a major announcement. TED speakers follow a strict 18-minute format, forcing them to distill complex ideas into clear, concise messages. The secret to great public speaking is practice. Record yourself, watch the playback, and improve. Start with small audiences and gradually build confidence. Remember: the audience wants you to succeed. They are on your side!", "questions": [{"q": "Public speaking is ranked as:", "opts": ["Easy", "Most feared", "Boring", "Unnecessary"], "answer": 1}, {"q": "Great speakers use:", "opts": ["Complex jargon", "Stories and simple language", "Only data", "Long sentences"], "answer": 1}, {"q": "TED talks are limited to:", "opts": ["5 minutes", "18 minutes", "1 hour", "No limit"], "answer": 1}]}, "writing": {"prompt": "✍️ Escreva o roteiro de uma mini-apresentação de 2 minutos sobre um tema que você domina (8+ frases). Use signposting!\n\n💡 Estrutura: Hook → 'Today I'm going to...' → Ponto 1 → Ponto 2 → 'To wrap up...' → 'Any questions?'", "keywords": ["good morning", "today", "going to", "first", "second", "as you can see", "moving on", "to wrap up", "key takeaway", "questions", "let me", "for instance"]}, "speaking": [{"phrase": "Good morning, everyone. Today I'm going to talk about...", "phonetic": "/ɡʊd ˈmɔːrnɪŋ, ˈevriwʌn/", "translation": "Bom dia. Hoje vou falar sobre..."}, {"phrase": "Let me walk you through the key findings.", "phonetic": "/let miː wɔːk juː θruː/", "translation": "Deixem-me guiá-los pelas descobertas."}, {"phrase": "As you can see from the data, results improved significantly.", "phonetic": "/æz juː kæn siː/", "translation": "Como podem ver, os resultados melhoraram."}, {"phrase": "To wrap up, I'd be happy to take any questions.", "phonetic": "/tə ræp ʌp/", "translation": "Para finalizar, ficarei feliz em receber perguntas."}], "quiz": [{"type": "choice", "q": "'Signposting' em apresentações é:", "opts": ["Usar placas", "Guiar a audiência com palavras de transição", "Ler slides", "Falar rápido"], "answer": 1}, {"type": "fill", "q": "___ on to the next point. (passando)", "answer": "Moving"}, {"type": "choice", "q": "Melhor forma de começar:", "opts": ["Ler slides", "Hook: pergunta ou história", "Pedir desculpas", "Dizer 'Uhm'"], "answer": 1}, {"type": "fill", "q": "The key ___ is that data drives decisions.", "answer": "takeaway"}, {"type": "choice", "q": "'In a nutshell' =", "opts": ["Em uma casca", "Resumindo", "Detalhadamente", "No final"], "answer": 1}]}, {"id": 36, "module": "Módulo 12: Conversação Avançada I", "moduleIcon": "💎", "title": "Humor, Sarcasm & Cultural Nuances", "titlePt": "Humor, Sarcasmo e Nuances Culturais", "teacher": {"name": "👩‍🏫 Coach Jessica", "tip": "Entender humor e sarcasmo é o NÍVEL MAIS ALTO de fluência! <b>Mairo Vergara:</b> Assista sitcoms (The Office, Friends, Brooklyn 99) para absorver o humor americano. <b>Carina Fragozo:</b> Sarcasmo em inglês depende muito da ENTONAÇÃO. A mesma frase pode ser séria ou sarcástica dependendo de como você fala. <b>Dica:</b> Humor britânico é seco (dry humor). Humor americano é mais explícito e físico.", "method": "🔑 Sitcom Immersion + Intonation Awareness"}, "vocab": [{"word": "You're kidding", "phonetic": "/jʊr ˈkɪdɪŋ/", "trans": "Tá brincando", "example": "You're kidding, right? /jʊr ˈkɪdɪŋ, raɪt/"}, {"word": "No way!", "phonetic": "/noʊ weɪ/", "trans": "De jeito nenhum!/Sério?!", "example": "No way! That's unbelievable!"}, {"word": "I'm just pulling your leg", "phonetic": "/aɪm dʒʌst ˈpʊlɪŋ jʊr leɡ/", "trans": "Estou só brincando/zuando", "example": "Relax! I'm just pulling your leg!"}, {"word": "That's hilarious", "phonetic": "/ðæts hɪˈlɛriəs/", "trans": "Isso é hilário", "example": "That's hilarious! Tell me more!"}, {"word": "Yeah, right", "phonetic": "/jɛə raɪt/", "trans": "Sei... (sarcasmo)", "example": "Yeah, right. Like that's going to happen."}, {"word": "Tell me about it", "phonetic": "/tel miː əˈbaʊt ɪt/", "trans": "Nem me fale!/Eu sei!", "example": "Tell me about it! I deal with that every day."}, {"word": "Dead serious", "phonetic": "/ded ˈsɪriəs/", "trans": "Completamente sério", "example": "I'm dead serious. This is not a joke."}, {"word": "Tongue in cheek", "phonetic": "/tʌŋ ɪn tʃiːk/", "trans": "De forma irônica/brincalhona", "example": "The comment was tongue in cheek."}, {"word": "Sarcasm", "phonetic": "/ˈsɑːrkæzəm/", "trans": "Sarcasmo", "example": "His sarcasm is hard to detect sometimes."}, {"word": "Get the joke", "phonetic": "/ɡet ðə dʒoʊk/", "trans": "Entender a piada", "example": "I didn't get the joke at first."}], "grammar": {"title": "Understanding Sarcasm, Irony & Double Meanings", "explanation": "Sarcasmo em inglês = dizer o OPOSTO do que se quer dizer, com entonação específica. <b>'Oh, great'</b> com entonação caindo = sarcástico (péssimo). <b>'Oh, great!'</b> com entonação subindo = genuíno (ótimo). <b>Understatement</b> britânico: 'It's a bit chilly' quando está nevando.", "table": [["Expressão", "Literal", "Sarcástico", ""], ["Oh, great.", "Ótimo (genuíno)", "Péssimo (sarcasmo)", ""], ["That's just wonderful.", "Maravilhoso", "Terrível", ""], ["Well, that went well.", "Foi bem", "Foi um desastre", ""], ["Sure, why not.", "Claro, por que não", "Definitivamente não", ""], ["Thanks a lot.", "Muito obrigado", "Culpa sua", ""]], "examples": [{"en": "Oh, you spilled coffee on my laptop? That's just wonderful.", "ph": "/oʊ, juː spɪld ˈkɒfi/ (tom sarcástico)", "pt": "Ah, derramou café no meu laptop? Que maravilha. (sarcasmo)"}, {"en": "I'm just pulling your leg! I didn't really eat your lunch.", "ph": "/aɪm dʒʌst ˈpʊlɪŋ jʊr leɡ/", "pt": "Tô só zoando! Não comi seu almoço de verdade."}, {"en": "The British might say 'It's a bit nippy' when it's minus 10 degrees.", "ph": "/ɪts ə bɪt ˈnɪpi/", "pt": "Um britânico diria 'Está um pouquinho frio' com -10°C."}], "tip": "⚡ <b>Como detectar sarcasmo:</b> 1) Tom de voz monótono ou exagerado. 2) Contexto contradiz as palavras. 3) Expressão facial não combina. 4) Pausa antes da frase. Se não tem certeza, pergunte: 'Are you being serious?' ou 'Wait, really?'"}, "dialogue": [{"speaker": "A", "name": "Tom", "en": "Guess what? I just got a parking ticket!", "ph": "/ɡes wɒt? aɪ dʒʌst ɡɒt ə ˈpɑːrkɪŋ ˈtɪkɪt!/", "pt": "Adivinha? Levei uma multa!"}, {"speaker": "B", "name": "Jake", "en": "Oh, that's just wonderful. How much?", "ph": "/oʊ, ðæts dʒʌst ˈwʌndərfəl/ (sarcástico)", "pt": "Ah, que maravilha. (sarcasmo) Quanto?"}, {"speaker": "A", "name": "Tom", "en": "Two hundred dollars! And the meter was only five minutes expired!", "ph": "/tuː ˈhʌndrəd ˈdɒlərz!/", "pt": "Duzentos dólares! E faltavam só 5 minutos!"}, {"speaker": "B", "name": "Jake", "en": "Well, that's life in the big city. Tell me about it — I got two last month.", "ph": "/wel, ðæts laɪf. tel miː əˈbaʊt ɪt/", "pt": "Bem, é a vida na cidade grande. Nem me fale — levei duas mês passado."}, {"speaker": "A", "name": "Tom", "en": "You're kidding! Maybe we should just take the bus.", "ph": "/jʊr ˈkɪdɪŋ!/", "pt": "Tá brincando! Talvez devêssemos pegar o ônibus."}, {"speaker": "B", "name": "Jake", "en": "Yeah, right. You, on a bus? I'm dead serious — that would be hilarious to see.", "ph": "/jɛə raɪt. juː, ɒn ə bʌs?/ (sarcástico)", "pt": "Sei. Você, no ônibus? Tô falando sério — seria hilário ver."}, {"speaker": "A", "name": "Tom", "en": "Hey! I'm just pulling your leg. I actually love public transportation.", "ph": "/aɪm dʒʌst ˈpʊlɪŋ jʊr leɡ/", "pt": "Ei! Tô zoando. Eu amo transporte público."}, {"speaker": "B", "name": "Jake", "en": "Sure you do. And I'm the Queen of England.", "ph": "/ʃʊr juː duː/ (irônico)", "pt": "Claro que ama. E eu sou a Rainha da Inglaterra. (ironia)"}], "reading": {"title": "📖 Understanding Humor Across Cultures", "text": "Humor varies enormously across cultures, and understanding it is a sign of deep language proficiency. American humor tends to be direct and observational — think stand-up comedy where comedians point out absurdities in everyday life. British humor is often more subtle, relying on understatement, irony, and self-deprecation. A British person might say 'Not bad' when something is actually excellent, or 'That's rather unfortunate' about a complete disaster. Australian humor is similar to British but more irreverent, often involving friendly insults between friends (called 'banter'). In all English-speaking cultures, sarcasm plays a big role. The key to understanding sarcasm is context and tone. If someone says 'Oh, brilliant!' after you drop a plate, they're being sarcastic. If they say it after you solve a problem, they're genuine. When in doubt, pay attention to facial expressions and tone of voice. And remember: laughing at yourself is universally appreciated!", "questions": [{"q": "British humor relies on:", "opts": ["Slapstick", "Understatement and irony", "Loud jokes", "Insults"], "answer": 1}, {"q": "'Not bad' in British English often means:", "opts": ["Terrible", "Average", "Actually excellent", "Nothing"], "answer": 2}, {"q": "Understanding humor shows:", "opts": ["You watch TV", "Deep language proficiency", "You're funny", "Nothing"], "answer": 1}]}, "writing": {"prompt": "✍️ Escreva um diálogo humorístico entre dois amigos (8+ frases). Use sarcasmo, expressões idiomáticas e humor natural!\n\n💡 Use: You're kidding, No way!, pulling your leg, hilarious, yeah right, tell me about it, dead serious", "keywords": ["kidding", "no way", "pulling", "leg", "hilarious", "yeah right", "tell me about it", "dead serious", "sarcasm", "joke", "funny", "tongue"]}, "speaking": [{"phrase": "You're kidding, right? That's hilarious!", "phonetic": "/jʊr ˈkɪdɪŋ, raɪt? ðæts hɪˈlɛriəs!/", "translation": "Tá brincando, né? Hilário!"}, {"phrase": "I'm just pulling your leg! Relax!", "phonetic": "/aɪm dʒʌst ˈpʊlɪŋ jʊr leɡ/", "translation": "Tô só zoando! Relaxa!"}, {"phrase": "Oh, that's just wonderful. (sarcasm)", "phonetic": "/oʊ, ðæts dʒʌst ˈwʌndərfəl/", "translation": "Ah, que maravilha. (sarcasmo)"}, {"phrase": "Tell me about it! I deal with that every day.", "phonetic": "/tel miː əˈbaʊt ɪt/", "translation": "Nem me fale! Lido com isso todo dia."}], "quiz": [{"type": "choice", "q": "'I'm pulling your leg' =", "opts": ["Puxando sua perna", "Brincando/zuando", "Mentindo", "Ajudando"], "answer": 1}, {"type": "fill", "q": "You're ___, right? (brincando)", "answer": "kidding"}, {"type": "choice", "q": "'Yeah, right' com sarcasmo =", "opts": ["Sim, correto", "Concordo", "Não acredito/Sei...", "Obrigado"], "answer": 2}, {"type": "fill", "q": "That's ___! (hilário)", "answer": "hilarious"}, {"type": "choice", "q": "British understatement: 'Not bad' often means:", "opts": ["Ruim", "Médio", "Excelente", "Terrível"], "answer": 2}]}, {"id": 37, "module": "Módulo 13: Conversação Avançada II", "moduleIcon": "🔥", "title": "Conflict Resolution & Diplomacy", "titlePt": "Resolução de Conflitos e Diplomacia", "teacher": {"name": "👨‍🏫 Coach Robert", "tip": "Resolver conflitos em inglês com elegância é ARTE! <b>Regra:</b> Sempre comece reconhecendo o sentimento do outro: 'I understand how you feel.' Depois apresente sua perspectiva: 'From my point of view...' <b>Mairo Vergara:</b> Pratique 'I statements': 'I feel... when... because...' em vez de 'You always...'. <b>Carina Fragozo:</b> Mantenha tom calmo e firme — nem agressivo, nem submisso.", "method": "🔑 I-Statements + Active Listening + De-escalation"}, "vocab": [{"word": "I understand how you feel", "phonetic": "/aɪ ˌʌndərˈstænd haʊ juː fiːl/", "trans": "Entendo como se sente", "example": "I understand how you feel, and I want to help."}, {"word": "Let's find a solution together", "phonetic": "/lets faɪnd ə səˈluːʃən təˈɡeðər/", "trans": "Vamos encontrar uma solução juntos", "example": "Let's find a solution together."}, {"word": "I didn't mean to offend", "phonetic": "/aɪ ˈdɪdnt miːn tə əˈfend/", "trans": "Não quis ofender", "example": "I didn't mean to offend you. I apologize."}, {"word": "From my perspective", "phonetic": "/frəm maɪ pərˈspektɪv/", "trans": "Na minha perspectiva", "example": "From my perspective, the issue is communication."}, {"word": "Can we start over?", "phonetic": "/kæn wiː stɑːrt ˈoʊvər/", "trans": "Podemos recomeçar?", "example": "I think there's been a misunderstanding. Can we start over?"}, {"word": "Misunderstanding", "phonetic": "/ˌmɪsʌndərˈstændɪŋ/", "trans": "Mal-entendido", "example": "This is just a misunderstanding."}, {"word": "I take responsibility", "phonetic": "/aɪ teɪk rɪˌspɒnsəˈbɪləti/", "trans": "Assumo a responsabilidade", "example": "I take responsibility for my mistake."}, {"word": "How can we move forward?", "phonetic": "/haʊ kæn wiː muːv ˈfɔːrwərd/", "trans": "Como podemos seguir em frente?", "example": "How can we move forward from this?"}, {"word": "I appreciate your honesty", "phonetic": "/aɪ əˈpriːʃieɪt jʊr ˈɒnɪsti/", "trans": "Agradeço sua honestidade", "example": "I appreciate your honesty about this."}, {"word": "Common ground", "phonetic": "/ˈkɒmən ɡraʊnd/", "trans": "Ponto em comum", "example": "Let's focus on finding common ground."}], "grammar": {"title": "I-Statements & De-escalation Language", "explanation": "<b>I-Statements:</b> 'I feel [emoção] when [situação] because [razão].' Evita acusar. <b>De-escalation:</b> Reconheça → Valide → Redirecione. <b>Evite:</b> 'You always...', 'You never...', 'It's your fault.'", "table": [["Agressivo", "Diplomático", "", ""], ["You always do this!", "I feel frustrated when this happens.", "", ""], ["It's your fault.", "I think there may have been a misunderstanding.", "", ""], ["You're wrong.", "I see it differently. Can I share my perspective?", "", ""], ["I don't care.", "I understand your concern. Let's discuss this.", "", ""]], "examples": [{"en": "I feel concerned when deadlines are missed because it affects the whole team.", "ph": "/aɪ fiːl kənˈsɜːrnd wen ˈdedlaɪnz ɑːr mɪst/", "pt": "Fico preocupado quando prazos são perdidos pois afeta toda a equipe."}, {"en": "I appreciate you bringing this up. How can we prevent it from happening again?", "ph": "/aɪ əˈpriːʃieɪt juː ˈbrɪŋɪŋ ðɪs ʌp/", "pt": "Agradeço por trazer isso. Como podemos evitar que aconteça de novo?"}], "tip": "⚡ <b>Regra 24 horas:</b> Se estiver com raiva, espere 24 horas antes de responder. Responder com emoção quase sempre piora a situação."}, "dialogue": [{"speaker": "A", "name": "Manager", "en": "I've noticed some tension between you and the design team. Can we talk about it?", "ph": "/aɪv ˈnoʊtɪst sʌm ˈtenʃən/", "pt": "Notei tensão entre você e a equipe de design. Podemos conversar?"}, {"speaker": "B", "name": "Employee", "en": "To be honest, I feel frustrated because my ideas are often dismissed without discussion.", "ph": "/tə biː ˈɒnɪst, aɪ fiːl ˈfrʌstreɪtɪd/", "pt": "Para ser honesto, me sinto frustrado pois minhas ideias são ignoradas."}, {"speaker": "A", "name": "Manager", "en": "I understand how you feel, and I appreciate your honesty. From my perspective, the design team may not realize they're doing this.", "ph": "/aɪ ˌʌndərˈstænd haʊ juː fiːl/", "pt": "Entendo como se sente e agradeço a honestidade. Na minha perspectiva, a equipe pode não perceber."}, {"speaker": "B", "name": "Employee", "en": "Maybe it's just a misunderstanding. I didn't mean to create conflict.", "ph": "/ˈmeɪbi ɪts dʒʌst ə ˌmɪsʌndərˈstændɪŋ/", "pt": "Talvez seja um mal-entendido. Não quis criar conflito."}, {"speaker": "A", "name": "Manager", "en": "Not at all. Let's find a solution together. How about a weekly brainstorm where everyone shares ideas equally?", "ph": "/nɒt æt ɔːl. lets faɪnd ə səˈluːʃən/", "pt": "De forma alguma. Vamos encontrar uma solução juntos."}, {"speaker": "B", "name": "Employee", "en": "That sounds great. I think finding common ground will really help the team.", "ph": "/ðæt saʊndz ɡreɪt. ˈkɒmən ɡraʊnd/", "pt": "Parece ótimo. Acho que encontrar um ponto em comum vai ajudar."}], "reading": {"title": "📖 The Art of Resolving Conflicts", "text": "Conflict is inevitable in any workplace or relationship, but how you handle it makes all the difference. Research shows that unresolved conflicts cost companies billions in lost productivity. The most effective approach is collaborative problem-solving. Start by listening actively — don't interrupt, and show you understand by paraphrasing: 'So what you're saying is...' Use I-statements instead of accusations. Focus on the problem, not the person. Look for common ground and shared goals. Be willing to apologize sincerely when you're wrong: 'I take responsibility for my part in this.' And always focus on the future: 'How can we move forward?' Remember: the goal is not to win the argument, but to strengthen the relationship.", "questions": [{"q": "Unresolved conflicts cost:", "opts": ["Nothing", "Time only", "Billions in productivity", "Just feelings"], "answer": 2}, {"q": "You should focus on:", "opts": ["The person", "Winning", "The problem", "Being right"], "answer": 2}, {"q": "When you're wrong, you should:", "opts": ["Deny it", "Blame others", "Apologize sincerely", "Ignore it"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva um diálogo resolvendo um conflito no trabalho (8+ frases). Use I-statements, reconheça sentimentos e busque solução conjunta!\n\n💡 Use: I understand, I feel, from my perspective, misunderstanding, common ground, move forward, I appreciate, solution together", "keywords": ["understand", "feel", "perspective", "misunderstanding", "common ground", "move forward", "appreciate", "solution", "together", "responsibility", "apologize", "concern"]}, "speaking": [{"phrase": "I understand how you feel, and I want to help.", "phonetic": "/aɪ ˌʌndərˈstænd haʊ juː fiːl/", "translation": "Entendo como se sente e quero ajudar."}, {"phrase": "I didn't mean to offend you. I apologize.", "phonetic": "/aɪ ˈdɪdnt miːn tə əˈfend/", "translation": "Não quis ofender. Me desculpe."}, {"phrase": "Let's focus on finding common ground.", "phonetic": "/lets ˈfoʊkəs ɒn ˈfaɪndɪŋ ˈkɒmən ɡraʊnd/", "translation": "Vamos focar em encontrar pontos em comum."}, {"phrase": "How can we move forward from this?", "phonetic": "/haʊ kæn wiː muːv ˈfɔːrwərd/", "translation": "Como podemos seguir em frente?"}], "quiz": [{"type": "choice", "q": "I-Statement correto:", "opts": ["You always mess up!", "I feel frustrated when deadlines are missed.", "It's your fault.", "You're so annoying."], "answer": 1}, {"type": "fill", "q": "Let's find ___ ground. (em comum)", "answer": "common"}, {"type": "choice", "q": "De-escalation começa com:", "opts": ["Acusar", "Gritar", "Reconhecer o sentimento", "Ignorar"], "answer": 2}, {"type": "fill", "q": "I take ___ for my mistake.", "answer": "responsibility"}, {"type": "choice", "q": "'Can we start over?' =", "opts": ["Podemos parar?", "Podemos recomeçar?", "Podemos sair?", "Podemos esquecer?"], "answer": 1}]}, {"id": 38, "module": "Módulo 13: Conversação Avançada II", "moduleIcon": "🔥", "title": "Advanced Networking & Social Events", "titlePt": "Networking Avançado e Eventos", "teacher": {"name": "👩‍🏫 Coach Lauren", "tip": "Networking é sobre CONSTRUIR RELAÇÕES, não colecionar cartões! <b>Mairo Vergara:</b> A fórmula é: 1) Pergunta genuína, 2) Escuta ativa, 3) Ofereça valor. <b>Carina Fragozo:</b> 'Entrepreneur' = /ˌɒntrəprəˈnɜːr/ — é uma das palavras mais malpronunciadas!", "method": "🔑 Value-First Networking + Elevator Pitch"}, "vocab": [{"word": "Elevator pitch", "phonetic": "/ˈelɪveɪtər pɪtʃ/", "trans": "Apresentação rápida", "example": "My elevator pitch is 30 seconds."}, {"word": "What brings you here?", "phonetic": "/wɒt brɪŋz juː hɪr/", "trans": "O que te traz aqui?", "example": "So, what brings you here today?"}, {"word": "I specialize in", "phonetic": "/aɪ ˈspeʃəlaɪz ɪn/", "trans": "Sou especialista em", "example": "I specialize in IT infrastructure."}, {"word": "Let me introduce you to", "phonetic": "/let miː ˌɪntrəˈdjuːs/", "trans": "Deixe-me apresentá-lo a", "example": "Let me introduce you to my colleague."}, {"word": "We should connect on LinkedIn", "phonetic": "/wiː ʃʊd kəˈnekt/", "trans": "Devemos conectar no LinkedIn", "example": "We should definitely connect on LinkedIn."}, {"word": "I'd love to pick your brain", "phonetic": "/aɪd lʌv tə pɪk jʊr breɪn/", "trans": "Adoraria trocar ideias", "example": "I'd love to pick your brain about AI."}, {"word": "How did you get into", "phonetic": "/haʊ dɪd juː ɡet ˈɪntə/", "trans": "Como entrou em", "example": "How did you get into this field?"}, {"word": "It was a pleasure meeting you", "phonetic": "/ɪt wɒz ə ˈpleʒər ˈmiːtɪŋ/", "trans": "Foi um prazer conhecê-lo", "example": "It was a real pleasure meeting you."}, {"word": "Follow up", "phonetic": "/ˈfɒloʊ ʌp/", "trans": "Dar continuidade", "example": "I'll follow up with an email."}, {"word": "Entrepreneur", "phonetic": "/ˌɒntrəprəˈnɜːr/", "trans": "Empreendedor", "example": "She's a successful entrepreneur."}], "grammar": {"title": "Elevator Pitch & Professional Introductions", "explanation": "Um <b>elevator pitch</b> tem 3 partes: 1) Quem você é, 2) O que faz, 3) O que te diferencia. Máximo 30 segundos. Para networking: pergunte mais do que fale, ofereça valor antes de pedir.", "table": [["Expressão", "Uso", "", ""]], "examples": [{"en": "This is essential for advanced networking & social events.", "ph": "/ðɪs ɪz ɪˈsenʃəl/", "pt": "Isso é essencial para networking avançado e eventos."}], "tip": "⚡ <b>Follow-up é TUDO:</b> Envie uma mensagem em até 24h: 'It was great meeting you at [evento]. I'd love to continue our conversation about [tópico].'"}, "dialogue": [{"speaker": "A", "name": "Person1", "en": "Let's discuss networking.", "ph": "/lets dɪˈskʌs/", "pt": "Vamos discutir networking."}, {"speaker": "B", "name": "Person2", "en": "That's a fascinating topic. I've been thinking about it a lot lately.", "ph": "/ðæts ə ˈfæsɪneɪtɪŋ ˈtɒpɪk/", "pt": "Tópico fascinante. Tenho pensado muito nisso."}, {"speaker": "A", "name": "Person1", "en": "What do you make of the recent developments in networking?", "ph": "/wɒt duː juː meɪk əv/", "pt": "O que acha dos desenvolvimentos recentes?"}, {"speaker": "B", "name": "Person2", "en": "It's a matter of perspective, really. There are compelling arguments on both sides.", "ph": "/ɪts ə ˈmætər əv pərˈspektɪv/", "pt": "É questão de perspectiva. Há argumentos dos dois lados."}], "reading": {"title": "📖 Professional Networking", "text": "This is a deep exploration of professional networking. Experts from various fields have contributed their insights on this important subject. The topic continues to evolve as new research emerges and society adapts to changing circumstances. Understanding different perspectives is crucial for meaningful discussion. Whether you agree or disagree with the prevailing views, engaging thoughtfully with the material will enhance your critical thinking skills and your ability to articulate complex ideas in English.", "questions": [{"q": "The main topic is:", "opts": ["Math", "Science", "Professional Networking", "History"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva sobre Networking Avançado e Eventos em inglês (8+ frases). Dê sua opinião com argumentos!", "keywords": ["elevator", "what", "i", "let", "we", "i'd", "how", "it"]}, "speaking": [{"phrase": "My elevator pitch is 30 seconds.", "phonetic": "/ˈelɪveɪtər pɪtʃ/", "translation": "Apresentação rápida"}, {"phrase": "So, what brings you here today?", "phonetic": "/wɒt brɪŋz juː hɪr/", "translation": "O que te traz aqui?"}], "quiz": [{"type": "choice", "q": "Esta aula é sobre:", "opts": ["Grammar", "Vocabulary", "Advanced Networking & Social Events", "Writing"], "answer": 2}, {"type": "fill", "q": "Complete: This is about ___.", "answer": "Advanced"}]}, {"id": 39, "module": "Módulo 13: Conversação Avançada II", "moduleIcon": "🔥", "title": "Technology & Innovation Conversations", "titlePt": "Conversando sobre Tecnologia e Inovação", "teacher": {"name": "👨‍🏫 Coach Daniel", "tip": "Falar sobre tecnologia em inglês é ESSENCIAL na era digital! <b>Mairo Vergara:</b> Leia TechCrunch, Wired e The Verge em inglês. <b>Carina Fragozo:</b> 'Algorithm' = /ˈælɡərɪðəm/ — NÃO 'algorítimo'. E 'data' pode ser /ˈdeɪtə/ (US) ou /ˈdɑːtə/ (UK).", "method": "🔑 Tech Vocabulary + Future Predictions"}, "vocab": [{"word": "Artificial Intelligence", "phonetic": "/ˌɑːrtɪˈfɪʃəl ɪnˈtelɪdʒəns/", "trans": "Inteligência Artificial", "example": "AI is transforming everything."}, {"word": "Algorithm", "phonetic": "/ˈælɡərɪðəm/", "trans": "Algoritmo", "example": "The algorithm learns from data."}, {"word": "Cloud computing", "phonetic": "/klaʊd kəmˈpjuːtɪŋ/", "trans": "Computação em nuvem", "example": "We migrated to cloud computing."}, {"word": "Cybersecurity", "phonetic": "/ˌsaɪbərsɪˈkjʊrəti/", "trans": "Cibersegurança", "example": "Cybersecurity is a growing concern."}, {"word": "Disruptive", "phonetic": "/dɪsˈrʌptɪv/", "trans": "Disruptivo", "example": "A disruptive technology."}, {"word": "Scalable", "phonetic": "/ˈskeɪləbəl/", "trans": "Escalável", "example": "Is this solution scalable?"}, {"word": "Cutting-edge", "phonetic": "/ˈkʌtɪŋ edʒ/", "trans": "De ponta", "example": "Cutting-edge technology."}, {"word": "Automation", "phonetic": "/ˌɔːtəˈmeɪʃən/", "trans": "Automação", "example": "Automation is replacing jobs."}, {"word": "Blockchain", "phonetic": "/ˈblɒktʃeɪn/", "trans": "Blockchain", "example": "Blockchain ensures transparency."}, {"word": "Machine learning", "phonetic": "/məˈʃiːn ˈlɜːrnɪŋ/", "trans": "Aprendizado de máquina", "example": "Machine learning is a subset of AI."}], "grammar": {"title": "Discussing Technology Trends & Making Predictions", "explanation": "Para falar sobre tendências: <b>is set to</b> (está prestes a), <b>is poised to</b> (está posicionado para), <b>is likely to</b> (provavelmente vai). Para especular: <b>In the near future</b>, <b>Within the next decade</b>.", "table": [["Expressão", "Uso", "", ""]], "examples": [{"en": "This is essential for technology & innovation conversations.", "ph": "/ðɪs ɪz ɪˈsenʃəl/", "pt": "Isso é essencial para conversando sobre tecnologia e inovação."}], "tip": "⚡ <b>Dica de TI:</b> 'Deploy' = implantar, 'Debug' = depurar, 'Scalable' = escalável, 'Downtime' = tempo fora do ar. Essas palavras impressionam em reuniões técnicas!"}, "dialogue": [{"speaker": "A", "name": "Person1", "en": "Let's discuss technology.", "ph": "/lets dɪˈskʌs/", "pt": "Vamos discutir technology."}, {"speaker": "B", "name": "Person2", "en": "That's a fascinating topic. I've been thinking about it a lot lately.", "ph": "/ðæts ə ˈfæsɪneɪtɪŋ ˈtɒpɪk/", "pt": "Tópico fascinante. Tenho pensado muito nisso."}, {"speaker": "A", "name": "Person1", "en": "What do you make of the recent developments in technology?", "ph": "/wɒt duː juː meɪk əv/", "pt": "O que acha dos desenvolvimentos recentes?"}, {"speaker": "B", "name": "Person2", "en": "It's a matter of perspective, really. There are compelling arguments on both sides.", "ph": "/ɪts ə ˈmætər əv pərˈspektɪv/", "pt": "É questão de perspectiva. Há argumentos dos dois lados."}], "reading": {"title": "📖 The Future of Technology", "text": "This is a deep exploration of the future of technology. Experts from various fields have contributed their insights on this important subject. The topic continues to evolve as new research emerges and society adapts to changing circumstances. Understanding different perspectives is crucial for meaningful discussion. Whether you agree or disagree with the prevailing views, engaging thoughtfully with the material will enhance your critical thinking skills and your ability to articulate complex ideas in English.", "questions": [{"q": "The main topic is:", "opts": ["Math", "Science", "The Future of Technology", "History"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva sobre Conversando sobre Tecnologia e Inovação em inglês (8+ frases). Dê sua opinião com argumentos!", "keywords": ["artificial", "algorithm", "cloud", "cybersecurity", "disruptive", "scalable", "cutting-edge", "automation"]}, "speaking": [{"phrase": "AI is transforming everything.", "phonetic": "/ˌɑːrtɪˈfɪʃəl ɪnˈtelɪdʒəns/", "translation": "Inteligência Artificial"}, {"phrase": "The algorithm learns from data.", "phonetic": "/ˈælɡərɪðəm/", "translation": "Algoritmo"}], "quiz": [{"type": "choice", "q": "Esta aula é sobre:", "opts": ["Grammar", "Vocabulary", "Technology & Innovation Conversations", "Writing"], "answer": 2}, {"type": "fill", "q": "Complete: This is about ___.", "answer": "Technology"}]}, {"id": 40, "module": "Módulo 13: Conversação Avançada II", "moduleIcon": "🔥", "title": "Philosophical & Deep Discussions", "titlePt": "Discussões Filosóficas e Profundas", "teacher": {"name": "👩‍🏫 Coach Athena", "tip": "Discussões profundas em inglês são o ÁPICE da fluência! <b>Mairo Vergara:</b> Assista debates filosóficos e podcasts como 'Lex Fridman' ou 'Philosophy Tube'. <b>Carina Fragozo:</b> 'Consciousness' = /ˈkɒnʃəsnəs/ — cuidado com as sílabas! <b>Dica:</b> Use 'I wonder if...', 'What do you make of...?' e 'That raises an interesting question...' para elevar a conversa.", "method": "🔑 Abstract Thinking in English + Socratic Questions"}, "vocab": [{"word": "I wonder if", "phonetic": "/aɪ ˈwʌndər ɪf/", "trans": "Me pergunto se", "example": "I wonder if happiness is a choice."}, {"word": "What do you make of", "phonetic": "/wɒt duː juː meɪk əv/", "trans": "O que acha de", "example": "What do you make of this situation?"}, {"word": "That raises a question", "phonetic": "/ðæt ˈreɪzɪz ə ˈkwestʃən/", "trans": "Isso levanta uma questão", "example": "That raises an interesting question."}, {"word": "It's a matter of perspective", "phonetic": "/ɪts ə ˈmætər əv pərˈspektɪv/", "trans": "É questão de perspectiva", "example": "It's a matter of perspective, really."}, {"word": "Food for thought", "phonetic": "/fuːd fɔːr θɔːt/", "trans": "Para refletir", "example": "That's real food for thought."}, {"word": "The bigger picture", "phonetic": "/ðə ˈbɪɡər ˈpɪktʃər/", "trans": "O quadro geral", "example": "Let's look at the bigger picture."}, {"word": "Consciousness", "phonetic": "/ˈkɒnʃəsnəs/", "trans": "Consciência", "example": "What is consciousness?"}, {"word": "Moral dilemma", "phonetic": "/ˈmɒrəl dɪˈlemə/", "trans": "Dilema moral", "example": "That's a real moral dilemma."}, {"word": "Subjective", "phonetic": "/səbˈdʒektɪv/", "trans": "Subjetivo", "example": "Beauty is subjective."}, {"word": "Thought-provoking", "phonetic": "/θɔːt prəˈvoʊkɪŋ/", "trans": "Instigante", "example": "A thought-provoking conversation."}], "grammar": {"title": "Expressing Abstract Ideas & Asking Deep Questions", "explanation": "Para discussões profundas: <b>I wonder if/whether...</b>, <b>What if...?</b>, <b>It depends on how you define...</b>, <b>That's a matter of perspective</b>. Perguntas socráticas: <b>What do you mean by...?</b>, <b>How would you define...?</b>", "table": [["Expressão", "Uso", "", ""]], "examples": [{"en": "This is essential for philosophical & deep discussions.", "ph": "/ðɪs ɪz ɪˈsenʃəl/", "pt": "Isso é essencial para discussões filosóficas e profundas."}], "tip": "⚡ <b>Dica:</b> Em discussões filosóficas, não há resposta 'certa'. O objetivo é EXPLORAR ideias. Use: 'That's thought-provoking', 'I hadn't considered that', 'You make a compelling point.'"}, "dialogue": [{"speaker": "A", "name": "Person1", "en": "Let's discuss philosophy.", "ph": "/lets dɪˈskʌs/", "pt": "Vamos discutir philosophy."}, {"speaker": "B", "name": "Person2", "en": "That's a fascinating topic. I've been thinking about it a lot lately.", "ph": "/ðæts ə ˈfæsɪneɪtɪŋ ˈtɒpɪk/", "pt": "Tópico fascinante. Tenho pensado muito nisso."}, {"speaker": "A", "name": "Person1", "en": "What do you make of the recent developments in philosophy?", "ph": "/wɒt duː juː meɪk əv/", "pt": "O que acha dos desenvolvimentos recentes?"}, {"speaker": "B", "name": "Person2", "en": "It's a matter of perspective, really. There are compelling arguments on both sides.", "ph": "/ɪts ə ˈmætər əv pərˈspektɪv/", "pt": "É questão de perspectiva. Há argumentos dos dois lados."}], "reading": {"title": "📖 The Nature of Happiness", "text": "This is a deep exploration of the nature of happiness. Experts from various fields have contributed their insights on this important subject. The topic continues to evolve as new research emerges and society adapts to changing circumstances. Understanding different perspectives is crucial for meaningful discussion. Whether you agree or disagree with the prevailing views, engaging thoughtfully with the material will enhance your critical thinking skills and your ability to articulate complex ideas in English.", "questions": [{"q": "The main topic is:", "opts": ["Math", "Science", "The Nature of Happiness", "History"], "answer": 2}]}, "writing": {"prompt": "✍️ Escreva sobre Discussões Filosóficas e Profundas em inglês (8+ frases). Dê sua opinião com argumentos!", "keywords": ["i", "what", "that", "it's", "food", "the", "consciousness", "moral"]}, "speaking": [{"phrase": "I wonder if happiness is a choice.", "phonetic": "/aɪ ˈwʌndər ɪf/", "translation": "Me pergunto se"}, {"phrase": "What do you make of this situation?", "phonetic": "/wɒt duː juː meɪk əv/", "translation": "O que acha de"}], "quiz": [{"type": "choice", "q": "Esta aula é sobre:", "opts": ["Grammar", "Vocabulary", "Philosophical & Deep Discussions", "Writing"], "answer": 2}, {"type": "fill", "q": "Complete: This is about ___.", "answer": "Philosophical"}]},{"id": 41, "module": "Módulo 14: Debate Estruturado", "moduleIcon": "⚔️", "title": "Building Strong Arguments", "titlePt": "Construindo Argumentos Sólidos", "teacher": {"name": "👨‍🏫 Debate Coach Marcus", "tip": "Todo grande debatedor domina a estrutura <b>PEEL</b>: Point (afirmação) → Explain (explique) → Evidence (evidência) → Link (conecte ao tema). <b>Mairo Vergara:</b> Assista debates da Oxford Union e do Intelligence Squared no YouTube — são masterclasses de argumentação. <b>Carina Fragozo:</b> 'Argument' em inglês NÃO é briga — é ARGUMENTO lógico. /ˈɑːrɡjumənt/. E 'evidence' = /ˈevɪdəns/, não 'evidência'.", "method": "🔑 PEEL Structure + Claim-Warrant-Impact"}, "vocab": [{"word": "I firmly believe", "phonetic": "/aɪ ˈfɜːrmli bɪˈliːv/", "trans": "Acredito firmemente", "example": "I firmly believe that education is a fundamental right. /aɪ ˈfɜːrmli bɪˈliːv/"}, {"word": "The evidence suggests", "phonetic": "/ðə ˈevɪdəns səˈdʒests/", "trans": "As evidências sugerem", "example": "The evidence suggests a strong correlation between exercise and mental health."}, {"word": "It is undeniable that", "phonetic": "/ɪt ɪz ˌʌndɪˈnaɪəbəl ðæt/", "trans": "É inegável que", "example": "It is undeniable that technology has changed how we communicate."}, {"word": "This is supported by", "phonetic": "/ðɪs ɪz səˈpɔːrtɪd baɪ/", "trans": "Isso é apoiado por", "example": "This is supported by research from Harvard University."}, {"word": "A compelling case", "phonetic": "/ə kəmˈpelɪŋ keɪs/", "trans": "Um argumento convincente", "example": "There is a compelling case for renewable energy."}, {"word": "Counterargument", "phonetic": "/ˈkaʊntərˌɑːrɡjumənt/", "trans": "Contra-argumento", "example": "Let me address the main counterargument. /ˈkaʊntərˌɑːrɡjumənt/"}, {"word": "Fallacy", "phonetic": "/ˈfæləsi/", "trans": "Falácia", "example": "That's a logical fallacy known as a straw man. /ˈfæləsi/"}, {"word": "Premise", "phonetic": "/ˈpremɪs/", "trans": "Premissa", "example": "The premise of their argument is flawed. /ðə ˈpremɪs/"}, {"word": "Substantiate", "phonetic": "/səbˈstænʃieɪt/", "trans": "Fundamentar/Comprovar", "example": "Can you substantiate that claim with data?"}, {"word": "The crux of the matter", "phonetic": "/ðə krʌks əv ðə ˈmætər/", "trans": "O cerne da questão", "example": "The crux of the matter is funding. /ðə krʌks/"}], "grammar": {"title": "Argument Structure: PEEL + Claim-Warrant-Impact", "explanation": "<b>PEEL:</b> Point (faça a afirmação), Explain (explique o raciocínio), Evidence (apresente provas), Link (conecte ao tema). <b>Claim-Warrant-Impact:</b> Claim (o que você afirma), Warrant (por que é verdade), Impact (qual o efeito/consequência). Essas estruturas garantem argumentos SÓLIDOS e persuasivos.", "table": [["Componente", "Função", "Exemplo", ""], ["Point/Claim", "Sua afirmação", "Remote work increases productivity.", ""], ["Explain/Warrant", "Por quê?", "Employees save commuting time and work in comfortable environments.", ""], ["Evidence", "Prova", "A Stanford study found a 13% performance increase.", ""], ["Link/Impact", "Consequência", "Therefore, companies should adopt flexible work policies.", ""]], "examples": [{"en": "I firmly believe that learning a second language should be mandatory in schools. Research from MIT shows that bilingual children develop stronger problem-solving skills. Therefore, investing in language education benefits society as a whole.", "ph": "/aɪ ˈfɜːrmli bɪˈliːv/", "pt": "Acredito firmemente que aprender um segundo idioma deveria ser obrigatório."}, {"en": "While my opponent argues that AI will eliminate jobs, the evidence suggests otherwise. According to the World Economic Forum, AI will create 97 million new jobs by 2025.", "ph": "/waɪl maɪ əˈpoʊnənt ˈɑːrɡjuːz/", "pt": "Embora meu oponente argumente que IA eliminará empregos, as evidências sugerem o contrário."}, {"en": "The crux of the matter is not whether technology is good or bad, but how we choose to use it.", "ph": "/ðə krʌks əv ðə ˈmætər/", "pt": "O cerne da questão não é se tecnologia é boa ou ruim, mas como escolhemos usá-la."}], "tip": "⚡ <b>Regra dos 3:</b> Sempre apresente TRÊS argumentos. Menos parece fraco, mais perde o foco. 'There are three key reasons why...' é a estrutura mais persuasiva!"}, "dialogue": [{"speaker": "A", "name": "Debater1", "en": "I firmly believe that social media does more harm than good. Let me present three key reasons.", "ph": "/aɪ ˈfɜːrmli bɪˈliːv ðæt ˈsoʊʃəl ˈmiːdiə/", "pt": "Acredito firmemente que redes sociais fazem mais mal que bem."}, {"speaker": "A", "name": "Debater1", "en": "First, the evidence suggests that excessive social media use is linked to anxiety and depression, particularly among teenagers. A study published in JAMA found that teens who spend more than three hours daily on social media have double the risk of mental health issues.", "ph": "/fɜːrst, ðə ˈevɪdəns səˈdʒests/", "pt": "Primeiro, evidências sugerem que uso excessivo está ligado a ansiedade e depressão."}, {"speaker": "A", "name": "Debater1", "en": "Second, social media platforms spread misinformation at an alarming rate. This is supported by research from MIT, which found that false news spreads six times faster than true news.", "ph": "/ˈsekənd, ˈsoʊʃəl ˈmiːdiə ˈplætfɔːrmz/", "pt": "Segundo, plataformas espalham desinformação a uma taxa alarmante."}, {"speaker": "A", "name": "Debater1", "en": "Third, it is undeniable that social media creates addiction by design. The algorithms are specifically engineered to maximize engagement, not well-being.", "ph": "/θɜːrd, ɪt ɪz ˌʌndɪˈnaɪəbəl/", "pt": "Terceiro, é inegável que redes sociais criam vício por design."}, {"speaker": "A", "name": "Debater1", "en": "Therefore, the crux of the matter is clear: while social media has some benefits, the overwhelming evidence shows that its negative impacts on mental health, truth, and human attention outweigh the positives.", "ph": "/ˈðɛrfɔːr, ðə krʌks/", "pt": "Portanto, o cerne é claro: os impactos negativos superam os positivos."}, {"speaker": "B", "name": "Debater2", "en": "That's a compelling case. However, I'd like to address each point. Regarding mental health, correlation does not equal causation...", "ph": "/ðæts ə kəmˈpelɪŋ keɪs. haʊˈevər/", "pt": "Argumento convincente. Porém, gostaria de abordar cada ponto..."}], "reading": {"title": "📖 The Anatomy of a Strong Argument", "text": "What separates a strong argument from a weak one? The answer lies in structure, evidence, and logic. A strong argument begins with a clear claim — a statement that can be debated. It then provides reasoning (the 'why') and evidence (the 'proof'). Evidence can include statistics, expert opinions, case studies, and real-world examples. The strongest arguments also anticipate counterarguments and address them proactively. This is called 'steel-manning' — presenting the opposing view in its strongest form before refuting it. Common logical fallacies to avoid include: ad hominem (attacking the person instead of the argument), straw man (misrepresenting the opponent's position), appeal to emotion (using feelings instead of facts), and false dichotomy (presenting only two options when more exist). Remember: a good debater doesn't just state opinions — they build a logical case that is difficult to dismantle.", "questions": [{"q": "A strong argument needs:", "opts": ["Just opinion", "Claim + reasoning + evidence", "Only emotions", "Just volume"], "answer": 1}, {"q": "'Steel-manning' means:", "opts": ["Being strong", "Presenting opponent's best argument then refuting", "Using steel metaphors", "Ignoring opponents"], "answer": 1}, {"q": "Ad hominem is:", "opts": ["A compliment", "Attacking the person not argument", "A logical structure", "A debate format"], "answer": 1}, {"q": "False dichotomy presents:", "opts": ["Many options", "Only two options when more exist", "No options", "The best option"], "answer": 1}]}, "writing": {"prompt": "✍️ DEBATE EXERCISE: Escolha um lado e construa um argumento PEEL completo (8+ frases):\n\n🔴 TEMA: 'Should English be the mandatory global language?'\n\n💡 Estrutura: 1) Claim, 2) Three reasons with evidence, 3) Address one counterargument, 4) Conclusion\n\nUse: I firmly believe, The evidence suggests, This is supported by, The crux of the matter", "keywords": ["firmly believe", "evidence", "suggests", "supported", "undeniable", "therefore", "furthermore", "however", "counterargument", "crux", "compelling", "reason", "first", "second", "third", "conclusion"]}, "speaking": [{"phrase": "I firmly believe that education is a fundamental right.", "phonetic": "/aɪ ˈfɜːrmli bɪˈliːv ðæt ˌedjuˈkeɪʃən/", "translation": "Acredito firmemente que educação é um direito fundamental."}, {"phrase": "The evidence suggests a strong correlation.", "phonetic": "/ðə ˈevɪdəns səˈdʒests ə strɒŋ ˌkɒrəˈleɪʃən/", "translation": "As evidências sugerem uma forte correlação."}, {"phrase": "Let me address the main counterargument.", "phonetic": "/let miː əˈdres ðə meɪn ˈkaʊntərˌɑːrɡjumənt/", "translation": "Deixe-me abordar o principal contra-argumento."}, {"phrase": "The crux of the matter is clear.", "phonetic": "/ðə krʌks əv ðə ˈmætər ɪz klɪr/", "translation": "O cerne da questão é claro."}], "quiz": [{"type": "choice", "q": "PEEL stands for:", "opts": ["Point, Explain, Evidence, Link", "Please, Explain, Every, Lesson", "Point, Example, Edit, Learn", "Problem, Evaluate, Explore, List"], "answer": 0}, {"type": "fill", "q": "The ___ suggests a strong correlation. (evidência)", "answer": "evidence"}, {"type": "choice", "q": "'Ad hominem' fallacy is:", "opts": ["Using statistics", "Attacking the person", "Using logic", "Being polite"], "answer": 1}, {"type": "fill", "q": "The ___ of the matter is funding. (cerne)", "answer": "crux"}, {"type": "choice", "q": "How many main arguments is ideal?", "opts": ["One", "Two", "Three", "Ten"], "answer": 2}]}, {"id": 42, "module": "Módulo 14: Debate Estruturado", "moduleIcon": "⚔️", "title": "Rebuttal & Counter-Arguments", "titlePt": "Refutação e Contra-Argumentos", "teacher": {"name": "👩‍🏫 Debate Coach Elena", "tip": "A REFUTAÇÃO é onde debates são ganhos ou perdidos! <b>Técnica ARE:</b> Acknowledge (reconheça o ponto), Refute (refute com evidência), Explain (explique por que seu argumento é mais forte). <b>Mairo Vergara:</b> Pratique o 'yes, but...' — reconheça o oponente antes de refutar. Isso mostra maturidade. <b>Carina Fragozo:</b> 'Refute' = /rɪˈfjuːt/, 'Rebuttal' = /rɪˈbʌtəl/. Não confunda!", "method": "🔑 ARE Technique + Steel-Manning + Logical Fallacy Detection"}, "vocab": [{"word": "While I acknowledge", "phonetic": "/waɪl aɪ əkˈnɒlɪdʒ/", "trans": "Embora eu reconheça", "example": "While I acknowledge that point, the data tells a different story."}, {"word": "That argument fails to consider", "phonetic": "/ðæt ˈɑːrɡjumənt feɪlz tə kənˈsɪdər/", "trans": "Esse argumento falha em considerar", "example": "That argument fails to consider the long-term consequences."}, {"word": "Correlation does not equal causation", "phonetic": "/ˌkɒrəˈleɪʃən dʌz nɒt ˈiːkwəl kɔːˈzeɪʃən/", "trans": "Correlação não é causalidade", "example": "As any scientist knows, correlation does not equal causation."}, {"word": "With all due respect", "phonetic": "/wɪð ɔːl djuː rɪˈspekt/", "trans": "Com todo respeito", "example": "With all due respect, I disagree with that assessment."}, {"word": "That's a straw man", "phonetic": "/ðæts ə strɔː mæn/", "trans": "Isso é um espantalho (falácia)", "example": "That's a straw man — I never said we should ban technology entirely."}, {"word": "On the contrary", "phonetic": "/ɒn ðə ˈkɒntrəri/", "trans": "Pelo contrário", "example": "On the contrary, the evidence points in the opposite direction."}, {"word": "My opponent overlooks", "phonetic": "/maɪ əˈpoʊnənt ˌoʊvərˈlʊks/", "trans": "Meu oponente ignora", "example": "My opponent overlooks a crucial factor."}, {"word": "Even if we grant that", "phonetic": "/ˈiːvən ɪf wiː ɡrænt ðæt/", "trans": "Mesmo que concedamos que", "example": "Even if we grant that point, it still doesn't justify..."}, {"word": "The flaw in this reasoning", "phonetic": "/ðə flɔː ɪn ðɪs ˈriːzənɪŋ/", "trans": "A falha neste raciocínio", "example": "The flaw in this reasoning is the assumption that all people are equal."}, {"word": "I'd like to challenge the premise", "phonetic": "/aɪd laɪk tə ˈtʃælɪndʒ ðə ˈpremɪs/", "trans": "Gostaria de questionar a premissa", "example": "I'd like to challenge the very premise of this argument."}], "grammar": {"title": "Rebuttal Techniques: ARE + Fallacy Detection", "explanation": "<b>A.R.E.:</b> Acknowledge (reconheça), Refute (refute), Explain (explique por que é mais forte). <b>Falácias comuns:</b> Straw Man (distorcer o argumento), Ad Hominem (atacar a pessoa), Red Herring (mudar de assunto), Appeal to Authority (apelar à autoridade sem lógica), Slippery Slope (prever catástrofe exagerada).", "table": [["Falácia", "O que é", "Exemplo", "Como refutar"], ["Straw Man", "Distorcer o argumento", "'You want no cars at all!'", "I never said that. My actual point is..."], ["Ad Hominem", "Atacar a pessoa", "'You're too young to understand'", "My age is irrelevant. Let's focus on the evidence."], ["Red Herring", "Mudar de assunto", "'But what about the economy?'", "That's a separate issue. Let's stay on topic."], ["Slippery Slope", "Catastrofismo", "'If we allow X, then Y will happen!'", "There's no evidence that X leads to Y."], ["Appeal to Emotion", "Apelar à emoção", "'Think of the children!'", "While emotional, we should examine the data."]], "examples": [{"en": "While I acknowledge that my opponent raises a valid concern, that argument fails to consider the broader economic impact.", "ph": "/waɪl aɪ əkˈnɒlɪdʒ/", "pt": "Embora reconheça que meu oponente levanta uma preocupação válida, esse argumento falha em considerar o impacto econômico."}, {"en": "With all due respect, that's a straw man. I never argued for eliminating all regulation — I said we need smarter regulation.", "ph": "/wɪð ɔːl djuː rɪˈspekt/", "pt": "Com todo respeito, isso é uma falácia do espantalho."}, {"en": "Even if we grant that social media has some educational value, this doesn't outweigh the well-documented mental health risks.", "ph": "/ˈiːvən ɪf wiː ɡrænt/", "pt": "Mesmo que concedamos que redes sociais têm valor educacional, isso não supera os riscos."}], "tip": "⚡ <b>Técnica poderosa:</b> 'Even if we grant that...' — Isso CONCEDE o ponto do oponente e AINDA mostra que seu argumento é mais forte. É devastador em debates!"}, "dialogue": [{"speaker": "A", "name": "Pro", "en": "I argue that remote work should be the default for all office jobs. Studies show it increases productivity by 13%.", "ph": "/aɪ ˈɑːrɡjuː ðæt rɪˈmoʊt wɜːrk/", "pt": "Argumento que trabalho remoto deveria ser o padrão."}, {"speaker": "B", "name": "Con", "en": "While I acknowledge that some studies show productivity gains, that argument fails to consider the impact on company culture and collaboration. Innovation often happens through spontaneous in-person interactions.", "ph": "/waɪl aɪ əkˈnɒlɪdʒ/", "pt": "Embora reconheça que alguns estudos mostrem ganhos, esse argumento falha em considerar a cultura e colaboração."}, {"speaker": "A", "name": "Pro", "en": "That's a fair point, but I'd challenge the premise that innovation requires physical presence. Companies like GitLab and Automattic are fully remote and highly innovative.", "ph": "/ðæts ə fɛr pɔɪnt, bʌt aɪd ˈtʃælɪndʒ/", "pt": "Ponto justo, mas questiono a premissa de que inovação requer presença física."}, {"speaker": "B", "name": "Con", "en": "Even if we grant that some companies succeed remotely, my opponent overlooks the mental health impact. Many remote workers report feeling isolated and disconnected.", "ph": "/ˈiːvən ɪf wiː ɡrænt/", "pt": "Mesmo concedendo que algumas empresas tenham sucesso remotamente, meu oponente ignora o impacto na saúde mental."}, {"speaker": "A", "name": "Pro", "en": "Correlation does not equal causation. Those feelings of isolation may be due to poor management, not remote work itself. The flaw in this reasoning is assuming that the office automatically solves loneliness.", "ph": "/ˌkɒrəˈleɪʃən dʌz nɒt ˈiːkwəl kɔːˈzeɪʃən/", "pt": "Correlação não é causalidade. Esses sentimentos podem ser por má gestão."}, {"speaker": "B", "name": "Con", "en": "On the contrary, there is substantial evidence that face-to-face interaction is fundamental to human well-being. But I appreciate the nuanced discussion.", "ph": "/ɒn ðə ˈkɒntrəri/", "pt": "Pelo contrário, há evidência substancial de que interação presencial é fundamental."}], "reading": {"title": "📖 Mastering the Art of Rebuttal", "text": "In any debate, the ability to refute your opponent's arguments is just as important as building your own. The best debaters don't just say 'I disagree' — they systematically dismantle the opposing argument while maintaining respect. The ARE technique is particularly effective: Acknowledge the opponent's point (this shows you listened), Refute it with evidence or logic, and Explain why your position is stronger. Another powerful technique is to identify logical fallacies in your opponent's reasoning. If they attack you personally instead of your argument (ad hominem), point it out calmly: 'Let's focus on the argument, not on personal characteristics.' If they create a straw man, correct the record: 'That's not what I said. My actual argument is...' The most sophisticated rebuttal technique is the 'even if' concession: 'Even if we accept your premise, it still doesn't support your conclusion because...' This shows intellectual honesty and strengthens your credibility.", "questions": [{"q": "ARE stands for:", "opts": ["Argue, Repeat, End", "Acknowledge, Refute, Explain", "Ask, Read, Evaluate", "Accept, Reject, Exit"], "answer": 1}, {"q": "When opponent attacks you personally:", "opts": ["Attack back", "Cry", "Redirect to the argument", "Leave"], "answer": 2}, {"q": "'Even if' technique shows:", "opts": ["Weakness", "Intellectual honesty", "Agreement", "Confusion"], "answer": 1}, {"q": "Straw man is:", "opts": ["A decoration", "Distorting opponent's argument", "A compliment", "A strong argument"], "answer": 1}]}, "writing": {"prompt": "✍️ REBUTTAL EXERCISE: Leia o argumento abaixo e escreva uma refutação completa (8+ frases):\n\n🔴 ARGUMENTO: 'Smartphones should be banned in all schools because they distract students and reduce academic performance.'\n\n💡 Use ARE: Acknowledge → Refute → Explain\nUse: While I acknowledge, fails to consider, on the contrary, even if we grant, correlation ≠ causation", "keywords": ["acknowledge", "however", "fails", "consider", "contrary", "even if", "grant", "evidence", "flaw", "reasoning", "premise", "challenge", "overlooks", "respect", "furthermore", "correlation"]}, "speaking": [{"phrase": "While I acknowledge that point, the data tells a different story.", "phonetic": "/waɪl aɪ əkˈnɒlɪdʒ ðæt pɔɪnt/", "translation": "Embora reconheça esse ponto, os dados contam uma história diferente."}, {"phrase": "With all due respect, that's a straw man argument.", "phonetic": "/wɪð ɔːl djuː rɪˈspekt/", "translation": "Com todo respeito, isso é uma falácia do espantalho."}, {"phrase": "Correlation does not equal causation.", "phonetic": "/ˌkɒrəˈleɪʃən dʌz nɒt ˈiːkwəl kɔːˈzeɪʃən/", "translation": "Correlação não é causalidade."}, {"phrase": "Even if we grant that, it still doesn't justify the conclusion.", "phonetic": "/ˈiːvən ɪf wiː ɡrænt ðæt/", "translation": "Mesmo que concedamos isso, ainda não justifica a conclusão."}], "quiz": [{"type": "choice", "q": "ARE technique:", "opts": ["Attack, Run, Escape", "Acknowledge, Refute, Explain", "Argue, Read, Edit", "Accept, Reject, Eliminate"], "answer": 1}, {"type": "fill", "q": "___ does not equal causation. (correlação)", "answer": "Correlation"}, {"type": "choice", "q": "'Straw man' is when you:", "opts": ["Build something", "Distort opponent's argument", "Agree completely", "Use statistics"], "answer": 1}, {"type": "fill", "q": "With all due ___, I disagree. (respeito)", "answer": "respect"}, {"type": "choice", "q": "'Even if we grant that' shows:", "opts": ["You lost", "Intellectual honesty", "You agree", "Weakness"], "answer": 1}]}, {"id": 43, "module": "Módulo 14: Debate Estruturado", "moduleIcon": "⚔️", "title": "Debate Practice: AI & Society", "titlePt": "Prática de Debate: IA e Sociedade", "teacher": {"name": "👨‍🏫 Debate Coach James", "tip": "Hora de PRATICAR! Nesta aula você vai debater sobre IA — um dos temas mais relevantes da atualidade. <b>Formato:</b> Leia ambos os lados, escolha um, construa seu caso com PEEL, e pratique refutações com ARE. <b>Dica do Mairo Vergara:</b> Grave-se debatendo e ouça depois — isso acelera MUITO a fluência. <b>Carina Fragozo:</b> 'Artificial' = /ˌɑːrtɪˈfɪʃəl/ — a sílaba forte é a TERCEIRA!", "method": "🔑 Full Debate Simulation + Self-Recording"}, "vocab": [{"word": "Artificial Intelligence", "phonetic": "/ˌɑːrtɪˈfɪʃəl ɪnˈtelɪdʒəns/", "trans": "Inteligência Artificial", "example": "AI is transforming every industry."}, {"word": "Automation", "phonetic": "/ˌɔːtəˈmeɪʃən/", "trans": "Automação", "example": "Automation will replace many routine jobs."}, {"word": "Ethical implications", "phonetic": "/ˈeθɪkəl ˌɪmplɪˈkeɪʃənz/", "trans": "Implicações éticas", "example": "We must consider the ethical implications of AI."}, {"word": "Unprecedented", "phonetic": "/ʌnˈpresɪdentɪd/", "trans": "Sem precedentes", "example": "We face unprecedented challenges."}, {"word": "Bias", "phonetic": "/ˈbaɪəs/", "trans": "Viés/Tendenciosidade", "example": "AI systems can perpetuate human bias."}, {"word": "Regulate", "phonetic": "/ˈreɡjuleɪt/", "trans": "Regular", "example": "Governments must regulate AI development."}, {"word": "Displacement", "phonetic": "/dɪsˈpleɪsmənt/", "trans": "Deslocamento", "example": "Job displacement is a serious concern."}, {"word": "Augment", "phonetic": "/ɔːɡˈment/", "trans": "Aumentar/Complementar", "example": "AI should augment human capabilities, not replace them."}, {"word": "Safeguards", "phonetic": "/ˈseɪfɡɑːrdz/", "trans": "Salvaguardas", "example": "We need proper safeguards in place."}, {"word": "The double-edged sword", "phonetic": "/ðə ˈdʌbəl edʒd sɔːrd/", "trans": "A faca de dois gumes", "example": "Technology is a double-edged sword."}], "grammar": {"title": "Full Debate Format: Opening, Arguments, Rebuttals, Closing", "explanation": "<b>Debate completo em 4 fases:</b> 1) <b>Opening Statement</b> (30 seg): Apresente sua posição. 2) <b>Main Arguments</b> (2 min): 3 pontos com PEEL. 3) <b>Rebuttals</b> (1 min): Refute o oponente com ARE. 4) <b>Closing Statement</b> (30 seg): Resuma e faça call to action.", "table": [["Fase", "Tempo", "O que fazer", "Expressões-chave"], ["Opening", "30 seg", "Declare sua posição", "I stand firmly in favor/against..."], ["Arguments", "2 min", "3 pontos com evidência", "First... Second... Third..."], ["Rebuttal", "1 min", "Refute o oponente", "While I acknowledge... however..."], ["Closing", "30 seg", "Resuma + call to action", "In light of the evidence..."]], "examples": [{"en": "I stand firmly in favor of regulating AI development. There are three compelling reasons why this is necessary for the future of humanity.", "ph": "/aɪ stænd ˈfɜːrmli ɪn ˈfeɪvər/", "pt": "Posiciono-me firmemente a favor de regular o desenvolvimento de IA."}, {"en": "In light of all the evidence presented today, it is clear that the benefits of AI regulation far outweigh the costs. The question is not whether to regulate, but how.", "ph": "/ɪn laɪt əv ɔːl ðə ˈevɪdəns/", "pt": "À luz de todas as evidências, é claro que os benefícios da regulação superam os custos."}], "tip": "⚡ <b>Closing poderoso:</b> Termine com uma frase memorável. 'The question before us is not whether AI will change the world — it already has. The question is whether we will shape that change, or let it shape us.'"}, "dialogue": [{"speaker": "A", "name": "Pro-Reg", "en": "Ladies and gentlemen, I stand firmly in favor of strict AI regulation. AI is a double-edged sword — powerful but potentially dangerous. Without proper safeguards, we risk unprecedented harm to society.", "ph": "/ˈleɪdiz ænd ˈdʒentəlmən, aɪ stænd ˈfɜːrmli/", "pt": "Senhoras e senhores, posiciono-me a favor de regulação rigorosa de IA."}, {"speaker": "B", "name": "Anti-Reg", "en": "While I acknowledge the risks my opponent describes, I firmly believe that excessive regulation will stifle innovation. The evidence suggests that self-regulation by the tech industry has been more effective than government intervention.", "ph": "/waɪl aɪ əkˈnɒlɪdʒ/", "pt": "Embora reconheça os riscos, acredito que regulação excessiva vai frear inovação."}, {"speaker": "A", "name": "Pro-Reg", "en": "That argument fails to consider the history of self-regulation. The financial industry tried self-regulation before 2008, and we all know how that ended. AI bias has already caused real harm — from discriminatory hiring algorithms to wrongful arrests by facial recognition.", "ph": "/ðæt ˈɑːrɡjumənt feɪlz/", "pt": "Esse argumento falha em considerar a história da autorregulação."}, {"speaker": "B", "name": "Anti-Reg", "en": "My opponent makes a compelling point about bias, but I'd challenge the premise that government regulation is the solution. Even if we grant that some oversight is needed, heavy-handed regulation could drive AI research to countries with fewer restrictions, ultimately reducing our influence over its development.", "ph": "/maɪ əˈpoʊnənt meɪks ə kəmˈpelɪŋ pɔɪnt/", "pt": "Meu oponente faz um ponto convincente, mas questiono a premissa."}, {"speaker": "A", "name": "Pro-Reg", "en": "On the contrary — the EU's AI Act has attracted investment, not repelled it. Companies want clear rules. In light of all the evidence, the crux of the matter is this: we cannot afford to wait. The time to act is now.", "ph": "/ɒn ðə ˈkɒntrəri/", "pt": "Pelo contrário — o AI Act da UE atraiu investimento. O cerne: não podemos esperar."}, {"speaker": "B", "name": "Anti-Reg", "en": "I appreciate the thoughtful debate. Perhaps the answer lies in smart, targeted regulation rather than broad restrictions. Technology is a double-edged sword, and we must wield it wisely.", "ph": "/aɪ əˈpriːʃieɪt ðə ˈθɔːtfəl dɪˈbeɪt/", "pt": "Agradeço o debate. Talvez a resposta esteja em regulação inteligente e direcionada."}], "reading": {"title": "📖 The Great AI Debate", "text": "Artificial Intelligence is perhaps the most debated technology of our time. On one side, optimists argue that AI will solve humanity's greatest challenges — from curing diseases to reversing climate change. They point to AI's ability to process vast amounts of data, identify patterns that humans cannot see, and automate tedious tasks, freeing humans for more creative work. On the other side, critics warn of job displacement, algorithmic bias, privacy violations, and the existential risk of superintelligent AI. They argue that without strict regulation, AI could exacerbate inequality and concentrate power in the hands of a few tech companies. The truth, as with most complex issues, likely lies somewhere in the middle. AI is neither inherently good nor evil — it is a tool whose impact depends entirely on how we develop and deploy it. The real debate should not be 'for or against AI' but rather 'how do we ensure AI serves all of humanity, not just a privileged few?' This requires collaboration between governments, companies, researchers, and civil society.", "questions": [{"q": "AI optimists argue it will:", "opts": ["Destroy everything", "Solve major challenges", "Replace all humans", "Do nothing"], "answer": 1}, {"q": "AI critics warn about:", "opts": ["Too much creativity", "Job displacement and bias", "Too many cures", "Nothing"], "answer": 1}, {"q": "The real debate should be:", "opts": ["For or against AI", "How to ensure AI serves everyone", "Whether to ban AI", "Who invented AI"], "answer": 1}, {"q": "AI's impact depends on:", "opts": ["Luck", "How we develop and deploy it", "The weather", "Nothing"], "answer": 1}]}, "writing": {"prompt": "✍️ FULL DEBATE: Escolha PRO ou CONTRA e escreva um debate completo sobre IA (10+ frases):\n\n🔴 TEMA: 'AI will do more good than harm to humanity.'\n\n💡 Inclua: Opening Statement → 3 Arguments (PEEL) → Address 1 Counterargument (ARE) → Closing Statement\n\n🏆 DESAFIO EXTRA: Depois, escreva o lado OPOSTO para praticar steel-manning!", "keywords": ["firmly", "favor", "against", "evidence", "suggests", "first", "second", "third", "acknowledge", "however", "fails", "consider", "contrary", "even if", "grant", "crux", "light", "unprecedented", "ethical", "regulate", "augment", "bias", "safeguards", "compelling", "therefore"]}, "speaking": [{"phrase": "I stand firmly in favor of regulating AI development.", "phonetic": "/aɪ stænd ˈfɜːrmli ɪn ˈfeɪvər/", "translation": "Posiciono-me firmemente a favor de regular a IA."}, {"phrase": "AI is a double-edged sword — powerful but potentially dangerous.", "phonetic": "/ˌeɪˈaɪ ɪz ə ˈdʌbəl edʒd sɔːrd/", "translation": "IA é uma faca de dois gumes — poderosa mas perigosa."}, {"phrase": "In light of all the evidence, the time to act is now.", "phonetic": "/ɪn laɪt əv ɔːl ðə ˈevɪdəns/", "translation": "À luz das evidências, a hora de agir é agora."}, {"phrase": "The question is not whether AI will change the world — it already has.", "phonetic": "/ðə ˈkwestʃən ɪz nɒt ˈweðər/", "translation": "A questão não é se IA mudará o mundo — já mudou."}], "quiz": [{"type": "choice", "q": "4 fases de um debate:", "opts": ["Read, Write, Speak, Listen", "Opening, Arguments, Rebuttal, Closing", "Intro, Body, Body, Conclusion", "Start, Middle, End, Questions"], "answer": 1}, {"type": "fill", "q": "AI is a double-edged ___. (faca de dois gumes)", "answer": "sword"}, {"type": "choice", "q": "'In light of the evidence' =", "opts": ["Na luz", "À luz das evidências", "Iluminando", "Brilhante"], "answer": 1}, {"type": "fill", "q": "I stand firmly in ___ of regulation. (a favor)", "answer": "favor"}, {"type": "choice", "q": "'Steel-manning' in debate means:", "opts": ["Being strong", "Presenting opponent's BEST argument", "Using metal", "Winning"], "answer": 1}]}, {"id": 44, "module": "Módulo 15: Debate Livre — Hot Topics", "moduleIcon": "🔥", "title": "Debate: Education & Future of Work", "titlePt": "Debate: Educação e Futuro do Trabalho", "teacher": {"name": "👨‍🏫 Coach Thomas", "tip": "Educação e trabalho são temas PERFEITOS para debates porque todos têm experiência pessoal! <b>Técnica:</b> Combine dados + experiência pessoal. 'According to the OECD... and from my own experience...' <b>Temas desta aula:</b> Universidade é necessária? Trabalho remoto para sempre? Semana de 4 dias?", "method": "🔑 Data + Personal Experience + Multiple Perspectives"}, "vocab": [{"word": "Higher education", "phonetic": "/ˈhaɪər ˌedjuˈkeɪʃən/", "trans": "Ensino superior", "example": "Is higher education still worth the investment?"}, {"word": "Vocational training", "phonetic": "/voʊˈkeɪʃənəl ˈtreɪnɪŋ/", "trans": "Ensino profissionalizante", "example": "Vocational training can be more practical than university."}, {"word": "Student debt", "phonetic": "/ˈstuːdənt det/", "trans": "Dívida estudantil", "example": "Student debt has reached crisis levels."}, {"word": "Work-life balance", "phonetic": "/wɜːrk laɪf ˈbæləns/", "trans": "Equilíbrio trabalho-vida", "example": "Work-life balance is essential for well-being."}, {"word": "Four-day work week", "phonetic": "/fɔːr deɪ wɜːrk wiːk/", "trans": "Semana de 4 dias", "example": "Should we adopt a four-day work week?"}, {"word": "Lifelong learning", "phonetic": "/ˈlaɪflɒŋ ˈlɜːrnɪŋ/", "trans": "Aprendizado contínuo", "example": "Lifelong learning is the new norm."}, {"word": "Obsolete", "phonetic": "/ˌɒbsəˈliːt/", "trans": "Obsoleto", "example": "Some skills become obsolete quickly."}, {"word": "Employability", "phonetic": "/ɪmˌplɔɪəˈbɪləti/", "trans": "Empregabilidade", "example": "Focus on employability, not just degrees."}, {"word": "Gig economy", "phonetic": "/ɡɪɡ ɪˈkɒnəmi/", "trans": "Economia gig/freelancer", "example": "The gig economy is growing rapidly."}, {"word": "Upskilling", "phonetic": "/ˈʌpskɪlɪŋ/", "trans": "Requalificação", "example": "Upskilling is crucial in the AI era."}], "grammar": {"title": "Debating Multiple Perspectives", "explanation": "Para debates sobre educação e trabalho, apresente <b>múltiplas perspectivas</b>: empregadores, estudantes, governo, economia. Use: <b>From the employer's perspective...</b>, <b>Students argue that...</b>, <b>The government's role should be...</b>", "table": [["Perspectiva", "Expressão", "Exemplo", ""], ["Empregador", "From the employer's perspective...", "Companies need practical skills.", ""], ["Estudante", "From the student's standpoint...", "Students want affordable education.", ""], ["Governo", "The government should...", "Invest in vocational training.", ""], ["Economia", "From an economic standpoint...", "Skilled workers drive growth.", ""], ["Pessoal", "From my own experience...", "I learned more at work than in school.", ""]], "examples": [{"en": "From the employer's perspective, practical skills matter more than degrees. However, from the student's standpoint, a degree provides credibility and opens doors.", "ph": "/frəm ðə ɪmˈplɔɪərz pərˈspektɪv/", "pt": "Na perspectiva do empregador, habilidades práticas importam mais que diplomas."}, {"en": "While some argue that university is becoming obsolete, the evidence suggests that graduates still earn significantly more over their lifetime.", "ph": "/waɪl sʌm ˈɑːrɡjuː/", "pt": "Embora alguns argumentem que universidade está se tornando obsoleta, evidências mostram que graduados ganham significativamente mais."}], "tip": "⚡ <b>Debate tip:</b> Quando discutir educação, sempre pergunte: 'Education for WHAT purpose?' Isso muda completamente a discussão — educação para empregabilidade é diferente de educação para cidadania."}, "dialogue": [{"speaker": "A", "name": "Debater1", "en": "I argue that a university degree is no longer necessary for career success. Many of the world's most successful entrepreneurs — like Steve Jobs and Mark Zuckerberg — dropped out of college.", "ph": "/aɪ ˈɑːrɡjuː ðæt ə ˌjuːnɪˈvɜːrsəti/", "pt": "Argumento que diploma universitário não é mais necessário."}, {"speaker": "B", "name": "Debater2", "en": "While I acknowledge those examples, they represent the exception, not the rule. The evidence clearly shows that, on average, university graduates earn 84% more than those with only a high school diploma.", "ph": "/waɪl aɪ əkˈnɒlɪdʒ/", "pt": "Embora reconheça esses exemplos, são exceção, não regra."}, {"speaker": "A", "name": "Debater1", "en": "That argument fails to consider the massive student debt crisis. Many graduates spend decades paying off loans for degrees that didn't significantly improve their career prospects. Vocational training and upskilling programs offer better return on investment.", "ph": "/ðæt ˈɑːrɡjumənt feɪlz/", "pt": "Esse argumento falha em considerar a crise de dívida estudantil."}, {"speaker": "B", "name": "Debater2", "en": "From the employer's perspective, a degree demonstrates discipline, critical thinking, and the ability to complete long-term projects. Even if the specific knowledge becomes obsolete, these soft skills remain valuable.", "ph": "/frəm ðə ɪmˈplɔɪərz pərˈspektɪv/", "pt": "Na perspectiva do empregador, um diploma demonstra disciplina e pensamento crítico."}, {"speaker": "A", "name": "Debater1", "en": "I'd challen
